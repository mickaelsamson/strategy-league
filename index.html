<!DOCTYPE html>
<html>
<head>
<title>Strategy Hub</title>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}

.header{
  font-size:32px;
  padding:30px;
}

.menu{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:50px;
}

.card{
  width:220px;
  height:140px;
  background:#111827;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.big{
  font-size:22px;
}

.small{
  opacity:0.7;
  font-size:14px;
}

</style>
</head>

<body>

<div class="header">🎮 Strategy Hub</div>

<div class="menu">

  <div class="card" onclick="play()">
    <div class="big">Play</div>
    <div class="small">Start a game</div>
  </div>

  <div class="card" onclick="leaderboard()">
    <div class="big">Leaderboard</div>
    <div class="small">Top players</div>
  </div>

</div>

<script>

function play(){
  window.location.href = "/game.html";
}

function leaderboard(){
  window.location.href = "/leaderboard.html";
}

</script>

</body>
</html>
