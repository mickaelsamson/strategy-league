<!DOCTYPE html>
<html>
<head>
<title>Chess</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  display:flex;
}

#main{
  flex:1;
  text-align:center;
}

#sidebar{
  width:260px;
  background:#111827;
  padding:10px;
}

/* BOARD */
#boardWrapper{
  position:relative;
  width:90vw;
  max-width:520px;
  aspect-ratio:1/1;
  margin:20px auto;
}

#boardWrapper img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:12px;
}

#piecesLayer, #clickLayer{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  overflow:hidden;
}

.square{
  position:absolute;
  width:12.5%;
  height:12.5%;
  cursor:pointer;
}

/* 🔥 FIX DEFINITIF SVG */
.piece{
  position:absolute;
  width:12.5%;
  height:12.5%;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}

.piece img{
  width:80%;
  height:80%;
  object-fit:contain;
}

/* UI */
.player{
  padding:8px;
  border-bottom:1px solid #1f2937;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
}

.player img{
  width:30px;
  height:30px;
  border-radius:50%;
}

.lobby{
  background:#1f2937;
  padding:10px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="main">

<h2>♟️ Chess</h2>

<div id="lobbyControls">
  <input id="name" placeholder="Lobby name">

  <select id="mode">
    <option value="30">Blitz</option>
    <option value="60">Rapid</option>
    <option value="120">Snail</option>
  </select>

  <button onclick="createLobby()">Create</button>
</div>

<div id="boardWrapper">
  <img src="/chess/board.png">
  <div id="piecesLayer"></div>
  <div id="clickLayer"></div>
</div>

<h3>Lobbies</h3>
<div id="lobbies"></div>

</div>

<div id="sidebar">
  <h3>Players</h3>
  <div id="players"></div>
</div>

<script>

const socket = io();
const user = JSON.parse(localStorage.getItem("user"));

if(user){
  socket.emit("register_online", user.username);
}

/* GAME */
let game = new Chess();
let selected = null;
let playerColor = null;

const pieceMap = {
  wP:"wP.svg", wR:"wR.svg", wN:"wN.svg",
  wB:"wB.svg", wQ:"wQ.svg", wK:"wK.svg",
  bP:"bP.svg", bR:"bR.svg", bN:"bN.svg",
  bB:"bB.svg", bQ:"bQ.svg", bK:"bK.svg"
};

/* PLAYERS */
socket.on("online_users", users=>{
  document.getElementById("players").innerHTML =
    Object.entries(users).map(([name,data])=>`
      <div class="player">
        <img src="${data.avatar}">
        <div>
          <div>${name} (${data.elo})</div>
          <div style="font-size:12px;color:${data.status==="playing"?"red":"lightgreen"};">
            ${data.status}
          </div>
        </div>
      </div>
    `).join("");
});

/* LOBBIES */
socket.on("lobbies_update", lobbies=>{

  const list = Object.values(lobbies);

  document.getElementById("lobbies").innerHTML =
    list.map(l=>{

      const me = l.players.find(p=>p.username===user.username);

      return `
      <div class="lobby">
        ${l.name} (${l.time}s)<br>
        Players: ${l.players.map(p=>p.username + (p.ready?" ✅":" ❌")).join(",")}<br>

        ${
          !me
          ? `<button onclick="join('${l.id}')">Join</button>`
          : `<button onclick="ready('${l.id}')">Ready</button>`
        }
      </div>
      `;
    }).join("");
});

function ready(id){
  socket.emit("toggle_ready", id);
}

function createLobby(){
  socket.emit("create_lobby",{
    name:document.getElementById("name").value,
    time:parseInt(document.getElementById("mode").value)
  });
}

function join(id){
  socket.emit("join_lobby", id);
}

/* GAME SOCKET */

socket.on("chess_start", data=>{
  playerColor = data.color;
  game.reset();
  draw();
});

socket.on("chess_update", data=>{
  if(data.fen) game.load(data.fen);
  draw();
});

/* DRAW FIX FINAL */

function draw(){

  const piecesLayer = document.getElementById("piecesLayer");
  const clickLayer = document.getElementById("clickLayer");

  piecesLayer.innerHTML = "";
  clickLayer.innerHTML = "";

  const board = game.board();

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){

      const sq = String.fromCharCode(97+x)+(8-y);
      const piece = board[y][x];

      const cell = document.createElement("div");
      cell.className = "square";
      cell.style.left = (x*12.5) + "%";
      cell.style.top = (y*12.5) + "%";
      cell.onclick = ()=>clickCell(sq);

      clickLayer.appendChild(cell);

      if(piece){

        const wrapper = document.createElement("div");
        wrapper.className = "piece";
        wrapper.style.left = (x*12.5) + "%";
        wrapper.style.top = (y*12.5) + "%";

        const img = document.createElement("img");
        const key = piece.color + piece.type.toUpperCase();

        img.src = "/chess/pieces/" + pieceMap[key];

        wrapper.appendChild(img);
        piecesLayer.appendChild(wrapper);
      }
    }
  }
}

/* MOVE */

function clickCell(sq){

  if(game.turn() !== playerColor) return;

  if(!selected){
    if(game.moves({square:sq}).length === 0) return;
    selected = sq;
  } else {

    const move = game.move({
      from:selected,
      to:sq,
      promotion:'q'
    });

    selected = null;

    if(move){
      socket.emit("chess_move",{fen:game.fen()});
      draw();
    }
  }
}

draw();

</script>

</body>
</html>
