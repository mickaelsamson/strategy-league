<!DOCTYPE html>
<html>
<head>
<title>Chess Multiplayer</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{
  background:#020617;
  color:white;
  text-align:center;
  font-family:Arial;
}

#board{
  width:480px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(8,1fr);
}

.cell{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

.white{background:#eee;color:black;}
.black{background:#444;}

button{
  margin:10px;
  padding:10px;
}
</style>
</head>

<body>

<h2>♟️ Chess Lobby</h2>

<div id="status"></div>
<div id="board"></div>

<script>

const socket = io();
let game = new Chess();
let selected = null;
let playerColor = null;

const user = JSON.parse(localStorage.getItem("user"));
socket.emit("chess_lobby_join", user.username);

function toggleReady(){
  socket.emit("chess_ready");
}

socket.on("chess_lobby", players=>{
  document.getElementById("status").innerHTML =
    players.map(p=>`${p.name} ${p.ready?'✅':'❌'}`).join("<br>") +
    `<br><button onclick="toggleReady()">Ready</button>`;
});

socket.on("chess_start", data=>{
  playerColor = data.color;
  document.getElementById("status").innerText = "Game started ("+playerColor+")";
  draw();
});

socket.on("chess_update", data=>{
  game.load(data.fen);
  draw();
});

socket.on("chess_timer", players=>{
  const me = players.find(p=>p.color===playerColor);
  if(me){
    document.getElementById("status").innerText = "Time: "+me.time;
  }
});

socket.on("chess_end", data=>{
  alert("Winner: "+data.winner);
});

function draw(){
  const el=document.getElementById("board");
  el.innerHTML="";

  const state=game.board();

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      const c=document.createElement("div");
      c.className="cell "+((x+y)%2?"black":"white");

      const p=state[y][x];
      c.innerText=p?p.type:"";

      const sq=String.fromCharCode(97+x)+(8-y);

      c.onclick=()=>clickCell(sq);

      el.appendChild(c);
    }
  }
}

function clickCell(sq){

  if(game.turn()!==playerColor) return;

  if(!selected){
    if(game.moves({square:sq}).length===0) return;
    selected=sq;
  } else {

    const move=game.move({from:selected,to:sq,promotion:'q'});
    selected=null;

    if(move){
      socket.emit("chess_move",{from:move.from,to:move.to,fen:game.fen()});
      draw();
    }
  }
}

</script>

</body>
</html>
