<!DOCTYPE html>
<html>
<head>
<title>Chess Lobby</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{
  margin:0;
  background: radial-gradient(circle,#0f172a,#020617);
  color:white;
  font-family:Arial;
  display:flex;
}

/* MAIN */
#main{
  flex:1;
  text-align:center;
}

/* SIDEBAR */
#sidebar{
  width:250px;
  background:#111827;
  padding:10px;
}

.player{
  padding:8px;
  border-bottom:1px solid #1f2937;
  display:flex;
  justify-content:space-between;
}

.player:hover{
  background:#1f2937;
}

.status{
  font-size:12px;
}

.idle{color:lightgreen;}
.playing{color:red;}

/* LOBBY */
.lobby{
  background:#1f2937;
  margin:10px auto;
  padding:15px;
  border-radius:12px;
  width:320px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

button{
  margin:5px;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

</style>
</head>

<body>

<div id="main">

<h2>♟️ Chess Lobby</h2>

<input id="name" placeholder="Lobby name">

<select id="mode">
  <option value="30">Blitz (30s)</option>
  <option value="60">Rapid (60s)</option>
  <option value="90">Classic (90s)</option>
  <option value="120">Snail (120s)</option>
</select>

<button onclick="createLobby()">Create</button>

<div id="lobbies"></div>
<div id="board"></div>

</div>

<div id="sidebar">
  <h3>Players</h3>
  <div id="players"></div>
</div>

<script>

const socket=io();
const user=JSON.parse(localStorage.getItem("user"));

socket.emit("register_online", user.username);

/* ONLINE LIST */
socket.on("online_users", users=>{

  document.getElementById("players").innerHTML =
    Object.entries(users).map(([name,data])=>`
      <div class="player">
        <div>
          ${name} (${data.elo})
          <div class="status ${data.status}">
            ${data.status}
          </div>
        </div>

        ${name!==user.username ? 
          `<button onclick="invite('${name}')">+</button>` : ""}
      </div>
    `).join("");

});

/* CREATE */
function createLobby(){
  socket.emit("create_lobby",{
    name:document.getElementById("name").value,
    time:parseInt(document.getElementById("mode").value)
  });
}

/* LOBBIES */
socket.on("lobbies_update", lobbies=>{

  document.getElementById("lobbies").innerHTML =
    Object.values(lobbies).map(l=>`
      <div class="lobby">
        <b>${l.name}</b> (${l.time}s)<br>
        ${l.players.map(p=>p.username+" ("+p.elo+")").join(", ")}<br>
        <button onclick="join('${l.id}')">Join</button>
        <button onclick="inviteLobby('${l.id}')">Invite</button>
      </div>
    `).join("");

});

function join(id){
  socket.emit("join_lobby", id);
}

let currentLobby=null;

function inviteLobby(id){
  currentLobby=id;
}

function invite(name){
  if(currentLobby){
    socket.emit("invite_player",{target:name,lobbyId:currentLobby});
  }
}

/* INVITE RECEIVE */
socket.on("invite_received", data=>{
  if(confirm(data.from+" invited you")){
    socket.emit("join_lobby", data.lobbyId);
  }
});

/* GAME */
let game=new Chess();
let selected=null;
let playerColor=null;

socket.on("chess_start", data=>{
  playerColor=data.color;
  draw();
});

socket.on("chess_update", data=>{
  game.load(data.fen);
  draw();
});

function draw(){
  const el=document.getElementById("board");
  el.innerHTML="";

  const state=game.board();

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){

      const c=document.createElement("div");
      c.style.display="inline-block";
      c.style.width="60px";
      c.style.height="60px";
      c.style.background=(x+y)%2?"#444":"#eee";

      const p=state[y][x];
      c.innerText=p?p.type:"";

      const sq=String.fromCharCode(97+x)+(8-y);

      c.onclick=()=>clickCell(sq);

      el.appendChild(c);
    }
    el.appendChild(document.createElement("br"));
  }
}

function clickCell(sq){

  if(game.turn()!==playerColor) return;

  if(!selected){
    if(game.moves({square:sq}).length===0) return;
    selected=sq;
  } else {

    const move=game.move({from:selected,to:sq,promotion:'q'});
    selected=null;

    if(move){
      socket.emit("chess_move",{from:move.from,to:move.to,fen:game.fen()});
      draw();
    }
  }
}

</script>

</body>
</html>
