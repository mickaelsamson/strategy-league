<!DOCTYPE html>
<html>
<head>
<title>Chess</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  display:flex;
}

#main{
  flex:1;
  text-align:center;
}

#sidebar{
  width:260px;
  background:#111827;
  padding:10px;
}

/* BOARD */
#boardWrapper{
  position:relative;
  width:512px;
  margin:20px auto;
}

#boardImg{
  width:100%;
  border-radius:10px;
}

#piecesLayer, #clickLayer{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* CLICK */
.square{
  position:absolute;
  width:64px;
  height:64px;
  cursor:pointer;
}

/* PIECES */
.piece{
  position:absolute;
  width:64px;
  height:64px;
  pointer-events:none;
}

/* TIMER */
#timerBar{
  width:320px;
  height:10px;
  background:#1f2937;
  margin:10px auto;
  border-radius:10px;
  overflow:hidden;
}

#timerFill{
  height:100%;
  width:100%;
  background:linear-gradient(90deg, #22c55e, #eab308, #ef4444);
  transition:width 1s linear;
}
</style>
</head>

<body>

<div id="main">

<h2>♟️ Chess</h2>

<div id="lobbyControls">
  <input id="name" placeholder="Lobby name">

  <select id="mode">
    <option value="30">Blitz</option>
    <option value="60">Rapid</option>
    <option value="90">Classic</option>
    <option value="120">Snail</option>
  </select>

  <button onclick="createLobby()">Create</button>
</div>

<div id="timerBar"><div id="timerFill"></div></div>

<div id="boardWrapper">
  <img src="board.png" id="boardImg">
  <div id="piecesLayer"></div>
  <div id="clickLayer"></div>
</div>

<div id="lobbies"></div>

</div>

<div id="sidebar">
  <h3>Players</h3>
  <div id="players"></div>
</div>

<script>

const socket = io();
const user = JSON.parse(localStorage.getItem("user"));

socket.emit("register_online", user.username);

/* GAME */
let game = new Chess();
let selected = null;
let playerColor = null;
let totalTime = 60;

/* 🔥 FIXED PIECE MAP */
const pieceMap = {
  wP:"wP.svg", wR:"wR.svg", wN:"wN.svg",
  wB:"wB.svg", wQ:"wQ.svg", wK:"wK.svg",
  bP:"bP.svg", bR:"bR.svg", bN:"bN.svg",
  bB:"bB.svg", bQ:"bQ.svg", bK:"bK.svg"
};

/* SOCKET */

socket.on("chess_start", data=>{
  playerColor = data.color;
  totalTime = data.time;

  document.getElementById("lobbyControls").style.display="none";
  draw();
});

socket.on("chess_update", data=>{
  game.load(data.fen);
  draw();
});

socket.on("chess_timer", players=>{
  const me = players.find(p=>p.color===playerColor);
  if(!me) return;

  const percent = (me.time / totalTime) * 100;
  document.getElementById("timerFill").style.width = percent + "%";
});

socket.on("chess_end", ()=>{
  document.getElementById("lobbyControls").style.display="block";
});

/* DRAW */

function draw(){

  const piecesLayer = document.getElementById("piecesLayer");
  const clickLayer = document.getElementById("clickLayer");

  piecesLayer.innerHTML = "";
  clickLayer.innerHTML = "";

  const board = game.board();
  const size = 64;

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){

      const sq = String.fromCharCode(97+x)+(8-y);
      const piece = board[y][x];

      /* CLICK */
      const cell = document.createElement("div");
      cell.className = "square";
      cell.style.left = (x*size) + "px";
      cell.style.top = (y*size) + "px";

      cell.onclick = ()=>clickCell(sq);

      clickLayer.appendChild(cell);

      /* PIECE */
      if(piece){
        const img = document.createElement("img");

        /* 🔥 FIX ICI */
        const key = piece.color + piece.type.toUpperCase();

        img.src = "pieces/" + pieceMap[key];
        img.className = "piece";

        img.style.left = (x*size) + "px";
        img.style.top = (y*size) + "px";

        piecesLayer.appendChild(img);
      }

    }
  }
}

/* MOVE */

function clickCell(sq){

  if(game.turn() !== playerColor) return;

  if(!selected){
    if(game.moves({square:sq}).length === 0) return;
    selected = sq;
  } else {

    const move = game.move({
      from:selected,
      to:sq,
      promotion:'q'
    });

    selected = null;

    if(move){
      socket.emit("chess_move",{
        from:move.from,
        to:move.to,
        fen:game.fen()
      });
      draw();
    }
  }
}

/* LOBBY */

function createLobby(){
  socket.emit("create_lobby",{
    name:document.getElementById("name").value,
    time:parseInt(document.getElementById("mode").value)
  });
}

socket.on("lobbies_update", lobbies=>{
  document.getElementById("lobbies").innerHTML =
    Object.values(lobbies).map(l=>`
      <div>
        ${l.name} (${l.time}s)
        <button onclick="join('${l.id}')">Join</button>
      </div>
    `).join("");
});

function join(id){
  socket.emit("join_lobby", id);
}

</script>

</body>
</html>
