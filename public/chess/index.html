<!DOCTYPE html>
<html>
<head>
<title>Chess Lobby</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  display:flex;
}

/* MAIN */
#main{
  flex:1;
  text-align:center;
}

/* SIDEBAR */
#sidebar{
  width:260px;
  background:#111827;
  padding:10px;
}

/* BOARD CONTAINER */
#board{
  margin-top:20px;
  display:inline-block;
  padding:12px;
  background:#0f172a;
  border-radius:14px;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

/* SQUARE */
.square{
  display:inline-block;
  width:64px;
  height:64px;
  position:relative;
}

.light{ background:#e5e7eb; }
.dark{ background:#1f2937; }

.square img{
  width:52px;
  height:52px;
  position:absolute;
  top:6px;
  left:6px;
}

/* TIMER */
#timerBar{
  width:320px;
  height:10px;
  background:#1f2937;
  margin:10px auto;
  border-radius:10px;
  overflow:hidden;
}

#timerFill{
  height:100%;
  width:100%;
  background:linear-gradient(90deg, #22c55e, #eab308, #ef4444);
  transition:width 1s linear;
}

/* LOBBY */
#lobbyControls{
  margin-top:10px;
}
</style>
</head>

<body>

<div id="main">

<h2>♟️ Chess Lobby</h2>

<div id="lobbyControls">
  <input id="name" placeholder="Lobby name">

  <select id="mode">
    <option value="30">Blitz (30s)</option>
    <option value="60">Rapid (60s)</option>
    <option value="90">Classic (90s)</option>
    <option value="120">Snail (120s)</option>
  </select>

  <button onclick="createLobby()">Create</button>
</div>

<div id="timerBar"><div id="timerFill"></div></div>

<div id="lobbies"></div>
<div id="board"></div>

</div>

<div id="sidebar">
  <h3>Players</h3>
  <div id="players"></div>
</div>

<script>

const socket=io();
const user=JSON.parse(localStorage.getItem("user"));

socket.emit("register_online", user.username);

/* ================= GAME ================= */

let game=new Chess();
let selected=null;
let playerColor=null;
let totalTime=60;

/* 🔥 PIECES SVG (SANS RENAME) */
const pieceMap = {
  wP:"wP.svg", wR:"wR.svg", wN:"wN.svg",
  wB:"wB.svg", wQ:"wQ.svg", wK:"wK.svg",
  bP:"bP.svg", bR:"bR.svg", bN:"bN.svg",
  bB:"bB.svg", bQ:"bQ.svg", bK:"bK.svg"
};

/* ================= SOCKET ================= */

socket.on("chess_start", data=>{
  playerColor=data.color;
  totalTime=data.time;

  document.getElementById("lobbyControls").style.display="none";

  draw();
});

socket.on("chess_update", data=>{
  game.load(data.fen);
  draw();
});

socket.on("chess_timer", players=>{
  const me = players.find(p=>p.color===playerColor);
  if(!me) return;

  const percent = (me.time / totalTime) * 100;
  document.getElementById("timerFill").style.width = percent + "%";
});

socket.on("chess_end", ()=>{
  document.getElementById("lobbyControls").style.display="block";
});

/* ================= DRAW ================= */

function draw(){

  const el=document.getElementById("board");
  el.innerHTML="";

  const state=game.board();

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){

      const sq = String.fromCharCode(97+x)+(8-y);

      const div=document.createElement("div");
      div.className="square " + ((x+y)%2?"dark":"light");

      const p=state[y][x];

      if(p){
        const img=document.createElement("img");

        const key = p.color.toUpperCase() + p.type.toUpperCase();

        img.src = "pieces/" + pieceMap[key];

        div.appendChild(img);
      }

      div.onclick=()=>clickCell(sq);

      el.appendChild(div);
    }

    el.appendChild(document.createElement("br"));
  }
}

/* ================= MOVE ================= */

function clickCell(sq){

  if(game.turn()!==playerColor) return;

  if(!selected){
    if(game.moves({square:sq}).length===0) return;
    selected=sq;
  } else {

    const move=game.move({from:selected,to:sq,promotion:'q'});
    selected=null;

    if(move){
      socket.emit("chess_move",{from:move.from,to:move.to,fen:game.fen()});
      draw();
    }
  }
}

</script>

</body>
</html>
