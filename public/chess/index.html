<!DOCTYPE html>
<html>
<head>
<title>Chess Lobby</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}

#lobbies{
  margin:20px;
}

.lobby{
  background:#1f2937;
  margin:10px auto;
  padding:10px;
  border-radius:10px;
  width:300px;
}

button{
  margin:5px;
  padding:8px;
  border-radius:8px;
}

#invitePopup{
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:#111827;
  padding:20px;
  display:none;
}
</style>
</head>

<body>

<h2>♟️ Chess Lobby</h2>

<!-- CREATE -->
<div>
  <input id="name" placeholder="Lobby name">
  <select id="mode">
    <option value="30">Blitz (30s)</option>
    <option value="60">Rapid (60s)</option>
    <option value="90">Classic (90s)</option>
    <option value="120">Snail (120s)</option>
  </select>
  <button onclick="createLobby()">Create</button>
</div>

<!-- LOBBIES -->
<div id="lobbies"></div>

<!-- POPUP INVITE -->
<div id="invitePopup"></div>

<!-- GAME -->
<div id="board"></div>

<script>

const socket = io();
const user = JSON.parse(localStorage.getItem("user"));

socket.emit("register_online", user.username);

/* CREATE */
function createLobby(){
  socket.emit("create_lobby",{
    name:document.getElementById("name").value,
    time:parseInt(document.getElementById("mode").value)
  });
}

/* DISPLAY LOBBIES */
socket.on("lobbies_update", lobbies=>{

  document.getElementById("lobbies").innerHTML =
    Object.values(lobbies).map(l=>`
      <div class="lobby">
        <b>${l.name}</b> (${l.time}s)<br>
        Players: ${l.players.map(p=>p.username).join(", ")}<br>
        <button onclick="join('${l.id}')">Join</button>
        <button onclick="openInvite('${l.id}')">➕ Invite</button>
      </div>
    `).join("");
});

function join(id){
  socket.emit("join_lobby", id);
}

/* INVITE UI */
let currentLobby = null;

function openInvite(id){
  currentLobby = id;
  socket.emit("get_online");
}

socket.on("online_users", users=>{
  const popup = document.getElementById("invitePopup");

  popup.style.display="block";

  popup.innerHTML = users.map(u=>`
    <div>
      ${u}
      <button onclick="invite('${u}')">Invite</button>
    </div>
  `).join("");
});

function invite(user){
  socket.emit("invite_player",{target:user,lobbyId:currentLobby});
}

/* INVITE RECEIVE */
socket.on("invite_received", data=>{
  if(confirm(data.from+" invited you")){
    socket.emit("join_lobby", data.lobbyId);
  }
});

/* GAME */
let game = new Chess();
let selected=null;
let playerColor=null;

socket.on("chess_start", data=>{
  playerColor = data.color;
  draw();
});

socket.on("chess_update", data=>{
  game.load(data.fen);
  draw();
});

function draw(){
  const el=document.getElementById("board");
  el.innerHTML="";

  const state=game.board();

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      const c=document.createElement("div");
      c.style.display="inline-block";
      c.style.width="60px";
      c.style.height="60px";
      c.style.background=(x+y)%2?"#444":"#eee";

      const p=state[y][x];
      c.innerText=p?p.type:"";

      const sq=String.fromCharCode(97+x)+(8-y);

      c.onclick=()=>clickCell(sq);

      el.appendChild(c);
    }
    el.appendChild(document.createElement("br"));
  }
}

function clickCell(sq){

  if(game.turn()!==playerColor) return;

  if(!selected){
    if(game.moves({square:sq}).length===0) return;
    selected=sq;
  } else {

    const move=game.move({from:selected,to:sq,promotion:'q'});
    selected=null;

    if(move){
      socket.emit("chess_move",{from:move.from,to:move.to,fen:game.fen()});
      draw();
    }
  }
}

</script>

</body>
</html>
