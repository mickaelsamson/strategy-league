<!DOCTYPE html>
<html>
<head>
<title>Chess</title>

<!-- CHESS ENGINE -->
<script src="https://unpkg.com/chess.js@1.0.0-beta.1/dist/chess.min.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
}

#board{
  width:480px;
  height:480px;
  margin:40px auto;
  display:grid;
  grid-template-columns:repeat(8,1fr);
}

.cell{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  cursor:pointer;
  user-select:none;
}

.white{ background:#f1f5f9; color:black; }
.black{ background:#334155; }

.selected{
  outline:3px solid yellow;
}

.move{
  box-shadow:inset 0 0 10px yellow;
}

</style>
</head>

<body>

<div class="header">
  <div id="player"></div>
  <button onclick="logout()">Logout</button>
</div>

<h2>♟️ Chess</h2>

<div id="status"></div>

<div id="board"></div>

<script>

const game = new Chess();
let selected = null;

/* SESSION */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="/login.html";
}else{
  player.innerText = "👑 " + user.username;
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  window.location.href="/login.html";
}

/* PIECES */
const pieces = {
  p:"♟", r:"♜", n:"♞", b:"♝", q:"♛", k:"♚",
  P:"♙", R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔"
};

/* DRAW BOARD */
function draw(){

  const board = document.getElementById("board");
  board.innerHTML = "";

  const state = game.board();

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){

      const cell = document.createElement("div");

      cell.className = "cell " + ((x+y)%2 ? "black":"white");

      const piece = state[y][x];
      cell.innerText = piece ? pieces[piece.type === piece.type.toLowerCase() ? piece.type : piece.type.toUpperCase()] : "";

      const square = String.fromCharCode(97+x) + (8-y);

      cell.onclick = ()=>clickCell(square, cell);

      board.appendChild(cell);
    }
  }

  updateStatus();
}

/* CLICK */
function clickCell(square, cell){

  if(selected === null){

    const moves = game.moves({ square, verbose:true });

    if(moves.length === 0) return;

    selected = square;
    cell.classList.add("selected");

    highlightMoves(moves);

  } else {

    const move = game.move({
      from: selected,
      to: square,
      promotion: 'q'
    });

    clearHighlights();
    selected = null;

    if(move){
      draw();
    }
  }
}

/* HIGHLIGHT MOVES */
function highlightMoves(moves){

  moves.forEach(m=>{
    const index = squareToIndex(m.to);
    document.getElementById("board").children[index].classList.add("move");
  });

}

/* CLEAR */
function clearHighlights(){
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("selected","move");
  });
}

/* UTILS */
function squareToIndex(sq){
  const file = sq.charCodeAt(0) - 97;
  const rank = 8 - parseInt(sq[1]);
  return rank * 8 + file;
}

/* STATUS */
function updateStatus(){

  let text = "";

  if(game.in_checkmate()){
    text = "♛ Checkmate!";
  }
  else if(game.in_check()){
    text = "⚠ Check!";
  }
  else{
    text = (game.turn() === 'w' ? "White" : "Black") + " to move";
  }

  document.getElementById("status").innerText = text;
}

/* INIT */
draw();

</script>

</body>
</html>
