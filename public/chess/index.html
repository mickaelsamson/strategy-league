<!-- AJOUT UNIQUEMENT DANS TON FILE EXISTANT -->

<div id="disconnectTimer" style="color:#f87171;"></div>

<script>

/* 🔥 PLAYER DISCONNECTED */
socket.on("opponent_disconnected", data=>{
  document.getElementById("status").innerText =
    "⚠️ " + data.player + " disconnected";

  document.getElementById("disconnectTimer").innerText =
    "Waiting: 60s";
});

/* 🔥 TIMER */
socket.on("disconnect_timer", data=>{
  document.getElementById("disconnectTimer").innerText =
    "Waiting: " + data.time + "s";
});

/* 🔥 RESET SI RECONNECT */
socket.on("chess_update", data=>{
  document.getElementById("disconnectTimer").innerText = "";
});

/* 🔥 VICTOIRE */
socket.on("player_left", data=>{
  document.getElementById("status").innerText =
    "🏆 " + data.winner + " wins (opponent left)";

  document.getElementById("disconnectTimer").innerText = "";
});

</script>
