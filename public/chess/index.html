<!DOCTYPE html>
<html>
<head>
<title>Chess</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial;display:flex;}

#main{flex:1;text-align:center;}
#sidebar{width:260px;background:#111827;padding:10px;}

#boardWrapper{
  position:relative;
  width:90vw;
  max-width:520px;
  aspect-ratio:1/1;
  margin:20px auto;
}

#boardWrapper img{
  width:100%;
  height:100%;
  object-fit:cover;
}

#piecesLayer,#clickLayer{
  position:absolute;
  top:0;left:0;width:100%;height:100%;
}

.square{
  position:absolute;
  width:12.5%;
  height:12.5%;
  cursor:pointer;
}

.selected{outline:3px solid #3b82f6;}
.move{background:rgba(34,197,94,0.4);border-radius:50%;}

.piece{
  position:absolute;
  width:12.5%;
  height:12.5%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.piece img{
  width:80%;
  height:80%;
}

/* UI */
.player{
  padding:8px;
  border-bottom:1px solid #1f2937;
  cursor:pointer;
}

.lobby{
  background:#1f2937;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

#turn{margin:10px;font-size:18px;}
#status{color:#facc15;}
</style>
</head>

<body>

<div id="main">

<h2>♟️ Chess</h2>

<div id="turn">Turn: -</div>
<div id="status"></div>

<div id="lobbyControls">
  <input id="name" placeholder="Lobby name">
  <select id="mode">
    <option value="30">Blitz</option>
    <option value="60">Rapid</option>
    <option value="120">Snail</option>
  </select>
  <button onclick="createLobby()">Create</button>
</div>

<h3>Lobbies</h3>
<div id="lobbies"></div>

<div id="boardWrapper">
  <img src="/chess/board.png">
  <div id="piecesLayer"></div>
  <div id="clickLayer"></div>
</div>

</div>

<div id="sidebar">
  <h3>Players Online</h3>
  <div id="players"></div>
</div>

<script>

const socket = io();
const user = JSON.parse(localStorage.getItem("user"));

if(user){
  socket.emit("register_online", user.username);
}

/* GAME */
let game = new Chess();
let selected = null;
let possibleMoves = [];
let playerColor = null;

let myName = user?.username || "You";
let opponentName = "Opponent";

/* PIECES */
const pieceMap = {
  wP:"wP.svg", wR:"wR.svg", wN:"wN.svg",
  wB:"wB.svg", wQ:"wQ.svg", wK:"wK.svg",
  bP:"bP.svg", bR:"bR.svg", bN:"bN.svg",
  bB:"bB.svg", bQ:"bQ.svg", bK:"bK.svg"
};

/* ================= PLAYERS ONLINE ================= */

window.onlineUsers = {};

socket.on("online_users", users=>{
  window.onlineUsers = users;

  document.getElementById("players").innerHTML =
    Object.entries(users).map(([name,data])=>`
      <div class="player">
        ${name} (${data.elo})
      </div>
    `).join("");
});

/* ================= LOBBIES ================= */

socket.on("lobbies_update", lobbies=>{

  window.currentLobbies = lobbies;

  const list = Object.values(lobbies);

  document.getElementById("lobbies").innerHTML =
    list.length === 0 ? "<p>No lobbies</p>" :
    list.map(l=>{

      const players = l.players.map(p=>
        `${p.username} ${p.ready ? "✅" : "❌"}`
      ).join(", ");

      const me = l.players.find(p=>p.username===user.username);

      return `
        <div class="lobby">
          <b>${l.name}</b> (${l.time}s)<br>
          Players: ${players}<br>

          ${
            !me
            ? `<button onclick="join('${l.id}')">Join</button>`
            : `<button onclick="toggleReady('${l.id}')">
                ${me.ready ? "Unready" : "Ready"}
              </button>`
          }
        </div>
      `;
    }).join("");
});

function createLobby(){
  socket.emit("create_lobby",{
    name:document.getElementById("name").value,
    time:parseInt(document.getElementById("mode").value)
  });
}

function join(id){
  socket.emit("join_lobby", id);
}

function toggleReady(id){
  socket.emit("toggle_ready", id);
}

/* ================= GAME ================= */

socket.on("chess_start", data=>{
  playerColor = data.color;

  opponentName = (playerColor === 'w') ? "Black" : "White";

  game.reset();
  updateUI();
  draw();
});

socket.on("chess_update", data=>{
  if(data.fen) game.load(data.fen);
  updateUI();
  draw();
});

/* ================= UI ================= */

function updateUI(){

  const turnPlayer =
    (game.turn() === playerColor)
    ? myName
    : opponentName;

  document.getElementById("turn").innerText =
    "Turn: " + turnPlayer;

  if(game.in_checkmate()){
    const winner =
      (game.turn() === playerColor)
      ? opponentName
      : myName;

    document.getElementById("status").innerText =
      "🏆 " + winner + " wins!";
  }
  else if(game.in_check()){
    document.getElementById("status").innerText = "⚠️ CHECK!";
  }
  else{
    document.getElementById("status").innerText = "";
  }
}

/* ================= DRAW ================= */

function draw(){

  const p = document.getElementById("piecesLayer");
  const c = document.getElementById("clickLayer");

  p.innerHTML="";
  c.innerHTML="";

  const board = game.board();

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){

      const sq = String.fromCharCode(97+x)+(8-y);
      const piece = board[y][x];

      const cell = document.createElement("div");
      cell.className="square";
      cell.style.left=(x*12.5)+"%";
      cell.style.top=(y*12.5)+"%";

      if(selected === sq) cell.classList.add("selected");
      if(possibleMoves.includes(sq)) cell.classList.add("move");

      cell.onclick=()=>clickCell(sq);
      c.appendChild(cell);

      if(piece){
        const wrapper=document.createElement("div");
        wrapper.className="piece";
        wrapper.style.left=(x*12.5)+"%";
        wrapper.style.top=(y*12.5)+"%";

        const img=document.createElement("img");
        const key=piece.color+piece.type.toUpperCase();
        img.src="/chess/pieces/"+pieceMap[key];

        wrapper.appendChild(img);
        p.appendChild(wrapper);
      }
    }
  }
}

/* ================= MOVE ================= */

function clickCell(sq){

  if(game.turn() !== playerColor) return;

  if(!selected){
    const moves = game.moves({square:sq, verbose:true});
    if(moves.length === 0) return;

    selected = sq;
    possibleMoves = moves.map(m=>m.to);

  }else{

    const move = game.move({
      from:selected,
      to:sq,
      promotion:'q'
    });

    selected = null;
    possibleMoves = [];

    if(move){
      socket.emit("chess_move",{fen:game.fen()});
    }
  }

  updateUI();
  draw();
}

draw();

</script>

</body>
</html>
