<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/assets/styles/theme.css">
<script defer src="/assets/scripts/site-shell.js"></script>
<title>Chess Lobby</title>

<!-- 🔥 FIX SOCKET -->
<script src="/socket.io/socket.io.js" defer></script>

<style>
body{
  margin:0;
}

.container{
  width:100%;
  max-width:980px;
  margin:0 auto;
  text-align:center;
}

h1{
  margin:0 0 20px;
  font-size:42px;
}

.lobby-subtitle{
  margin:-10px 0 24px;
  color:var(--shell-soft);
}

.lobby-layout{
  display:grid;
  grid-template-columns:minmax(280px, 360px) 1fr;
  gap:18px;
  align-items:start;
}

.lobby-create{
  display:grid;
  gap:12px;
  text-align:left;
}

.lobby-create h2{
  margin:0;
}

.game-kicker{
  color:var(--shell-red);
  font-weight:900;
}

.card{
  background:var(--shell-card);
  border:1px solid var(--shell-line);
  padding:24px;
  border-radius:8px;
  margin-bottom:20px;
  box-shadow:0 18px 70px rgba(0,0,0,0.22);
}
  
.rules{
  text-align:left;
  margin:4px 0 0;
  color:var(--shell-soft);
  font-size:14px;
  line-height:1.5;
}

.invite-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
}

button{
  min-height:44px;
  padding:0 16px;
  margin:5px;
  border:1px solid var(--shell-line);
  border-radius:8px;
  cursor:pointer;
  background:linear-gradient(135deg, var(--shell-red), var(--shell-red-dark));
  color:white;
}

button:hover{
  filter:brightness(1.08);
}

.secondary{
  background:rgba(255,82,104,0.1);
}

input, select{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:1px solid var(--shell-line);
  background:rgba(28,8,12,0.68);
  color:var(--shell-text);
}

.lobby{
  background:linear-gradient(135deg, rgba(96,29,37,0.64), rgba(33,9,14,0.66));
  border:1px solid rgba(255,91,105,0.16);
  padding:16px;
  border-radius:8px;
  margin-top:12px;
  text-align:left;
}

.players{
  margin-top:5px;
  font-size:14px;
  color:var(--shell-soft);
}

.empty-state{
  background:rgba(28,8,12,0.58);
  border:1px dashed var(--shell-line);
  color:var(--shell-soft);
  border-radius:8px;
  padding:14px;
}

.ready{ color:#22c55e; }
.notready{ color:#ef4444; }

#blockedScreen{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(9,3,5,0.96);
  color:white;
  z-index:9999;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

@media (max-width:880px){
  .lobby-layout{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body class="with-navbar">
  
<div id="navbar-container"></div>


<!-- BLOCK SCREEN -->
<div id="blockedScreen">
  <h1>Games Disabled</h1>
  <p>Come back later.</p>
  <button onclick="goBack()">Back</button>
</div>

<div class="container">

<h1>Chess Lobby</h1>
<p class="lobby-subtitle">Create a ranked room, choose your clock, and start the duel.</p>

<section class="lobby-layout">
  <div class="card lobby-create">
    <span class="game-kicker">New Match</span>
    <h2>Create Room</h2>
    <input id="name" placeholder="Lobby name">
    <select id="mode">
      <option value="120">Bullet (2 min)</option>
      <option value="300">Blitz (5 min)</option>
      <option value="600">Fast (10 min)</option>
      <option value="1800">Slow (30 min)</option>
    </select>
    <button onclick="createLobby()">Create Lobby</button>
    <div class="invite-row">
      <input id="inviteUsername" placeholder="Invite username">
      <button onclick="sendInvite()">Invite</button>
    </div>
    <button class="secondary" onclick="goBack()">Back</button>
    <div class="rules">
      <strong>Time controls:</strong> Bullet 2 min, Blitz 5 min, Fast 10 min, Slow 30 min.<br>
      <strong>Rules:</strong> timer at 0 = loss, and a disconnection longer than 1 minute = forfeit.
    </div>
  </div>

  <div class="card">
    <h3>Available Lobbies</h3>
    <div id="lobbies"></div>
  </div>
</section>

</div>

<script>

async function checkGamesAccess(){
  try{
    const res = await fetch("/api/games/status");
    const data = await res.json();

    if(!data.enabled){
      document.getElementById("blockedScreen").style.display = "flex";
      return false;
    }

    return true;

  }catch(err){
    console.error(err);
    return true;
  }
}

(async ()=>{

  const allowed = await checkGamesAccess();
  if(!allowed) return;

  const user = JSON.parse(localStorage.getItem("user") || "null");

  if(!user){
    window.location.href = "/login.html";
  }

  // 🔥 FIX SOCKET SAFE
  let socket;
  if(typeof io !== "undefined"){
    socket = io();
    window.StrategyLeagueSocket = socket;
  }else{
    console.error("Socket.io not loaded");
    return;
  }

  socket.emit("register_online", user.username);
  socket.on("online_users", users=>{
    window.dispatchEvent(new CustomEvent("site-shell-online-users", { detail: users }));
  });
  const modeLabels = {
    120: "Bullet (2 min)",
    300: "Blitz (5 min)",
    600: "Fast (10 min)",
    1800: "Slow (30 min)"
  };
  
  socket.on("lobbies_update", lobbies=>{

      const list = Object.values(lobbies);

      if(!list.length){
        document.getElementById("lobbies").innerHTML = "<div class='empty-state'>No lobby yet. Create the first room.</div>";
        return;
      }

      document.getElementById("lobbies").innerHTML =
      list.map(l=>{

        const me = l.players.find(p=>p.username===user.username);

        return `
          <div class="lobby">
            <strong>${l.name}</strong> (${modeLabels[l.time] || `${l.time}s`})
            
            <div class="players">
              ${l.players.map(p=>`
                <span class="${p.ready?'ready':'notready'}">
                  ${p.username} ${p.ready?'✔':'✖'}
                </span>
              `).join(", ")}
            </div>

            ${
              !me
              ? `<button onclick="joinLobby('${l.id}')">Join</button>`
              : `<button onclick="toggleReady('${l.id}')">Ready</button>`
            }
          </div>
        `;
      }).join("");
  });

  function createLobby(){
    const name = document.getElementById("name").value || "Chess Room";
    const time = parseInt(document.getElementById("mode").value);
    socket.emit("create_lobby",{ name, time });
  }

  function joinLobby(id){
    socket.emit("join_lobby", id);
  }

  function toggleReady(id){
    socket.emit("toggle_ready", id);
  }

  function sendInvite(){
    const toUsername = document.getElementById("inviteUsername").value.trim();
    if(!toUsername) return;
    socket.emit("send_game_invite", { toUsername, gameKey: "chess" });
  }

  socket.on("chess_start", (data)=>{
  localStorage.setItem("chessSession", JSON.stringify(data));
    window.location.href = "/chess/chess-game.html";
  });

  window.createLobby = createLobby;
  window.joinLobby = joinLobby;
  window.toggleReady = toggleReady;
  window.sendInvite = sendInvite;

})();

function goBack(){
  window.location.href = "/games.html";
}

</script>

</body>
</html>
