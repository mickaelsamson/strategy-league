<!DOCTYPE html>
<html>
<head>
<title>Chess Lobby</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  display:flex;
}

#main{
  flex:1;
  text-align:center;
}

#sidebar{
  width:250px;
  background:#111827;
  padding:10px;
}

.player{
  padding:8px;
  border-bottom:1px solid #1f2937;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

.player:hover{
  background:#1f2937;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
}

.status{
  font-size:12px;
}

.idle{color:lightgreen;}
.playing{color:red;}

#profilePopup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111827;
  padding:20px;
  border-radius:12px;
  display:none;
  text-align:center;
}
</style>
</head>

<body>

<div id="main">

<h2>♟️ Chess Lobby</h2>

<input id="name" placeholder="Lobby name">

<select id="mode">
  <option value="30">Blitz (30s)</option>
  <option value="60">Rapid (60s)</option>
  <option value="90">Classic (90s)</option>
  <option value="120">Snail (120s)</option>
</select>

<button onclick="createLobby()">Create</button>

<div id="lobbies"></div>
<div id="board"></div>

</div>

<div id="sidebar">
  <h3>Players</h3>
  <div id="players"></div>
</div>

<div id="profilePopup"></div>

<script>

const socket=io();
const user=JSON.parse(localStorage.getItem("user"));

let currentUsers={};

socket.emit("register_online", user.username);

/* ONLINE */
socket.on("online_users", users=>{
  currentUsers=users;

  document.getElementById("players").innerHTML =
    Object.entries(users).map(([name,data])=>`
      <div class="player" onclick="openProfile('${name}')">
        <div>
          <img src="${data.avatar}" class="avatar">
          ${name} (${data.elo})
          <div class="status ${data.status}">
            ${data.status}
          </div>
        </div>

        ${name!==user.username ? 
          `<button onclick="invite('${name}');event.stopPropagation()">+</button>` : ""}
      </div>
    `).join("");
});

/* PROFILE */
function openProfile(name){
  const data=currentUsers[name];

  const popup=document.getElementById("profilePopup");

  popup.style.display="block";

  popup.innerHTML=`
    <img src="${data.avatar}" class="avatar"><br><br>
    <b>${name}</b><br>
    ELO: ${data.elo}<br><br>
    <button onclick="closeProfile()">Close</button>
  `;
}

function closeProfile(){
  document.getElementById("profilePopup").style.display="none";
}

/* LOBBY */
function createLobby(){
  socket.emit("create_lobby",{
    name:document.getElementById("name").value,
    time:parseInt(document.getElementById("mode").value)
  });
}

socket.on("lobbies_update", lobbies=>{
  document.getElementById("lobbies").innerHTML =
    Object.values(lobbies).map(l=>`
      <div>
        <b>${l.name}</b> (${l.time}s)<br>
        ${l.players.map(p=>p.username).join(", ")}<br>
        <button onclick="join('${l.id}')">Join</button>
      </div>
    `).join("");
});

function join(id){
  socket.emit("join_lobby", id);
}

function invite(name){
  const lobbyId = Object.keys(currentUsers).length ? Object.keys(lobbies)[0] : null;
  socket.emit("invite_player",{target:name,lobbyId});
}

/* GAME */
let game=new Chess();
let selected=null;
let playerColor=null;

socket.on("chess_start", data=>{
  playerColor=data.color;
  draw();
});

socket.on("chess_update", data=>{
  game.load(data.fen);
  draw();
});

function draw(){
  const el=document.getElementById("board");
  el.innerHTML="";

  const state=game.board();

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){

      const c=document.createElement("div");
      c.style.display="inline-block";
      c.style.width="60px";
      c.style.height="60px";
      c.style.background=(x+y)%2?"#444":"#eee";

      const p=state[y][x];
      c.innerText=p?p.type:"";

      const sq=String.fromCharCode(97+x)+(8-y);

      c.onclick=()=>clickCell(sq);

      el.appendChild(c);
    }
    el.appendChild(document.createElement("br"));
  }
}

function clickCell(sq){

  if(game.turn()!==playerColor) return;

  if(!selected){
    if(game.moves({square:sq}).length===0) return;
    selected=sq;
  } else {

    const move=game.move({from:selected,to:sq,promotion:'q'});
    selected=null;

    if(move){
      socket.emit("chess_move",{from:move.from,to:move.to,fen:game.fen()});
      draw();
    }
  }
}

</script>

</body>
</html>
