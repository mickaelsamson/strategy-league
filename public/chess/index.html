<!DOCTYPE html>
<html>
<head>
<title>Chess</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
  font-family:Arial;
  text-align:center;
}

#board{
  width:480px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(8,1fr);
}

.cell{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

.white{background:#eee;color:black;}
.black{background:#444;}

button{
  padding:8px;
  margin:5px;
}
</style>
</head>

<body>

<h2>♟️ Chess</h2>

<div id="lobby"></div>
<div id="status"></div>
<div id="board"></div>

<button onclick="rematch()">Rematch</button>

<script>

const socket = io();
let game = new Chess();
let selected = null;
let playerColor = null;

const user = JSON.parse(localStorage.getItem("user"));

socket.emit("register_online", user.username);
socket.emit("chess_lobby_join");

/* ONLINE */
socket.on("online_users", users=>{
  document.getElementById("lobby").innerHTML =
    "<h3>Online</h3>" +
    users.map(u => `
      ${u}
      ${u !== user.username ? `<button onclick="invite('${u}')">Invite</button>`:""}
      <br>
    `).join("");
});

function invite(name){
  socket.emit("invite_player", name);
}

socket.on("invite_received", from=>{
  if(confirm(from+" invited you")){
    socket.emit("accept_invite", from);
  }
});

/* LOBBY */
socket.on("chess_lobby", players=>{
  document.getElementById("status").innerHTML =
    players.map(p=>`${p.name} ${p.ready?'✅':'❌'}`).join("<br>") +
    `<br><button onclick="ready()">Ready</button>`;
});

function ready(){
  socket.emit("chess_ready");
}

/* START */
socket.on("chess_start", data=>{
  playerColor = data.color;
  draw();
});

/* UPDATE */
socket.on("chess_update", data=>{
  game.load(data.fen);
  draw();
});

/* TIMER */
socket.on("chess_timer", players=>{
  const me = players.find(p=>p.color===playerColor);
  if(me){
    document.getElementById("status").innerText = "Time: "+me.time;
  }
});

/* END */
socket.on("chess_end", data=>{
  alert("Winner: "+data.winner);
});

/* REMATCH */
function rematch(){
  socket.emit("chess_rematch");
}

/* DRAW */
function draw(){

  const el=document.getElementById("board");
  el.innerHTML="";

  const state=game.board();

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){

      const c=document.createElement("div");
      c.className="cell "+((x+y)%2?"black":"white");

      const p=state[y][x];
      c.innerText=p?p.type:"";

      const sq=String.fromCharCode(97+x)+(8-y);

      c.onclick=()=>clickCell(sq);

      el.appendChild(c);
    }
  }
}

/* MOVE */
function clickCell(sq){

  if(game.turn()!==playerColor) return;

  if(!selected){
    if(game.moves({square:sq}).length===0) return;
    selected=sq;
  } else {

    const move=game.move({from:selected,to:sq,promotion:'q'});
    selected=null;

    if(move){
      socket.emit("chess_move",{from:move.from,to:move.to,fen:game.fen()});
      draw();
    }
  }
}

</script>

</body>
</html>
