<!DOCTYPE html>
<html>
<head>
<title>Chess Lobby</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  padding-top:80px; /* 🔥 navbar fix */
}

.container{
  width:100%;
  max-width:800px;
  padding:20px;
  text-align:center;
}

h1{
  margin-bottom:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#3b82f6;
  color:white;
}

button:hover{
  background:#2563eb;
}

.secondary{
  background:#1f2937;
}

input, select{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

.lobby{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  text-align:left;
}

.players{
  margin-top:5px;
  font-size:14px;
  color:#9ca3af;
}

.ready{ color:#22c55e; }
.notready{ color:#ef4444; }

/* BLOCK SCREEN */
#blockedScreen{
  display:none;
  position:fixed;
  inset:0;
  background:#020617;
  color:white;
  z-index:9999; /* 🔥 au-dessus navbar */
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<div id="navbar-container"></div>

<script>
fetch("/components/navbar.html")
  .then(res => res.text())
  .then(html => {

    const container = document.getElementById("navbar-container");
    container.innerHTML = html;

    const user = JSON.parse(localStorage.getItem("user"));

    // ADMIN BUTTON NAVBAR
    if(user && user.isAdmin){
      const adminBtn = document.getElementById("adminNav");
      if(adminBtn){
        adminBtn.style.display = "inline-block";
      }
    }

    // NAVIGATION
    document.querySelectorAll("[data-link]").forEach(btn=>{
      btn.addEventListener("click", ()=>{

        const link = btn.dataset.link;

        if(link === "home") window.location.href = "/";
        if(link === "games") window.location.href = "/games.html";
        if(link === "leaderboard") window.location.href = "/leaderboard.html";
        if(link === "profile") window.location.href = "/profile.html";
        if(link === "admin") window.location.href = "/admin.html";

        if(link === "logout"){
          localStorage.removeItem("user");
          window.location.href = "/login.html";
        }

      });
    });

  });
</script>

<!-- 🔒 BLOCK SCREEN -->
<div id="blockedScreen">
  <h1>⛔ Games Disabled</h1>
  <p>Come back later 👋</p>
  <button onclick="goBack()">⬅ Back</button>
</div>

<div class="container">

<h1>♟️ Chess Lobby</h1>

<div class="card">
  <input id="name" placeholder="Lobby name">
  <select id="mode">
    <option value="30">Blitz</option>
    <option value="60">Rapid</option>
    <option value="120">Snail</option>
  </select>
  <br>
  <button onclick="createLobby()">Create Lobby</button>
  <button class="secondary" onclick="goBack()">⬅ Back</button>
</div>

<div class="card">
  <h3>Available Lobbies</h3>
  <div id="lobbies"></div>
</div>

</div>

<script>

async function checkGamesAccess(){
  try{
    const res = await fetch("/api/games/status");
    const data = await res.json();

    if(!data.enabled){
      document.getElementById("blockedScreen").style.display = "flex";
      return false;
    }

    return true;

  }catch(err){
    console.error(err);
    return true;
  }
}

(async ()=>{

  const allowed = await checkGamesAccess();
  if(!allowed) return;

  const socket = io();
  const user = JSON.parse(localStorage.getItem("user"));

  if(!user){
    window.location.href = "/login.html";
  }

  socket.emit("register_online", user.username);

  socket.on("lobbies_update", lobbies=>{

    const list = Object.values(lobbies);

    document.getElementById("lobbies").innerHTML =
      list.map(l=>{

        const me = l.players.find(p=>p.username===user.username);

        return `
          <div class="lobby">
            <strong>${l.name}</strong> (${l.time}s)

            <div class="players">
              ${l.players.map(p=>`
                <span class="${p.ready?'ready':'notready'}">
                  ${p.username} ${p.ready?'✔':'✖'}
                </span>
              `).join(", ")}
            </div>

            ${
              !me
              ? `<button onclick="joinLobby('${l.id}')">Join</button>`
              : `<button onclick="toggleReady('${l.id}')">Ready</button>`
            }
          </div>
        `;
      }).join("");
  });

  function createLobby(){
    const name = document.getElementById("name").value || "Chess Room";
    const time = parseInt(document.getElementById("mode").value);

    socket.emit("create_lobby",{ name, time });
  }

  function joinLobby(id){
    socket.emit("join_lobby", id);
  }

  function toggleReady(id){
    socket.emit("toggle_ready", id);
  }

  socket.on("chess_start", ()=>{
    window.location.href = "/chess/chess-game.html";
  });

  window.createLobby = createLobby;
  window.joinLobby = joinLobby;
  window.toggleReady = toggleReady;

})();

function goBack(){
  window.location.href = "/games.html";
}

</script>

</body>
</html>
