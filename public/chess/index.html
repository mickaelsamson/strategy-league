<!DOCTYPE html>
<html>
<head>
<title>Chess Lobby</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{
  margin:0;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
  font-family:Arial;
  text-align:center;
}

/* LOBBY */
#lobby{
  margin:20px;
}

.player{
  margin:5px;
}

button{
  padding:8px 12px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
  background:#1f2937;
  color:white;
}

button:hover{
  background:#374151;
}

/* BOARD */
#board{
  width:480px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(8,1fr);
}

.cell{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

.white{background:#eee;color:black;}
.black{background:#444;}
</style>
</head>

<body>

<h2>♟️ Chess Lobby</h2>

<!-- TIME SELECT -->
<div>
  Time:
  <select id="time">
    <option value="60">1 min</option>
    <option value="300" selected>5 min</option>
    <option value="600">10 min</option>
  </select>
</div>

<!-- ONLINE PLAYERS -->
<div id="lobby"></div>

<!-- STATUS -->
<div id="status"></div>

<!-- BOARD -->
<div id="board"></div>

<button onclick="rematch()">Rematch</button>

<script>

const socket = io();
let game = new Chess();
let selected = null;
let playerColor = null;

const user = JSON.parse(localStorage.getItem("user"));

socket.emit("register_online", user.username);

/* ONLINE PLAYERS */
socket.on("online_users", users=>{
  document.getElementById("lobby").innerHTML =
    "<h3>Players</h3>" +
    users.map(u => `
      <div class="player">
        ${u}
        ${u !== user.username ?
          `<button onclick="invite('${u}')">Invite</button>`:""}
      </div>
    `).join("");
});

/* INVITE */
function invite(name){
  const time = parseInt(document.getElementById("time").value);

  socket.emit("invite_player", {
    target:name,
    time
  });
}

/* RECEIVE INVITE */
socket.on("invite_received", data=>{
  if(confirm(`${data.from} invites you (${data.time}s). Accept?`)){
    socket.emit("accept_invite", {
      opponent:data.from,
      time:data.time
    });
  }
});

/* START */
socket.on("chess_start", data=>{
  playerColor = data.color;
  document.getElementById("status").innerText =
    "Game started ("+(playerColor==='w'?'White':'Black')+")";

  draw();
});

/* UPDATE */
socket.on("chess_update", data=>{
  game.load(data.fen);
  draw();
});

/* TIMER */
socket.on("chess_timer", players=>{
  const me = players.find(p=>p.color===playerColor);
  if(me){
    document.getElementById("status").innerText =
      "Time: "+me.time+"s";
  }
});

/* END */
socket.on("chess_end", data=>{
  alert("Winner: "+data.winner);
});

/* REMATCH */
function rematch(){
  socket.emit("chess_rematch");
}

/* DRAW */
function draw(){
  const el=document.getElementById("board");
  el.innerHTML="";

  const state=game.board();

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){

      const c=document.createElement("div");
      c.className="cell "+((x+y)%2?"black":"white");

      const p=state[y][x];
      c.innerText=p?p.type:"";

      const sq=String.fromCharCode(97+x)+(8-y);

      c.onclick=()=>clickCell(sq);

      el.appendChild(c);
    }
  }
}

/* MOVE */
function clickCell(sq){

  if(game.turn()!==playerColor) return;

  if(!selected){
    if(game.moves({square:sq}).length===0) return;
    selected=sq;
  } else {

    const move=game.move({from:selected,to:sq,promotion:'q'});
    selected=null;

    if(move){
      socket.emit("chess_move",{
        from:move.from,
        to:move.to,
        fen:game.fen()
      });
      draw();
    }
  }
}

</script>

</body>
</html>
