<!DOCTYPE html>
<html>
<head>
<title>Chess</title>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
}

#board{
  width:480px;
  height:480px;
  margin:40px auto;
  display:grid;
  grid-template-columns:repeat(8,1fr);
}

.cell{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  cursor:pointer;
}

.white{ background:#f1f5f9; color:black; }
.black{ background:#334155; }

.selected{
  outline:3px solid yellow;
}
</style>

</head>

<body>

<div class="header">
  <div id="player"></div>
  <button onclick="logout()">Logout</button>
</div>

<h2>♟️ Chess</h2>

<div id="board"></div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="/login.html";
}else{
  player.innerText = "👑 " + user.username;
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  window.location.href="/login.html";
}

/* PIECES */
const pieces = {
  r:"♜", n:"♞", b:"♝", q:"♛", k:"♚", p:"♟",
  R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔", P:"♙"
};

/* BOARD INIT */
let board = [
  ["r","n","b","q","k","b","n","r"],
  ["p","p","p","p","p","p","p","p"],
  ["","","","","","","",""],
  ["","","","","","","",""],
  ["","","","","","","",""],
  ["","","","","","","",""],
  ["P","P","P","P","P","P","P","P"],
  ["R","N","B","Q","K","B","N","R"]
];

let selected = null;

/* DRAW */
function draw(){
  const el = document.getElementById("board");
  el.innerHTML = "";

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){

      const cell = document.createElement("div");

      cell.className = "cell " + ((x+y)%2 ? "black":"white");

      const piece = board[y][x];
      cell.innerText = pieces[piece] || "";

      cell.onclick = ()=>clickCell(x,y,cell);

      el.appendChild(cell);
    }
  }
}

/* CLICK */
function clickCell(x,y,cell){

  if(selected === null){
    if(board[y][x] !== ""){
      selected = {x,y};
      cell.classList.add("selected");
    }
  } else {

    // MOVE (simple, no rules yet)
    board[y][x] = board[selected.y][selected.x];
    board[selected.y][selected.x] = "";

    selected = null;
    draw();
  }
}

draw();

</script>

</body>
</html>
