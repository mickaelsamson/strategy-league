<!DOCTYPE html>
<html>
<head>
<title>Chess</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial;text-align:center;}

#boardWrapper{
  position:relative;
  width:90vw;
  max-width:520px;
  aspect-ratio:1/1;
  margin:20px auto;
}

#boardWrapper img{
  width:100%;
  height:100%;
  object-fit:cover;
}

#piecesLayer,#clickLayer{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
}

.square{
  position:absolute;
  width:12.5%;
  height:12.5%;
}

.selected{outline:3px solid #3b82f6;}
.move{background:rgba(34,197,94,0.4);border-radius:50%;}

.piece{
  position:absolute;
  width:12.5%;
  height:12.5%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.piece img{
  width:80%;
  height:80%;
}

/* UI */
#turn{font-size:18px;margin:10px;}
#status{font-size:18px;color:#facc15;}
</style>
</head>

<body>

<h2>♟️ Chess</h2>

<div id="turn">Turn: -</div>
<div id="status"></div>

<div id="boardWrapper">
  <img src="/chess/board.png">
  <div id="piecesLayer"></div>
  <div id="clickLayer"></div>
</div>

<script>

const socket = io();
const user = JSON.parse(localStorage.getItem("user"));

if(user){
  socket.emit("register_online", user.username);
}

let game = new Chess();
let selected = null;
let possibleMoves = [];
let playerColor = null;

/* 🔥 NOM DES JOUEURS */
let myName = user?.username || "You";
let opponentName = "Opponent";

/* PIECES */
const pieceMap = {
  wP:"wP.svg", wR:"wR.svg", wN:"wN.svg",
  wB:"wB.svg", wQ:"wQ.svg", wK:"wK.svg",
  bP:"bP.svg", bR:"bR.svg", bN:"bN.svg",
  bB:"bB.svg", bQ:"bQ.svg", bK:"bK.svg"
};

/* START */
socket.on("chess_start", data=>{
  playerColor = data.color;

  /* 🔥 on reconstruit noms */
  if(playerColor === 'w'){
    myName = user.username;
    opponentName = "Player Black";
  }else{
    myName = user.username;
    opponentName = "Player White";
  }

  game.reset();
  updateUI();
  draw();
});

/* UPDATE */
socket.on("chess_update", data=>{
  if(data.fen) game.load(data.fen);
  updateUI();
  draw();
});

/* UI */
function updateUI(){

  let turnColor = game.turn();

  let currentPlayer =
    (turnColor === playerColor)
    ? myName
    : opponentName;

  document.getElementById("turn").innerText =
    "Turn: " + currentPlayer;

  /* 🔥 FIX CHECK */
  if(game.in_check() && !game.in_checkmate()){
    document.getElementById("status").innerText = "⚠️ CHECK!";
  }
  else if(game.in_checkmate()){
    const winner =
      (game.turn() === playerColor)
      ? opponentName
      : myName;

    document.getElementById("status").innerText =
      "🏆 " + winner + " wins!";
  }
  else{
    document.getElementById("status").innerText = "";
  }
}

/* DRAW */
function draw(){

  const p = document.getElementById("piecesLayer");
  const c = document.getElementById("clickLayer");

  p.innerHTML="";
  c.innerHTML="";

  const board = game.board();

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){

      const sq = String.fromCharCode(97+x)+(8-y);
      const piece = board[y][x];

      const cell = document.createElement("div");
      cell.className="square";
      cell.style.left=(x*12.5)+"%";
      cell.style.top=(y*12.5)+"%";

      if(selected === sq) cell.classList.add("selected");
      if(possibleMoves.includes(sq)) cell.classList.add("move");

      cell.onclick=()=>clickCell(sq);
      c.appendChild(cell);

      if(piece){
        const wrapper=document.createElement("div");
        wrapper.className="piece";
        wrapper.style.left=(x*12.5)+"%";
        wrapper.style.top=(y*12.5)+"%";

        const img=document.createElement("img");
        const key=piece.color+piece.type.toUpperCase();
        img.src="/chess/pieces/"+pieceMap[key];

        wrapper.appendChild(img);
        p.appendChild(wrapper);
      }
    }
  }
}

/* MOVE */
function clickCell(sq){

  if(game.turn() !== playerColor) return;

  if(!selected){
    const moves = game.moves({square:sq, verbose:true});
    if(moves.length === 0) return;

    selected = sq;
    possibleMoves = moves.map(m=>m.to);

  }else{

    const move = game.move({
      from:selected,
      to:sq,
      promotion:'q'
    });

    selected = null;
    possibleMoves = [];

    if(move){
      socket.emit("chess_move",{fen:game.fen()});
    }
  }

  updateUI();
  draw();
}

draw();

</script>

</body>
</html>
