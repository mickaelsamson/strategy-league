<!DOCTYPE html>
<html>
<head>
<title>Chess Rooms</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{
  margin:0;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
  font-family:Arial;
  text-align:center;
}

.room{
  background:#1f2937;
  margin:10px auto;
  padding:10px;
  border-radius:10px;
  width:300px;
}

button{
  padding:8px;
  margin:5px;
  border-radius:8px;
  background:#374151;
  color:white;
  cursor:pointer;
}

#board{
  width:480px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(8,1fr);
}

.cell{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.white{background:#eee;color:black;}
.black{background:#444;}
</style>
</head>

<body>

<h2>♟️ Chess Rooms</h2>

<div id="rooms"></div>

<div id="status"></div>

<div id="board"></div>

<script>

const socket = io();
let game = new Chess();
let selected = null;
let playerColor = null;

const user = JSON.parse(localStorage.getItem("user"));

socket.emit("register_online", user.username);

/* ROOMS */
socket.on("rooms_update", rooms=>{

  document.getElementById("rooms").innerHTML = Object.entries(rooms).map(([key,r])=>`
    <div class="room">
      <h3>${r.name} (${r.time}s)</h3>
      Players: ${r.players.map(p=>p.username).join(", ") || "Empty"}
      <br>
      <button onclick="join('${key}')">Join</button>
    </div>
  `).join("");
});

function join(room){
  socket.emit("join_room", room);
}

/* START */
socket.on("chess_start", data=>{
  playerColor = data.color;
  document.getElementById("status").innerText =
    "Game started ("+(playerColor==='w'?'White':'Black')+")";
  draw();
});

/* UPDATE */
socket.on("chess_update", data=>{
  game.load(data.fen);
  draw();
});

/* TIMER */
socket.on("chess_timer", players=>{
  const me = players.find(p=>p.color===playerColor);
  if(me){
    document.getElementById("status").innerText =
      "Time: "+me.time;
  }
});

/* DRAW */
function draw(){

  const el=document.getElementById("board");
  el.innerHTML="";

  const state=game.board();

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){

      const c=document.createElement("div");
      c.className="cell "+((x+y)%2?"black":"white");

      const p=state[y][x];
      c.innerText=p?p.type:"";

      const sq=String.fromCharCode(97+x)+(8-y);

      c.onclick=()=>clickCell(sq);

      el.appendChild(c);
    }
  }
}

function clickCell(sq){

  if(game.turn()!==playerColor) return;

  if(!selected){
    if(game.moves({square:sq}).length===0) return;
    selected=sq;
  } else {

    const move=game.move({from:selected,to:sq,promotion:'q'});
    selected=null;

    if(move){
      socket.emit("chess_move",{from:move.from,to:move.to,fen:game.fen()});
      draw();
    }
  }
}

</script>

</body>
</html>
