<!DOCTYPE html>
<html>
<head>
<title>Chess</title>

<!-- ENGINE (ta version qui marche) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{
  margin:0;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
  font-family:Arial;
  text-align:center;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
}

#player{
  font-weight:bold;
}

/* BOARD */
#board{
  width:520px;
  height:520px;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

/* CELLS */
.cell{
  width:65px;
  height:65px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  cursor:pointer;
  user-select:none;
}

.white{ background:#f0d9b5; color:black; }
.black{ background:#b58863; }

/* STATES */
.selected{
  outline:4px solid yellow;
}

.move{
  box-shadow:inset 0 0 15px rgba(255,255,0,0.7);
}

.capture{
  box-shadow:inset 0 0 15px rgba(255,0,0,0.7);
}

/* STATUS */
#status{
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <div id="player"></div>
  <button onclick="logout()">Logout</button>
</div>

<h2>♟️ Chess</h2>

<div id="status"></div>

<div id="board"></div>

<script>

const game = new Chess();
let selected = null;

/* SESSION */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="/login.html";
}else{
  document.getElementById("player").innerText = "👑 " + user.username;
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  window.location.href="/login.html";
}

/* PIECES */
const pieces = {
  p:"♟", r:"♜", n:"♞", b:"♝", q:"♛", k:"♚",
  P:"♙", R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔"
};

/* DRAW */
function draw(){

  const board = document.getElementById("board");
  board.innerHTML = "";

  const state = game.board();

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){

      const cell = document.createElement("div");

      cell.className = "cell " + ((x+y)%2 ? "black":"white");

      const piece = state[y][x];
      cell.innerText = piece ? pieces[piece.type === piece.type.toLowerCase() ? piece.type : piece.type.toUpperCase()] : "";

      const square = String.fromCharCode(97+x) + (8-y);

      cell.onclick = ()=>clickCell(square, cell);

      board.appendChild(cell);
    }
  }

  updateStatus();
}

/* CLICK */
function clickCell(square, cell){

  if(selected === null){

    const moves = game.moves({ square, verbose:true });

    if(moves.length === 0) return;

    selected = square;
    cell.classList.add("selected");

    highlightMoves(moves);

  } else {

    const move = game.move({
      from: selected,
      to: square,
      promotion: 'q'
    });

    clearHighlights();
    selected = null;

    if(move){
      draw();
    }
  }
}

/* HIGHLIGHT */
function highlightMoves(moves){

  moves.forEach(m=>{
    const index = squareToIndex(m.to);
    const target = document.getElementById("board").children[index];

    if(m.captured){
      target.classList.add("capture");
    } else {
      target.classList.add("move");
    }
  });

}

/* CLEAR */
function clearHighlights(){
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("selected","move","capture");
  });
}

/* UTILS */
function squareToIndex(sq){
  const file = sq.charCodeAt(0) - 97;
  const rank = 8 - parseInt(sq[1]);
  return rank * 8 + file;
}

/* STATUS */
function updateStatus(){

  let text = "";

  if(game.in_checkmate()){
    text = "♛ Checkmate!";
  }
  else if(game.in_check()){
    text = "⚠ Check!";
  }
  else{
    text = (game.turn() === 'w' ? "White" : "Black") + " to move";
  }

  document.getElementById("status").innerText = text;
}

/* INIT */
draw();

</script>

</body>
</html>
