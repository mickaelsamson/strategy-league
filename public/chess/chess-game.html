<!DOCTYPE html>
<html>
<head>
<title>Chess</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  display:flex;
}

/* MAIN LAYOUT */
#main{
  flex:1;
  text-align:center;
  padding-top:10px;
}

#sidebar{
  width:260px;
  background:#111827;
  padding:15px;
  border-left:1px solid #1f2937;
}

/* PLAYER PANEL */
.player-card{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin:10px auto;
  max-width:520px;
  display:flex;
  justify-content:space-between;
}

.you{border-left:4px solid #22c55e;}
.opponent{border-left:4px solid #ef4444;}

/* TIMER */
.timer{
  max-width:520px;
  margin:5px auto 10px auto;
  background:#1f2937;
  padding:8px;
  border-radius:8px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
  transition:0.2s;
}

.timer.active{
  background:#3b82f6;
  box-shadow:0 0 10px #3b82f6;
}

.timer.low{
  background:#ef4444;
}

/* BOARD */
#boardWrapper{
  position:relative;
  width:90vw;
  max-width:520px;
  aspect-ratio:1/1;
  margin:10px auto;
}

#boardWrapper img{
  width:100%;
  height:100%;
}

#piecesLayer,#clickLayer{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* SQUARES */
.square{
  position:absolute;
  width:12.5%;
  height:12.5%;
  cursor:pointer;
}

.selected{ outline:3px solid #3b82f6; }
.move{ background:rgba(34,197,94,0.4); border-radius:50%; }
.check{ background:rgba(239,68,68,0.6); }
.attacker{ background:rgba(239,68,68,0.3); }

/* PIECES */
.piece{
  position:absolute;
  width:12.5%;
  height:12.5%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece img{
  width:80%;
  height:80%;
}
.piece.king-in-check{
  background:rgba(239,68,68,0.45);
  border-radius:50%;
}

/* STATUS */
#turn{
  margin:10px;
  font-size:18px;
}

#status{
  font-size:18px;
  margin:5px;
}

#disconnectTimer{
  color:#f87171;
  margin:5px;
}

/* XP REWARD POPUP */
#xpRewardOverlay{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(2,6,23,0.28);
  pointer-events:none;
  opacity:0;
  transform:scale(0.95);
  transition:opacity 320ms ease, transform 320ms ease;
  z-index:1000;
}

#xpRewardOverlay.show{
  opacity:1;
  transform:scale(1);
}

.xp-reward-card{
  position:relative;
  min-width:280px;
  max-width:90vw;
  padding:22px 30px;
  border-radius:16px;
  border:1px solid rgba(56,189,248,0.35);
  background:linear-gradient(160deg, rgba(30,41,59,0.96), rgba(15,23,42,0.98));
  box-shadow:0 20px 70px rgba(2,132,199,0.28), inset 0 0 30px rgba(56,189,248,0.1);
  text-align:center;
  overflow:hidden;
  animation:xpCardEnter 420ms cubic-bezier(0.22,1,0.36,1);
}

.xp-reward-title{
  margin:0;
  color:#cbd5e1;
  font-size:14px;
  letter-spacing:0.16em;
  text-transform:uppercase;
}

.xp-reward-value{
  margin:10px 0 4px 0;
  font-size:48px;
  font-weight:800;
  color:#38bdf8;
  text-shadow:0 0 24px rgba(56,189,248,0.5);
}

.xp-reward-subtitle{
  margin:0;
  color:#93c5fd;
  font-size:13px;
}

#xpParticles{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.xp-particle{
  position:absolute;
  bottom:28px;
  left:50%;
  width:var(--size,8px);
  height:var(--size,8px);
  border-radius:999px;
  background:radial-gradient(circle at 30% 30%, #dbeafe, #38bdf8 70%);
  opacity:0;
  transform:translate3d(0,0,0) scale(0.4);
  animation:xpParticle 900ms ease-out forwards;
  animation-delay:var(--delay, 0ms);
}

@keyframes xpCardEnter{
  from{
    opacity:0;
    transform:translateY(14px) scale(0.93);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

@keyframes xpParticle{
  0%{
    opacity:0;
    transform:translate3d(0, 0, 0) scale(0.4);
  }
  18%{
    opacity:1;
  }
  100%{
    opacity:0;
    transform:translate3d(var(--x, 0px), -120px, 0) scale(1);
  }
}

/* BUTTONS */
button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
}

#resignBtn{background:#ef4444;}
#resignBtn:hover{background:#dc2626;}

#rematchBtn{background:#f59e0b;}
#rematchBtn:hover{background:#d97706;}

#endGameBtn{background:#22c55e;}
#endGameBtn:hover{background:#16a34a;}

/* PLAYERS LIST */
.player{
  padding:6px;
  border-bottom:1px solid #1f2937;
}
</style>

  <img src="/chess/board.png">
  <div id="piecesLayer"></div>
  <div id="clickLayer"></div>

</div>

<div id="sidebar">

</div>

  <div class="xp-reward-card">

</div>

<script>

const socket = io();
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "/login.html";
}

socket.emit("register_online", user.username);

let game = new Chess();
let selected = null;
let possibleMoves = [];
let playerColor = null;

let myName = "";
let opponentName = "";
let gameOver = false;
let gameEndSent = false;
let xpPopupTimeout = null;
function applyStartData(data){
  gameOver = false;
  gameEndSent = false;
  selected = null;
  possibleMoves = [];

  playerColor = data.color;

  myName = user.username;
  opponentName =
    user.username === data.players.white
      ? data.players.black
      : data.players.white;

  document.getElementById("youName").innerText = myName;
  document.getElementById("opponentName").innerText = opponentName;

  document.getElementById("youColor").innerText =
    playerColor === 'w' ? "White" : "Black";

  document.getElementById("opponentColor").innerText =
    playerColor === 'w' ? "Black" : "White";

  if(data.fen){
    game.load(data.fen);
  }else{
    game.reset();
  }

  myTime = 60;
  opponentTime = 60;
  startTimer();
  updateTimerUI();
  document.getElementById("status").innerText = "";
  document.getElementById("rematchBtn").style.display = "none";
  document.getElementById("endGameBtn").style.display = "none";
  hideXpRewardPopup();
  updateUI();
  draw();
}
 
  
/* TIMER */
let myTime = 60;
let opponentTime = 60;
let timerInterval = null;

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);

  timerInterval = setInterval(()=>{
    if(gameOver) return;

    if(game.turn() === playerColor){
      myTime--;
    }else{
      opponentTime--;
    }

    updateTimerUI();

  },1000);
@@ -316,50 +428,55 @@ socket.on("chess_start", data=>{
  applyStartData(data);
  
});

socket.on("chess_update", data=>{
  if(data.fen) game.load(data.fen);
  updateUI();
  draw();
  updateTimerUI();
});

socket.on("chess_game_over", data=>{
  gameOver = true;
  if(timerInterval) clearInterval(timerInterval);

  const iWon = data.winner && data.winner === myName;
  const message = data.message || "Game finished.";
  const winnerMessage = data.winner
    ? (iWon ? " You won 🎉" : ` Winner: ${data.winner}`)
    : "";

  document.getElementById("status").innerText = `🏁 ${message}${winnerMessage}`;
  document.getElementById("turn").innerText = "Game over";
  document.getElementById("rematchBtn").style.display = "inline-block";
  document.getElementById("endGameBtn").style.display = "inline-block";

  const xpGain = getXpGainFromResult(data);
  if(xpGain > 0){
    showXpRewardPopup(xpGain);
  }
});

socket.on("chess_rematch_status", data=>{
  if(!gameOver) return;
  const requestedBy = data.requestedBy || [];
  if(requestedBy.length < 2){
    document.getElementById("status").innerText = "⌛ Waiting for opponent rematch...";
  }
});
  
  
function updateUI(){
  document.getElementById("turn").innerText =
    game.turn() === playerColor ? "🟢 Your turn" : "🔴 Opponent turn";
}

/* DRAW + MOVE */

function draw(){
  const p=document.getElementById("piecesLayer");
  const c=document.getElementById("clickLayer");

  p.innerHTML="";
  c.innerHTML="";

@@ -454,40 +571,104 @@ function clickCell(sq){

  if(game.in_draw() || game.in_threefold_repetition() || game.insufficient_material()){
    gameEndSent = true;
    socket.emit("chess_game_end", { reason: "draw" });
  }
}

  
  
function resign(){
  if(gameOver) return;
  if(confirm("Abandon game?")){
    socket.emit("resign");
  }
}
function rematch(){
  if(!gameOver) return;
  socket.emit("rematch");
  document.getElementById("status").innerText = "⌛ Rematch requested...";
}

function goMain(){
  window.location.href = "/";
}

function getXpGainFromResult(data){
  if(!data?.winner){
    return 0;
  }
  return data.winner === myName ? 25 : 5;
}

function showXpRewardPopup(xpGain){
  const overlay = document.getElementById("xpRewardOverlay");
  const counter = document.getElementById("xpCounter");
  const particles = document.getElementById("xpParticles");
  const duration = 1200;
  const startedAt = performance.now();

  if(xpPopupTimeout){
    clearTimeout(xpPopupTimeout);
    xpPopupTimeout = null;
  }

  counter.innerText = "0";
  particles.innerHTML = "";
  overlay.classList.add("show");

  const tick = (now)=>{
    const progress = Math.min((now - startedAt) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    counter.innerText = String(Math.round(xpGain * eased));
    if(progress < 1){
      requestAnimationFrame(tick);
    }
  };

  requestAnimationFrame(tick);
  emitXpParticles(18);

  xpPopupTimeout = setTimeout(()=>{
    overlay.classList.remove("show");
    xpPopupTimeout = null;
  }, 3200);
}

function hideXpRewardPopup(){
  const overlay = document.getElementById("xpRewardOverlay");
  const particles = document.getElementById("xpParticles");
  if(xpPopupTimeout){
    clearTimeout(xpPopupTimeout);
    xpPopupTimeout = null;
  }
  overlay.classList.remove("show");
  particles.innerHTML = "";
}

function emitXpParticles(count){
  const particles = document.getElementById("xpParticles");
  for(let i = 0; i < count; i++){
    const particle = document.createElement("div");
    particle.className = "xp-particle";
    particle.style.setProperty("--x", `${Math.round((Math.random() - 0.5) * 220)}px`);
    particle.style.setProperty("--size", `${Math.round(5 + Math.random() * 8)}px`);
    particle.style.setProperty("--delay", `${Math.round(Math.random() * 260)}ms`);
    particles.appendChild(particle);
  }
}

draw();

const savedSession = localStorage.getItem("chessSession");
if(savedSession){
  try{
    applyStartData(JSON.parse(savedSession));
  }catch(err){
    console.error("Invalid chessSession data", err);
  }
}

  
</script>
</body>
</html>
