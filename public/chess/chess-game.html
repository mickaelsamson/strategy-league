<!DOCTYPE html>
<html>
<head>
<title>Chess</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
/* (TON CSS INCHANGÉ) */
</style>
</head>

<body>

<div id="navbar-container"></div>

<script>
fetch("/components/navbar.html")
  .then(res => res.text())
  .then(html => {
    document.getElementById("navbar-container").innerHTML = html;
  });
</script>

<div id="main">

<h2>♟️ Chess</h2>

<div class="player-card you">
  <div id="youName">You</div>
  <div id="youColor"></div>
</div>

<div id="myTimer" class="timer active">⏱️ 60</div>

<div id="turn">Turn: -</div>
<div id="status"></div>

<div id="boardWrapper">
  <img src="/chess/board.png">
  <div id="piecesLayer"></div>
  <div id="clickLayer"></div>
</div>

<div class="player-card opponent">
  <div id="opponentName">Opponent</div>
  <div id="opponentColor"></div>
</div>

<div id="opponentTimer" class="timer">⏱️ 60</div>

</div>

<div id="sidebar">
  <h3>Players Online</h3>
  <div id="players"></div>
</div>

<script>

const socket = io();
const user = JSON.parse(localStorage.getItem("user") || "null");

if(!user){
  window.location.href = "/login.html";
}

socket.emit("register_online", user.username);

let game = new Chess();
let playerColor = null;

/* ================= PLAYERS ONLINE ================= */

socket.on("online_users", users=>{
  document.getElementById("players").innerHTML =
    Object.values(users).map(u=>`
      <div class="player">${u}</div>
    `).join("");
});

/* ================= GAME START ================= */

socket.on("chess_start", data=>{

  playerColor = data.color;

  document.getElementById("youName").innerText = user.username;
  document.getElementById("youColor").innerText = playerColor === "w" ? "White" : "Black";

  document.getElementById("opponentName").innerText =
    playerColor === "w" ? data.players.black : data.players.white;

  document.getElementById("opponentColor").innerText =
    playerColor === "w" ? "Black" : "White";

  renderBoard();
});

/* ================= RENDER ================= */

function renderBoard(){

  const board = game.board();
  const layer = document.getElementById("piecesLayer");

  layer.innerHTML = "";

  board.forEach((row,y)=>{
    row.forEach((piece,x)=>{
      if(piece){

        const el = document.createElement("div");
        el.className = "piece";
        el.style.left = (x*12.5)+"%";
        el.style.top = (y*12.5)+"%";

        const img = document.createElement("img");
        img.src = `/chess/${piece.color}${piece.type}.png`;

        el.appendChild(img);
        layer.appendChild(el);
      }
    });
  });

}

renderBoard();

</script>

</body>
</html>
