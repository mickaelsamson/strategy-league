<!DOCTYPE html>
<html>
<head>
<title>Chess</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
/* ===== EXISTING CSS UNCHANGED ===== */
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  display:flex;
}

/* ... (tout ton CSS intact) ... */

/* ===== XP POPUP START ===== */
.xp-popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  background:#111827;
  color:#22c55e;
  padding:20px 30px;
  border-radius:15px;
  font-size:24px;
  font-weight:bold;
  box-shadow:0 0 20px rgba(34,197,94,0.5);
  opacity:0;
  pointer-events:none;
  transition:all 0.4s ease;
  z-index:9999;
}

.xp-popup.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}
/* ===== XP POPUP END ===== */

</style>
</head>

<body>

<div id="main">
<!-- (tout ton HTML intact) -->
</div>

<div id="sidebar">
  <h3>Players Online</h3>
  <div id="players"></div>
</div>

<!-- ===== XP POPUP START ===== -->
<div id="xpPopup" class="xp-popup"></div>
<!-- ===== XP POPUP END ===== -->

<script>

/* ===== EXISTING CODE UNCHANGED ===== */

/* ===== XP POPUP START ===== */
function showXpPopup(lines){
  const popup = document.getElementById("xpPopup");
  popup.innerHTML = lines.join("<br>");
  popup.classList.add("show");

  setTimeout(()=>{
    popup.classList.remove("show");
  },2000);
}
/* ===== XP POPUP END ===== */


/* ===== SOCKET ===== */

socket.on("chess_game_over", data=>{
  gameOver = true;
  if(timerInterval) clearInterval(timerInterval);

  const iWon = data.winner && data.winner === myName;
  const message = data.message || "Game finished.";
  const winnerMessage = data.winner
    ? (iWon ? " You won 🎉" : ` Winner: ${data.winner}`)
    : "";

  document.getElementById("status").innerText = `🏁 ${message}${winnerMessage}`;
  document.getElementById("turn").innerText = "Game over";
  document.getElementById("rematchBtn").style.display = "inline-block";
  document.getElementById("endGameBtn").style.display = "inline-block";

  // ===== XP POPUP START =====
  if(iWon){
    showXpPopup([
      "+5 XP 🟢 Victory",
      "+1 XP Participation"
    ]);
  }else{
    showXpPopup([
      "+1 XP Participation"
    ]);
  }
  // ===== XP POPUP END =====
});

/* ===== RESTE DU CODE INTACT ===== */

</script>
</body>
</html>
