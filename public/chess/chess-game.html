<!DOCTYPE html>
<html>
<head>
<title>Chess</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  display:flex;
}

/* MAIN LAYOUT */
#main{
  flex:1;
  text-align:center;
  padding-top:10px;
}

#sidebar{
  width:260px;
  background:#111827;
  padding:15px;
  border-left:1px solid #1f2937;
}

/* PLAYER PANEL */
.player-card{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin:10px auto;
  max-width:520px;
  display:flex;
  justify-content:space-between;
}

.you{border-left:4px solid #22c55e;}
.opponent{border-left:4px solid #ef4444;}

/* BOARD */
#boardWrapper{
  position:relative;
  width:90vw;
  max-width:520px;
  aspect-ratio:1/1;
  margin:10px auto;
}

#boardWrapper img{
  width:100%;
  height:100%;
}

#piecesLayer,#clickLayer{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* SQUARES */
.square{
  position:absolute;
  width:12.5%;
  height:12.5%;
  cursor:pointer;
}

.selected{ outline:3px solid #3b82f6; }
.move{ background:rgba(34,197,94,0.4); border-radius:50%; }
.check{ background:rgba(239,68,68,0.6); }
.attacker{ background:rgba(239,68,68,0.3); }

/* PIECES */
.piece{
  position:absolute;
  width:12.5%;
  height:12.5%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece img{
  width:80%;
  height:80%;
}

/* STATUS */
#turn{
  margin:10px;
  font-size:18px;
}

#status{
  font-size:18px;
  margin:5px;
}

#disconnectTimer{
  color:#f87171;
  margin:5px;
}

/* BUTTONS */
button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
}

#resignBtn{background:#ef4444;}
#resignBtn:hover{background:#dc2626;}

#rematchBtn{background:#f59e0b;}
#rematchBtn:hover{background:#d97706;}

#endGameBtn{background:#22c55e;}
#endGameBtn:hover{background:#16a34a;}

/* PLAYERS LIST */
.player{
  padding:6px;
  border-bottom:1px solid #1f2937;
}
</style>
</head>

<body>

<div id="main">

<h2>♟️ Chess</h2>

<!-- PLAYER INFO -->
<div class="player-card you">
  <div id="youName">You</div>
  <div id="youColor"></div>
</div>

<div id="turn">Turn: -</div>
<div id="status"></div>
<div id="disconnectTimer"></div>

<!-- BOARD -->
<div id="boardWrapper">
  <img src="/chess/board.png">
  <div id="piecesLayer"></div>
  <div id="clickLayer"></div>
</div>

<!-- OPPONENT -->
<div class="player-card opponent">
  <div id="opponentName">Opponent</div>
  <div id="opponentColor"></div>
</div>

<!-- ACTIONS -->
<div>
  <button id="resignBtn" onclick="resign()">Abandon</button>
  <button id="rematchBtn" onclick="rematch()" style="display:none;">Rematch</button>
  <button id="endGameBtn" onclick="goMain()" style="display:none;">Back</button>
</div>

</div>

<div id="sidebar">
  <h3>Players Online</h3>
  <div id="players"></div>
</div>

<script>

/* === TON CODE EXISTANT INTACT === */

const socket = io();
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "/login.html";
}

socket.emit("register_online", user.username);

let game = new Chess();
let selected = null;
let possibleMoves = [];
let playerColor = null;

let myName = "";
let opponentName = "";
let gameOver = false;

/* ===== PLAYERS ===== */

socket.on("online_users", users=>{
  document.getElementById("players").innerHTML =
    Object.entries(users).map(([name,data])=>`
      <div class="player">${name} (${data.elo})</div>
    `).join("");
});

/* ===== START ===== */

socket.on("chess_start", data=>{

  gameOver = false;
  selected = null;
  possibleMoves = [];

  document.getElementById("resignBtn").style.display = "inline-block";
  document.getElementById("rematchBtn").style.display = "none";
  document.getElementById("endGameBtn").style.display = "none";

  playerColor = data.color;

  myName = data.color === 'w' ? data.players.white : data.players.black;
  opponentName = data.color === 'w' ? data.players.black : data.players.white;

  document.getElementById("youName").innerText = myName;
  document.getElementById("opponentName").innerText = opponentName;

  document.getElementById("youColor").innerText = playerColor === 'w' ? "White" : "Black";
  document.getElementById("opponentColor").innerText = playerColor === 'w' ? "Black" : "White";

  game.reset();
  updateUI();
  draw();
});

/* ===== UPDATE ===== */

socket.on("chess_update", data=>{
  if(data.fen) game.load(data.fen);
  updateUI();
  draw();
});

/* ===== END ===== */

function endGameUI(){
  gameOver = true;

  document.getElementById("resignBtn").style.display = "none";
  document.getElementById("rematchBtn").style.display = "inline-block";
  document.getElementById("endGameBtn").style.display = "inline-block";
}

socket.on("player_left", data=>{
  document.getElementById("status").innerText =
    "🏆 " + data.winner + " wins";
  endGameUI();
});

/* ===== REMATCH ===== */

function rematch(){
  socket.emit("rematch");
  document.getElementById("status").innerText = "Waiting for opponent...";
}

socket.on("rematch_requested", data=>{
  document.getElementById("status").innerText =
    data.from + " wants a rematch";
});

/* ===== UI ===== */

function updateUI(){
  document.getElementById("turn").innerText =
    game.turn() === playerColor ? "🟢 Your turn" : "🔴 Opponent turn";

  if(game.in_checkmate()){
    document.getElementById("status").innerText = "🏆 Checkmate!";
    endGameUI();
  }
  else if(game.in_check()){
    document.getElementById("status").innerText = "⚠️ CHECK!";
  }
  else{
    document.getElementById("status").innerText = "";
  }
}

/* ===== DRAW + MOVE (IDENTIQUE) ===== */

function getKingSquare(color){
  const board = game.board();
  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      const piece = board[y][x];
      if(piece && piece.type==='k' && piece.color===color){
        return String.fromCharCode(97+x)+(8-y);
      }
    }
  }
}

function getAttackers(square){
  const moves = game.moves({verbose:true});
  return moves.filter(m => m.to === square).map(m => m.from);
}

function draw(){
  const p=document.getElementById("piecesLayer");
  const c=document.getElementById("clickLayer");

  p.innerHTML="";
  c.innerHTML="";

  const board=game.board();

  let checkSquare=null;
  let attackers=[];

  if(game.in_check()){
    checkSquare=getKingSquare(game.turn());
    attackers=getAttackers(checkSquare);
  }

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      const sq=String.fromCharCode(97+x)+(8-y);
      const piece=board[y][x];

      const cell=document.createElement("div");
      cell.className="square";
      cell.style.left=(x*12.5)+"%";
      cell.style.top=(y*12.5)+"%";

      if(selected===sq) cell.classList.add("selected");
      if(possibleMoves.includes(sq)) cell.classList.add("move");
      if(sq===checkSquare) cell.classList.add("check");
      if(attackers.includes(sq)) cell.classList.add("attacker");

      cell.onclick=()=>clickCell(sq);
      c.appendChild(cell);

      if(piece){
        const wrapper=document.createElement("div");
        wrapper.className="piece";
        wrapper.style.left=(x*12.5)+"%";
        wrapper.style.top=(y*12.5)+"%";

        const img=document.createElement("img");
        img.src="/chess/pieces/"+piece.color+piece.type.toUpperCase()+".svg";

        wrapper.appendChild(img);
        p.appendChild(wrapper);
      }
    }
  }
}

function clickCell(sq){
  if(game.turn()!==playerColor || gameOver) return;

  if(!selected){
    const moves=game.moves({square:sq,verbose:true});
    if(moves.length===0) return;
    selected=sq;
    possibleMoves=moves.map(m=>m.to);
  }else{
    const move=game.move({from:selected,to:sq,promotion:'q'});
    selected=null;
    possibleMoves=[];

    if(move){
      socket.emit("chess_move",{fen:game.fen()});
    }
  }

  updateUI();
  draw();
}

/* ===== ACTIONS ===== */

function resign(){
  if(confirm("Abandon game?")){
    socket.emit("resign");
    endGameUI();
  }
}

function goMain(){
  window.location.href = "/";
}

draw();

</script>
</body>
</html>
