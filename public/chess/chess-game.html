<!DOCTYPE html>
<html>
<head>
<title>Chess</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
/* (TON CSS IDENTIQUE — inchangé) */
</style>
</head>

<body>

<div id="navbar-container"></div>

<script>
fetch("/components/navbar.html")
  .then(res => res.text())
  .then(html => {
    document.getElementById("navbar-container").innerHTML = html;
  });
</script>

<div id="main">

<h2>♟️ Chess</h2>

<div class="player-card you">
  <div id="youName">You</div>
  <div id="youColor"></div>
</div>

<div id="myTimer" class="timer active">⏱️ 60</div>

<div id="turn">Turn: -</div>
<div id="status"></div>

<div id="boardWrapper">
  <img src="/chess/board.png">
  <div id="piecesLayer"></div>
  <div id="clickLayer"></div>
</div>

<div class="player-card opponent">
  <div id="opponentName">Opponent</div>
  <div id="opponentColor"></div>
</div>

<div id="opponentTimer" class="timer">⏱️ 60</div>

</div>

<div id="sidebar">
  <h3>Players Online</h3>
  <div id="players"></div>
</div>

<script>

const socket = io();
const user = JSON.parse(localStorage.getItem("user"));

if(!user) window.location.href="/login.html";

socket.emit("register_online", user.username);

let game = new Chess();
let selected = null;
let possibleMoves = [];
let playerColor = null;

/* TURN */
function updateTurn(){
  document.getElementById("turn").innerText =
    game.turn() === playerColor
      ? "🟢 Your turn"
      : "🔴 Opponent turn";
}

/* PLAYERS */
socket.on("online_users", users=>{
  document.getElementById("players").innerHTML =
    Object.values(users).map(u=>`<div class="player">${u}</div>`).join("");
});

/* START */
socket.on("chess_start", data=>{
  playerColor = data.color;

  document.getElementById("youName").innerText = user.username;
  document.getElementById("opponentName").innerText =
    playerColor==="w"?data.players.black:data.players.white;

  game.reset();
  draw();
  updateTurn();
});

/* UPDATE */
socket.on("chess_update", data=>{
  if(data.fen) game.load(data.fen);
  draw();
  updateTurn();
});

/* DRAW + CLICK LAYER */
function draw(){

  const board = game.board();
  const pieces = document.getElementById("piecesLayer");
  const clicks = document.getElementById("clickLayer");

  pieces.innerHTML = "";
  clicks.innerHTML = "";

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){

      const square = String.fromCharCode(97+x)+(8-y);
      const piece = board[y][x];

      // CLICK CELL
      const cell = document.createElement("div");
      cell.className = "square";
      cell.style.left = (x*12.5)+"%";
      cell.style.top = (y*12.5)+"%";

      if(selected === square) cell.classList.add("selected");
      if(possibleMoves.includes(square)) cell.classList.add("move");

      cell.onclick = () => clickCell(square);
      clicks.appendChild(cell);

      // PIECE
      if(piece){
        const el = document.createElement("div");
        el.className = "piece";
        el.style.left = (x*12.5)+"%";
        el.style.top = (y*12.5)+"%";

        const img = document.createElement("img");
        img.src = "/chess/pieces/"+piece.color+piece.type.toUpperCase()+".svg";

        el.appendChild(img);
        pieces.appendChild(el);
      }
    }
  }
}

/* CLICK LOGIC */
function clickCell(square){

  if(game.turn() !== playerColor) return;

  if(!selected){
    const moves = game.moves({square, verbose:true});
    if(moves.length === 0) return;

    selected = square;
    possibleMoves = moves.map(m=>m.to);

  }else{
    const move = game.move({
      from: selected,
      to: square,
      promotion: 'q'
    });

    selected = null;
    possibleMoves = [];

    if(move){
      socket.emit("chess_move",{ fen: game.fen() });
    }
  }

  draw();
  updateTurn();
}

/* INIT */
draw();
updateTurn();

</script>

</body>
</html>
