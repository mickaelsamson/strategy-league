<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/assets/styles/theme.css">
<script defer src="/assets/scripts/site-shell.js"></script>
<title>Chess</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  display:flex;
}

/* MAIN LAYOUT */
#main{
  width:min(980px, 100%);
  margin:0 auto;
  text-align:center;
}

#main h2{
  margin:0 0 16px;
  font-size:42px;
}

#sidebar{
  width:260px;
  background:#111827;
  padding:15px;
  border-left:1px solid #1f2937;
}

/* PLAYER PANEL */
.player-card{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin:10px auto;
  max-width:520px;
  display:flex;
  justify-content:space-between;
}

.you{border-left:4px solid #22c55e;}
.opponent{border-left:4px solid #ef4444;}

/* TIMER */
.timer{
  max-width:520px;
  margin:5px auto 10px auto;
  background:#1f2937;
  padding:8px;
  border-radius:8px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
  transition:0.2s;
}

.timer.active{
  background:#3b82f6;
  box-shadow:0 0 10px #3b82f6;
}

.timer.low{
  background:#ef4444;
}

/* BOARD */
#boardWrapper{
  position:relative;
  width:90vw;
  max-width:560px;
  aspect-ratio:1/1;
  margin:14px auto;
  padding:14px;
  border-radius:8px;
  background:var(--shell-card);
  border:1px solid var(--shell-line);
  box-shadow:0 24px 80px rgba(0,0,0,0.34);
}

#boardWrapper img{
  width:100%;
  height:100%;
  border-radius:6px;
}

#piecesLayer,#clickLayer{
  position:absolute;
  inset:14px;
  width:calc(100% - 28px);
  height:calc(100% - 28px);
}

/* SQUARES */
.square{
  position:absolute;
  width:12.5%;
  height:12.5%;
  cursor:pointer;
}

.selected{ outline:3px solid #3b82f6; }
.move{ background:rgba(34,197,94,0.4); border-radius:50%; }
.check{ background:rgba(239,68,68,0.6); }
.attacker{ background:rgba(239,68,68,0.3); }

/* PIECES */
.piece{
  position:absolute;
  width:12.5%;
  height:12.5%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece img{
  width:80%;
  height:80%;
}
.piece.king-in-check{
  background:rgba(239,68,68,0.45);
  border-radius:50%;
}

/* STATUS */
#turn{
  margin:10px;
  font-size:18px;
  color:var(--shell-soft);
}

#status{
  font-size:18px;
  margin:5px;
}

#disconnectTimer{
  color:#f87171;
  margin:5px;
}

/* BUTTONS */
button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
}

#resignBtn{background:#ef4444;}
#resignBtn:hover{background:#dc2626;}

#rematchBtn{background:#f59e0b;}
#rematchBtn:hover{background:#d97706;}

#endGameBtn{background:#22c55e;}
#endGameBtn:hover{background:#16a34a;}

/* PLAYERS LIST */
.player{
  padding:6px;
  border-bottom:1px solid #1f2937;
}

.result-overlay{
  position:fixed;
  inset:0;
  z-index:1100;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(9,3,5,0.68);
  backdrop-filter:blur(10px);
}

.result-overlay.show{
  display:flex;
}

.result-box{
  width:min(420px, calc(100vw - 32px));
  padding:34px;
  border-radius:8px;
  text-align:center;
  background:linear-gradient(145deg, rgba(76,20,27,0.98), rgba(25,7,11,0.96));
  border:1px solid var(--shell-line-strong);
  box-shadow:0 24px 80px rgba(0,0,0,0.5);
  animation:resultPop .52s cubic-bezier(.2,1.35,.28,1) both;
}

.result-overlay.victory .result-box{
  box-shadow:0 0 0 1px rgba(94,228,109,0.28), 0 24px 80px rgba(0,0,0,0.5), 0 0 46px rgba(94,228,109,0.22);
}

.result-overlay.defeat .result-box{
  box-shadow:0 0 0 1px rgba(255,82,104,0.34), 0 24px 80px rgba(0,0,0,0.5), 0 0 46px rgba(255,82,104,0.22);
}

.result-title{
  margin:0 0 10px;
  font-size:42px;
}

.result-subtitle{
  margin:0 0 18px;
  color:var(--shell-soft);
}

.result-xp{
  display:inline-flex;
  min-height:42px;
  align-items:center;
  padding:0 18px;
  border-radius:999px;
  color:var(--shell-green);
  background:rgba(94,228,109,0.12);
  border:1px solid rgba(94,228,109,0.24);
  font-weight:900;
  font-size:20px;
}

.result-actions{
  margin-top:18px;
  display:flex;
  justify-content:center;
  gap:10px;
}

.show-result-btn{
  position:fixed;
  left:50%;
  bottom:24px;
  transform:translateX(-50%);
  z-index:1000;
}

@keyframes resultPop{
  from{opacity:0; transform:translateY(24px) scale(.92);}
  to{opacity:1; transform:translateY(0) scale(1);}
}
</style>
</head>

<body>

<div id="main">

<h2>♟️ Chess</h2>

<div class="player-card you">
  <div id="youName">You</div>
  <div id="youColor"></div>
</div>

<div id="myTimer" class="timer active">⏱️ 02:00</div>
  
<div id="turn">Turn: -</div>
<div id="status"></div>
<div id="disconnectTimer"></div>

<div id="boardWrapper">
  <img src="/chess/board.png">
  <div id="piecesLayer"></div>
  <div id="clickLayer"></div>
</div>

<div class="player-card opponent">
  <div id="opponentName">Opponent</div>
  <div id="opponentColor"></div>
</div>

<div id="opponentTimer" class="timer">⏱️ 02:00</div>
  
<div>
  <button id="resignBtn" onclick="resign()">Resign</button>
  <button id="rematchBtn" onclick="rematch()" style="display:none;">Rematch</button>
  <button id="endGameBtn" onclick="goMain()" style="display:none;">Back</button>
</div>

</div>

<div id="sidebar">
  <h3>Players Online</h3>
  <div id="players"></div>
</div>

<div id="resultOverlay" class="result-overlay">
  <div class="result-box">
    <h1 id="resultTitle" class="result-title">Game Over</h1>
    <p id="resultSubtitle" class="result-subtitle"></p>
    <div id="resultXp" class="result-xp">+0 XP</div>
    <div class="result-actions">
      <button onclick="viewBoard()">View Board</button>
    </div>
  </div>
</div>

<button id="showResultBtn" class="show-result-btn" onclick="showResult()" hidden>Show Result</button>

<script>

const socket = io();
window.StrategyLeagueSocket = socket;
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "/login.html";
}

socket.emit("register_online", user.username);

let game = new Chess();
let selected = null;
let possibleMoves = [];
let playerColor = null;

let myName = "";
let opponentName = "";
let gameOver = false;
let gameEndSent = false;
  let selectedTimeControl = 120;
function applyStartData(data){
  gameOver = false;
  gameEndSent = false;
  selected = null;
  possibleMoves = [];

  playerColor = data.color;

  myName = user.username;
  opponentName =
    user.username === data.players.white
      ? data.players.black
      : data.players.white;

  document.getElementById("youName").innerText = myName;
  document.getElementById("opponentName").innerText = opponentName;

  document.getElementById("youColor").innerText =
    playerColor === 'w' ? "White" : "Black";

  document.getElementById("opponentColor").innerText =
    playerColor === 'w' ? "Black" : "White";

  selectedTimeControl = Number(data.timeControl) || 120;
  
  if(data.fen){
    game.load(data.fen);
  }else{
    game.reset();
  }

  myTime = selectedTimeControl;
  opponentTime = selectedTimeControl;
  startTimer();
  updateTimerUI();
  document.getElementById("status").innerText = "";
  document.getElementById("rematchBtn").style.display = "none";
  document.getElementById("endGameBtn").style.display = "none";
  updateUI();
  draw();
}
 
  
/* TIMER */
let myTime = 60;
let opponentTime = 60;
let timerInterval = null;

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);

  timerInterval = setInterval(()=>{
    if(gameOver) return;

    if(game.turn() === playerColor){
      myTime = Math.max(0, myTime - 1);
    }else{
       opponentTime = Math.max(0, opponentTime - 1);
    }

    updateTimerUI();
    checkTimeout();
    
  },1000);
}
function formatSeconds(total){
  const minutes = Math.floor(total / 60);
  const seconds = total % 60;
  return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
}

function updateTimerUI(){
  document.getElementById("myTimer").innerText = "⏱️ " + formatSeconds(myTime);
  document.getElementById("opponentTimer").innerText = "⏱️ " + formatSeconds(opponentTime);

  document.getElementById("myTimer").classList.remove("active");
  document.getElementById("opponentTimer").classList.remove("active");

  if(game.turn() === playerColor){
    document.getElementById("myTimer").classList.add("active");
  }else{
    document.getElementById("opponentTimer").classList.add("active");
  }

  document.getElementById("myTimer").classList.toggle("low", myTime <= 10);
  document.getElementById("opponentTimer").classList.toggle("low", opponentTime <= 10);
}

function checkTimeout(){
  if(gameEndSent || gameOver) return;

  if(myTime <= 0){
    gameEndSent = true;
    socket.emit("chess_timeout");
  }
}
  
/* SOCKET */

socket.on("online_users", users=>{
  window.dispatchEvent(new CustomEvent("site-shell-online-users", { detail: users }));
  document.getElementById("players").innerHTML =
    Object.entries(users).map(([name,data])=>`
      <div class="player" data-profile-username="${name}">${name} (ELO Chess ${data.chessElo || data.elo})</div>
      `).join("");
});

socket.on("chess_start", data=>{
  localStorage.setItem("chessSession", JSON.stringify(data));
  applyStartData(data);
  
});

socket.on("chess_update", data=>{
  if(data.fen) game.load(data.fen);
  updateUI();
  draw();
  updateTimerUI();
});

socket.on("chess_game_over", data=>{
  gameOver = true;
  if(timerInterval) clearInterval(timerInterval);

  const iWon = data.winner && data.winner === myName;
  const reward = data.rewards?.[myName] || {};
  const result = reward.result || (!data.winner ? "draw" : iWon ? "win" : "loss");
  const xpChange = Number.isFinite(reward.xpChange) ? reward.xpChange : 0;
  const message = data.message || "Game finished.";
  const winnerMessage = data.winner
    ? (iWon ? " You won." : ` Winner: ${data.winner}`)
    : "";

  document.getElementById("status").innerText = `${message}${winnerMessage}`;
  document.getElementById("turn").innerText = "Game over";
  document.getElementById("rematchBtn").style.display = "inline-block";
  document.getElementById("endGameBtn").style.display = "inline-block";
  showResultAnimation(result, message, xpChange);
});

socket.on("chess_rematch_status", data=>{
  if(!gameOver) return;
  const requestedBy = data.requestedBy || [];
  if(requestedBy.length < 2){
    document.getElementById("status").innerText = "⌛ Waiting for opponent rematch...";
  }
});
  
  
function updateUI(){
  document.getElementById("turn").innerText =
    game.turn() === playerColor ? "Your turn" : "Opponent turn";
}

function showResultAnimation(result, message, xpChange){
  const overlay = document.getElementById("resultOverlay");
  const title = document.getElementById("resultTitle");
  const subtitle = document.getElementById("resultSubtitle");
  const xp = document.getElementById("resultXp");

  overlay.className = `result-overlay show ${result === "win" ? "victory" : result === "loss" ? "defeat" : "draw"}`;
  title.textContent = result === "win" ? "Victory" : result === "loss" ? "Defeat" : "Draw";
  subtitle.textContent = message || "Game finished.";
  xp.textContent = `+${xpChange} XP`;
  document.getElementById("showResultBtn").hidden = true;
  updateStoredXp(xpChange);
}

function viewBoard(){
  document.getElementById("resultOverlay").classList.remove("show");
  document.getElementById("showResultBtn").hidden = false;
}

function showResult(){
  document.getElementById("resultOverlay").classList.add("show");
  document.getElementById("showResultBtn").hidden = true;
}

function updateStoredXp(xpChange){
  if(!xpChange) return;
  try{
    const stored = JSON.parse(localStorage.getItem("user") || "null");
    if(!stored) return;
    localStorage.setItem("user", JSON.stringify({
      ...stored,
      xp: (stored.xp || 0) + xpChange
    }));
  }catch(err){
    console.error(err);
  }
}

/* DRAW + MOVE */

function draw(){
  const p=document.getElementById("piecesLayer");
  const c=document.getElementById("clickLayer");

  p.innerHTML="";
  c.innerHTML="";

  const board=game.board();
  let checkedKingSquare = null;

  if(game.in_check()){
    const checkedColor = game.turn();
    for(let y=0;y<8;y++){
      for(let x=0;x<8;x++){
        const piece = board[y][x];
        if(piece && piece.type === "k" && piece.color === checkedColor){
          checkedKingSquare = String.fromCharCode(97+x)+(8-y);
        }
      }
    }
  }

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      const sq=String.fromCharCode(97+x)+(8-y);
      const piece=board[y][x];

      const cell=document.createElement("div");
      cell.className="square";
      cell.style.left=(x*12.5)+"%";
      cell.style.top=(y*12.5)+"%";

      if(selected===sq) cell.classList.add("selected");
      if(possibleMoves.includes(sq)) cell.classList.add("move");

      cell.onclick=()=>clickCell(sq);
      c.appendChild(cell);

      if(piece){
        const wrapper=document.createElement("div");
        wrapper.className="piece";
        wrapper.style.left=(x*12.5)+"%";
        wrapper.style.top=(y*12.5)+"%";
        if(sq === checkedKingSquare) wrapper.classList.add("king-in-check");
        
        const img=document.createElement("img");
        img.src="/chess/pieces/"+piece.color+piece.type.toUpperCase()+".svg";

        wrapper.appendChild(img);
        p.appendChild(wrapper);
      }
    }
  }
}

function clickCell(sq){
  if(game.turn()!==playerColor || gameOver) return;

  if(!selected){
    const moves=game.moves({square:sq,verbose:true});
    if(moves.length===0) return;
    selected=sq;
    possibleMoves=moves.map(m=>m.to);
  }else{
    const move=game.move({from:selected,to:sq,promotion:'q'});
    selected=null;
    possibleMoves=[];

    if(move){
      socket.emit("chess_move",{fen:game.fen()});
      sendGameEndIfNeeded();
    }
  }

  updateUI();
  draw();
}

  function sendGameEndIfNeeded(){
  if(gameEndSent || gameOver) return;

  if(game.in_checkmate()){
    gameEndSent = true;
    socket.emit("chess_game_end", {
      winner: myName,
      reason: "checkmate"
    });
    return;
  }

  if(game.in_stalemate()){
    gameEndSent = true;
    socket.emit("chess_game_end", { reason: "stalemate" });
    return;
  }

  if(game.in_draw() || game.in_threefold_repetition() || game.insufficient_material()){
    gameEndSent = true;
    socket.emit("chess_game_end", { reason: "draw" });
  }
}

  
  
function resign(){
  if(gameOver) return;
  if(confirm("Resign game?")){
    socket.emit("resign");
  }
}
function rematch(){
  if(!gameOver) return;
  socket.emit("rematch");
  document.getElementById("status").innerText = "⌛ Rematch requested...";
}

function goMain(){
  window.location.href = "/";
}

draw();

const savedSession = localStorage.getItem("chessSession");
if(savedSession){
  try{
    applyStartData(JSON.parse(savedSession));
  }catch(err){
    console.error("Invalid chessSession data", err);
  }
}

  
</script>
</body>
</html>
