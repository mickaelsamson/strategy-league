<!DOCTYPE html>
<html>
<head>
<title>Chess</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  display:flex;
}

/* MAIN LAYOUT */
#main{
  flex:1;
  text-align:center;
  padding-top:10px;
}

#sidebar{
  width:260px;
  background:#111827;
  padding:15px;
  border-left:1px solid #1f2937;
}

/* PLAYER PANEL */
.player-card{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin:10px auto;
  max-width:520px;
  display:flex;
  justify-content:space-between;
}

.you{border-left:4px solid #22c55e;}
.opponent{border-left:4px solid #ef4444;}

/* TIMER */
.timer{
  max-width:520px;
  margin:5px auto 10px auto;
  background:#1f2937;
  padding:8px;
  border-radius:8px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
  transition:0.2s;
}

.timer.active{
  background:#3b82f6;
  box-shadow:0 0 10px #3b82f6;
}

.timer.low{
  background:#ef4444;
}

/* BOARD */
#boardWrapper{
  position:relative;
  width:90vw;
  max-width:520px;
  aspect-ratio:1/1;
  margin:10px auto;
}

#boardWrapper img{
  width:100%;
  height:100%;
}

#piecesLayer,#clickLayer{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* SQUARES */
.square{
  position:absolute;
  width:12.5%;
  height:12.5%;
  cursor:pointer;
}

.selected{ outline:3px solid #3b82f6; }
.move{ background:rgba(34,197,94,0.4); border-radius:50%; }
.check{ background:rgba(239,68,68,0.6); }
.attacker{ background:rgba(239,68,68,0.3); }

/* PIECES */
.piece{
  position:absolute;
  width:12.5%;
  height:12.5%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece img{
  width:80%;
  height:80%;
}
.piece.king-in-check{
  background:rgba(239,68,68,0.45);
  border-radius:50%;
}

/* STATUS */
#turn{
  margin:10px;
  font-size:18px;
}

#status{
  font-size:18px;
  margin:5px;
}

#disconnectTimer{
  color:#f87171;
  margin:5px;
}

/* BUTTONS */
button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
}

#resignBtn{background:#ef4444;}
#resignBtn:hover{background:#dc2626;}

#rematchBtn{background:#f59e0b;}
#rematchBtn:hover{background:#d97706;}

#endGameBtn{background:#22c55e;}
#endGameBtn:hover{background:#16a34a;}

/* PLAYERS LIST */
.player{
  padding:6px;
  border-bottom:1px solid #1f2937;
}

/* ===== XP POPUP ===== */
.xp-popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  background:#111827;
  color:#22c55e;
  padding:20px 30px;
  border-radius:15px;
  font-size:24px;
  font-weight:bold;
  box-shadow:0 0 20px rgba(34,197,94,0.5);
  opacity:0;
  pointer-events:none;
  transition:all 0.4s ease;
  z-index:9999;
}

.xp-popup.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

</style>
</head>

<body>

<div id="main">

<h2>♟️ Chess</h2>

<div class="player-card you">
  <div id="youName">You</div>
  <div id="youColor"></div>
</div>

<div id="myTimer" class="timer active">⏱️ 60</div>

<div id="turn">Turn: -</div>
<div id="status"></div>
<div id="disconnectTimer"></div>

<div id="boardWrapper">
  <img src="/chess/board.png">
  <div id="piecesLayer"></div>
  <div id="clickLayer"></div>
</div>

<div class="player-card opponent">
  <div id="opponentName">Opponent</div>
  <div id="opponentColor"></div>
</div>

<div id="opponentTimer" class="timer">⏱️ 60</div>

<div>
  <button id="resignBtn" onclick="resign()">Abandon</button>
  <button id="rematchBtn" onclick="rematch()" style="display:none;">Rematch</button>
  <button id="endGameBtn" onclick="goMain()" style="display:none;">Back</button>
</div>

</div>

<div id="sidebar">
  <h3>Players Online</h3>
  <div id="players"></div>
</div>

<!-- XP POPUP -->
<div id="xpPopup" class="xp-popup"></div>

<script>

function showXpPopup(lines){
  const popup = document.getElementById("xpPopup");
  popup.innerHTML = lines.join("<br>");
  popup.classList.add("show");

  setTimeout(()=>{
    popup.classList.remove("show");
  },2000);
}

/* ===== TON CODE ORIGINAL INTACT ===== */

socket.on("chess_game_over", data=>{
  gameOver = true;
  if(timerInterval) clearInterval(timerInterval);

  const iWon = data.winner && data.winner === myName;
  const message = data.message || "Game finished.";
  const winnerMessage = data.winner
    ? (iWon ? " You won 🎉" : ` Winner: ${data.winner}`)
    : "";

  document.getElementById("status").innerText = `🏁 ${message}${winnerMessage}`;
  document.getElementById("turn").innerText = "Game over";
  document.getElementById("rematchBtn").style.display = "inline-block";
  document.getElementById("endGameBtn").style.display = "inline-block";

  // XP POPUP
  if(iWon){
    showXpPopup([
      "+5 XP 🟢 Victory",
      "+1 XP Participation"
    ]);
  }else{
    showXpPopup([
      "+1 XP Participation"
    ]);
  }
});

</script>
</body>
</html>
