<!DOCTYPE html>
<html>
<head>
<title>Chess</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.11.0/chess.min.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  display:flex;
}

/* MAIN LAYOUT */
#main{
  flex:1;
  text-align:center;
  padding-top:10px;
}

#sidebar{
  width:260px;
  background:#111827;
  padding:15px;
  border-left:1px solid #1f2937;
}

/* PLAYER PANEL */
.player-card{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin:10px auto;
  max-width:520px;
  display:flex;
  justify-content:space-between;
}

.you{border-left:4px solid #22c55e;}
.opponent{border-left:4px solid #ef4444;}

/* TIMER */
.timer{
  max-width:520px;
  margin:5px auto 10px auto;
  background:#1f2937;
  padding:8px;
  border-radius:8px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
  transition:0.2s;
}

.timer.active{
  background:#3b82f6;
  box-shadow:0 0 10px #3b82f6;
}

.timer.low{
  background:#ef4444;
}

/* BOARD */
#boardWrapper{
  position:relative;
  width:90vw;
  max-width:520px;
  aspect-ratio:1/1;
  margin:10px auto;
}

#boardWrapper img{
  width:100%;
  height:100%;
}

#piecesLayer,#clickLayer{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* SQUARES */
.square{
  position:absolute;
  width:12.5%;
  height:12.5%;
  cursor:pointer;
}

.selected{ outline:3px solid #3b82f6; }
.move{ background:rgba(34,197,94,0.4); border-radius:50%; }
.check{ background:rgba(239,68,68,0.6); }
.attacker{ background:rgba(239,68,68,0.3); }

/* PIECES */
.piece{
  position:absolute;
  width:12.5%;
  height:12.5%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece img{
  width:80%;
  height:80%;
}
.piece.king-in-check{
  background:rgba(239,68,68,0.45);
  border-radius:50%;
}

/* STATUS */
#turn{
  margin:10px;
  font-size:18px;
}

#status{
  font-size:18px;
  margin:5px;
}

#disconnectTimer{
  color:#f87171;
  margin:5px;
}

/* BUTTONS */
button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
}

#resignBtn{background:#ef4444;}
#resignBtn:hover{background:#dc2626;}

#rematchBtn{background:#f59e0b;}
#rematchBtn:hover{background:#d97706;}

#endGameBtn{background:#22c55e;}
#endGameBtn:hover{background:#16a34a;}

/* PLAYERS LIST */
.player{
  padding:6px;
  border-bottom:1px solid #1f2937;
}
</style>
</head>

<body>

<div id="main">

<h2>♟️ Chess</h2>

<div class="player-card you">
  <div id="youName">You</div>
  <div id="youColor"></div>
</div>

<div id="myTimer" class="timer active">⏱️ 60</div>

<div id="turn">Turn: -</div>
<div id="status"></div>
<div id="disconnectTimer"></div>

<div id="boardWrapper">
  <img src="/chess/board.png">
  <div id="piecesLayer"></div>
  <div id="clickLayer"></div>
</div>

<div class="player-card opponent">
  <div id="opponentName">Opponent</div>
  <div id="opponentColor"></div>
</div>

<div id="opponentTimer" class="timer">⏱️ 60</div>

<div>
  <button id="resignBtn" onclick="resign()">Abandon</button>
  <button id="rematchBtn" onclick="rematch()" style="display:none;">Rematch</button>
  <button id="endGameBtn" onclick="goMain()" style="display:none;">Back</button>
</div>

</div>

<div id="sidebar">
  <h3>Players Online</h3>
  <div id="players"></div>
</div>

<script>

const socket = io();
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "/login.html";
}

socket.emit("register_online", user.username);

let game = new Chess();
let selected = null;
let possibleMoves = [];
let playerColor = null;

let myName = "";
let opponentName = "";
let gameOver = false;
let gameEndSent = false;
function applyStartData(data){
  gameOver = false;
  gameEndSent = false;
  selected = null;
  possibleMoves = [];

  playerColor = data.color;

  myName = user.username;
  opponentName =
    user.username === data.players.white
      ? data.players.black
      : data.players.white;

  document.getElementById("youName").innerText = myName;
  document.getElementById("opponentName").innerText = opponentName;

  document.getElementById("youColor").innerText =
    playerColor === 'w' ? "White" : "Black";

  document.getElementById("opponentColor").innerText =
    playerColor === 'w' ? "Black" : "White";

  if(data.fen){
    game.load(data.fen);
  }else{
    game.reset();
  }

  myTime = 60;
  opponentTime = 60;
  startTimer();
  updateTimerUI();
  document.getElementById("status").innerText = "";
  document.getElementById("rematchBtn").style.display = "none";
  document.getElementById("endGameBtn").style.display = "none";
  updateUI();
  draw();
}
 
  
/* TIMER */
let myTime = 60;
let opponentTime = 60;
let timerInterval = null;

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);

  timerInterval = setInterval(()=>{
    if(gameOver) return;

    if(game.turn() === playerColor){
      myTime--;
    }else{
      opponentTime--;
    }

    updateTimerUI();

  },1000);
}

function updateTimerUI(){
  document.getElementById("myTimer").innerText = "⏱️ " + myTime;
  document.getElementById("opponentTimer").innerText = "⏱️ " + opponentTime;

  document.getElementById("myTimer").classList.remove("active");
  document.getElementById("opponentTimer").classList.remove("active");

  if(game.turn() === playerColor){
    document.getElementById("myTimer").classList.add("active");
  }else{
    document.getElementById("opponentTimer").classList.add("active");
  }
}

/* SOCKET */

socket.on("online_users", users=>{
  document.getElementById("players").innerHTML =
    Object.entries(users).map(([name,data])=>`
      <div class="player">${name} (${data.elo})</div>
    `).join("");
});

socket.on("chess_start", data=>{
  localStorage.setItem("chessSession", JSON.stringify(data));
  applyStartData(data);
  
});

socket.on("chess_update", data=>{
  if(data.fen) game.load(data.fen);
  updateUI();
  draw();
  updateTimerUI();
});

socket.on("chess_game_over", data=>{
  gameOver = true;
  if(timerInterval) clearInterval(timerInterval);

  const iWon = data.winner && data.winner === myName;
  const message = data.message || "Game finished.";
  const winnerMessage = data.winner
    ? (iWon ? " You won 🎉" : ` Winner: ${data.winner}`)
    : "";

  document.getElementById("status").innerText = `🏁 ${message}${winnerMessage}`;
  document.getElementById("turn").innerText = "Game over";
  document.getElementById("rematchBtn").style.display = "inline-block";
  document.getElementById("endGameBtn").style.display = "inline-block";
});

socket.on("chess_rematch_status", data=>{
  if(!gameOver) return;
  const requestedBy = data.requestedBy || [];
  if(requestedBy.length < 2){
    document.getElementById("status").innerText = "⌛ Waiting for opponent rematch...";
  }
});
  
  
function updateUI(){
  document.getElementById("turn").innerText =
    game.turn() === playerColor ? "🟢 Your turn" : "🔴 Opponent turn";
}

/* DRAW + MOVE */

function draw(){
  const p=document.getElementById("piecesLayer");
  const c=document.getElementById("clickLayer");

  p.innerHTML="";
  c.innerHTML="";

  const board=game.board();
  let checkedKingSquare = null;

  if(game.in_check()){
    const checkedColor = game.turn();
    for(let y=0;y<8;y++){
      for(let x=0;x<8;x++){
        const piece = board[y][x];
        if(piece && piece.type === "k" && piece.color === checkedColor){
          checkedKingSquare = String.fromCharCode(97+x)+(8-y);
        }
      }
    }
  }

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      const sq=String.fromCharCode(97+x)+(8-y);
      const piece=board[y][x];

      const cell=document.createElement("div");
      cell.className="square";
      cell.style.left=(x*12.5)+"%";
      cell.style.top=(y*12.5)+"%";

      if(selected===sq) cell.classList.add("selected");
      if(possibleMoves.includes(sq)) cell.classList.add("move");

      cell.onclick=()=>clickCell(sq);
      c.appendChild(cell);

      if(piece){
        const wrapper=document.createElement("div");
        wrapper.className="piece";
        wrapper.style.left=(x*12.5)+"%";
        wrapper.style.top=(y*12.5)+"%";
        if(sq === checkedKingSquare) wrapper.classList.add("king-in-check");
        
        const img=document.createElement("img");
        img.src="/chess/pieces/"+piece.color+piece.type.toUpperCase()+".svg";

        wrapper.appendChild(img);
        p.appendChild(wrapper);
      }
    }
  }
}

function clickCell(sq){
  if(game.turn()!==playerColor || gameOver) return;

  if(!selected){
    const moves=game.moves({square:sq,verbose:true});
    if(moves.length===0) return;
    selected=sq;
    possibleMoves=moves.map(m=>m.to);
  }else{
    const move=game.move({from:selected,to:sq,promotion:'q'});
    selected=null;
    possibleMoves=[];

    if(move){
      socket.emit("chess_move",{fen:game.fen()});
      sendGameEndIfNeeded();
    }
  }

  updateUI();
  draw();
}

  function sendGameEndIfNeeded(){
  if(gameEndSent || gameOver) return;

  if(game.in_checkmate()){
    gameEndSent = true;
    socket.emit("chess_game_end", {
      winner: myName,
      reason: "checkmate"
    });
    return;
  }

  if(game.in_stalemate()){
    gameEndSent = true;
    socket.emit("chess_game_end", { reason: "stalemate" });
    return;
  }

  if(game.in_draw() || game.in_threefold_repetition() || game.insufficient_material()){
    gameEndSent = true;
    socket.emit("chess_game_end", { reason: "draw" });
  }
}

  
  
function resign(){
  if(gameOver) return;
  if(confirm("Abandon game?")){
    socket.emit("resign");
  }
}
function rematch(){
  if(!gameOver) return;
  socket.emit("rematch");
  document.getElementById("status").innerText = "⌛ Rematch requested...";
}

function goMain(){
  window.location.href = "/";
}

draw();

const savedSession = localStorage.getItem("chessSession");
if(savedSession){
  try{
    applyStartData(JSON.parse(savedSession));
  }catch(err){
    console.error("Invalid chessSession data", err);
  }
}

  
</script>
</body>
</html>
