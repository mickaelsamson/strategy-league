<!DOCTYPE html>
<html>
<head>
<title>Chess Lobby</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:800px;
  padding:20px;
  text-align:center;
}

/* TITLE */
h1{
  margin-bottom:20px;
}

/* CARD */
.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

/* BUTTONS */
button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#3b82f6;
  color:white;
}

button:hover{
  background:#2563eb;
}

.secondary{
  background:#1f2937;
}

/* INPUT */
input, select{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

/* LOBBIES */
.lobby{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  text-align:left;
}

.players{
  margin-top:5px;
  font-size:14px;
  color:#9ca3af;
}

.ready{
  color:#22c55e;
}

.notready{
  color:#ef4444;
}
</style>
</head>

<body>

<div class="container">

<h1>♟️ Chess Lobby</h1>

<!-- ACTIONS -->
<div class="card">
  <input id="name" placeholder="Lobby name">
  <select id="mode">
    <option value="30">Blitz</option>
    <option value="60">Rapid</option>
    <option value="120">Snail</option>
  </select>

  <br>

  <button onclick="createLobby()">Create Lobby</button>
  <button class="secondary" onclick="goBack()">⬅ Back</button>
</div>

<!-- LOBBIES -->
<div class="card">
  <h3>Available Lobbies</h3>
  <div id="lobbies"></div>
</div>

</div>

<script>

const socket = io();
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "/login.html";
}

socket.emit("register_online", user.username);

/* ===== LOBBIES ===== */

socket.on("lobbies_update", lobbies=>{
  const list = Object.values(lobbies);

  document.getElementById("lobbies").innerHTML =
    list.map(l=>{

      const me = l.players.find(p=>p.username===user.username);

      return `
        <div class="lobby">
          <strong>${l.name}</strong> (${l.time}s)

          <div class="players">
            ${l.players.map(p=>`
              <span class="${p.ready?'ready':'notready'}">
                ${p.username} ${p.ready?'✔':'✖'}
              </span>
            `).join(", ")}
          </div>

          ${
            !me
            ? `<button onclick="join('${l.id}')">Join</button>`
            : `<button onclick="toggleReady('${l.id}')">Ready</button>`
          }
        </div>
      `;
    }).join("");
});

/* ===== ACTIONS ===== */

function createLobby(){
  socket.emit("create_lobby",{
    name:document.getElementById("name").value,
    time:parseInt(document.getElementById("mode").value)
  });
}

function join(id){
  socket.emit("join_lobby", id);
}

function toggleReady(id){
  socket.emit("toggle_ready", id);
}

/* ===== NAV ===== */

function goBack(){
  window.location.href = "/games.html";
}

/* ===== START GAME ===== */

socket.on("chess_start", ()=>{
  window.location.href = "/chess/chess-game.html";
});

</script>

</body>
</html>
