<!DOCTYPE html>
<html>
<head>
<title>Strategy War</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  text-align:center;
}

/* MAP */
#gameContainer{
  position:relative;
  width:90%;
  max-width:1000px;
  margin:auto;
}

#map{
  width:100%;
}

#overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

.zone{
  fill:rgba(255,255,255,0.05);
  stroke-width:3;
  cursor:pointer;
}

/* CONTINENTS */
.divin{ stroke:rgba(59,130,246,0.6); }
.foret{ stroke:rgba(34,197,94,0.6); }
.fer{ stroke:rgba(239,68,68,0.6); }
.sable{ stroke:rgba(234,179,8,0.6); }
.demons{ stroke:rgba(168,85,247,0.6); }

.selected{
  stroke:white !important;
  stroke-width:5;
}
</style>
</head>

<body>

<h2>⚔️ Strategy War</h2>

<div id="gameContainer">

  <!-- IMAGE -->
  <img src="map.png" id="map">

  <!-- ⚠️ IMPORTANT : viewBox = ton SVG FIGMA -->
  <svg id="overlay" viewBox="0 0 467 396">

    <!-- CONTINENT DIVIN (TEST) -->
    <path id="t0" class="zone divin"
      d="M112.764 106.61L0.763687 221.61L46.7637 254.61L33.7637 320.61L112.764 354.61L172.764 346.61L193.764 369.61L270.764 394.61L332.764 354.61V298.61L436.764 244.61L465.764 183.61L414.764 133.61L441.764 89.6097L425.764 45.6097L360.764 34.6097L306.764 0.609665L248.764 45.6097L205.764 106.61L162.764 120.61L112.764 106.61Z"
    />

  </svg>

</div>

<script>
const socket = io();
let selected = null;

/* CREATE GAME */
socket.emit("create","Player");

/* STATE */
socket.on("state", g=>{

  g.territories.forEach((t,i)=>{

    const el = document.getElementById("t"+i);
    if(!el) return;

    el.onclick = ()=>{

      if(selected === null){
        selected = i;
        el.classList.add("selected");
      } else {
        socket.emit("move",{from:selected,to:i});
        selected = null;

        document.querySelectorAll(".zone")
          .forEach(z=>z.classList.remove("selected"));
      }

    };

  });

});
</script>

</body>
</html>
