<!DOCTYPE html>
<html>
<head>
<title>Strategy War</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  text-align:center;
}

#gameContainer{
  width:90%;
  max-width:1000px;
  margin:auto;
}

#overlay{
  width:100%;
  height:auto;
}

.zone{
  fill:rgba(255,255,255,0.04);
  stroke-width:3;
  cursor:pointer;
  transition:0.2s;
}

.divin{ stroke:rgba(56,189,248,0.8); }
.foret{ stroke:rgba(190,242,100,0.85); }
.fer{ stroke:rgba(248,113,113,0.85); }
.soleil{ stroke:rgba(251,191,36,0.85); }
.demons{ stroke:rgba(168,85,247,0.9); }
.sables{ stroke:rgba(251,146,60,0.85); }

.zone:hover{ fill:rgba(255,255,255,0.14); }

.selected{
  stroke:white !important;
  stroke-width:5;
}
</style>
</head>

<body>

<h2>⚔️ Strategy War</h2>

<div id="gameContainer">

  <svg id="overlay" viewBox="0 0 1536 1024">

    <image href="map.png" width="1536" height="1024"/>

    <g id="territoriesLayer"></g>
  </svg>
</div>

const layer = document.getElementById("territoriesLayer");
territories.forEach((territory) => {
  const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
  polygon.setAttribute("id", territory.id);
  polygon.setAttribute("class", `zone ${territory.continent}`);
  polygon.setAttribute("points", territory.points);
  layer.appendChild(polygon);
});
  
  socket.emit("create", "Player");

  socket.on("state", g => {
  g.territories.forEach((t, i) => {
    const el = document.getElementById("t" + i);
    if (!el) return;
     
    el.onclick = () => {
      if (selected === null) {
        selected = i;
        el.classList.add("selected");
      } else { 
 
        socket.emit("move", { from: selected, to: i });
        selected = null;

       document.querySelectorAll(".zone").forEach(z => z.classList.remove("selected"));
      }
    };
  });
});
</script>

</body>
</html>
