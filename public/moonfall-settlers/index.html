<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/assets/styles/theme.css">
  <link rel="stylesheet" href="/moonfall-settlers/style.css">
  <script defer src="/assets/scripts/site-shell.js"></script>
  <script defer src="/moonfall-settlers/game.js"></script>
  <title>Moonfall Settlers</title>
</head>
<body class="with-navbar moonsettlers-page">
<div id="navbar-container"></div>

<main class="moonsettlers-app">
  <section id="setupView" class="setup-view">
    <div class="setup-art" aria-hidden="true">
      <div class="moon-disc"></div>
      <div class="preview-board">
        <span class="hex h1"></span>
        <span class="hex h2"></span>
        <span class="hex h3"></span>
        <span class="hex h4"></span>
        <span class="hex h5"></span>
        <span class="hex h6"></span>
        <span class="hex h7"></span>
      </div>
      <div class="blade-line"></div>
    </div>

    <form id="setupForm" class="setup-card">
      <span class="eyebrow">Moonfall board strategy</span>
      <h1>Moonfall Settlers</h1>
      <p class="setup-copy">A dark tactical Catan-like board: rival clans, settlements, roads, ports, development cards, and the Moon Oni at the center of the conflict.</p>

      <div class="setup-grid">
        <label>Players
          <select id="playerCount">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4" selected>4</option>
          </select>
        </label>
        <label>Board
          <select id="boardMode">
            <option value="balanced" selected>Balanced</option>
            <option value="wild">Wild</option>
          </select>
        </label>
        <label>Score
          <select id="targetScore">
            <option value="8">8</option>
            <option value="10" selected>10</option>
            <option value="12">12</option>
          </select>
        </label>
      </div>

      <div id="slots" class="slots"></div>

      <div class="setup-actions">
        <button id="shuffleBtn" type="button" class="secondary-btn">Shuffle</button>
        <button type="submit" class="primary-btn">Start Game</button>
      </div>
    </form>
  </section>

  <section id="gameView" class="game-view is-hidden" hidden>
    <header class="topbar">
      <div class="turn-block">
        <span class="eyebrow">Turn <b id="turnHud">1</b></span>
        <strong id="activePlayer">Clan</strong>
      </div>
      <div class="status-strip">
        <span><b id="phaseHud">Placement</b> phase</span>
        <span class="dice-status"><span id="diceHud" class="dice-pair"><i>-</i><i>-</i></span></span>
        <span><b id="pointsHud">0</b> points</span>
        <span><b id="targetHud">10</b> target</span>
      </div>
      <div class="top-actions">
        <button id="rollBtn" type="button">Roll</button>
        <button id="endTurnBtn" type="button">End</button>
      </div>
    </header>

    <div class="play-layout">
      <nav class="tool-rail" aria-label="Tools">
        <button id="newGameBtn" class="tool-icon" type="button" title="New game">↺</button>
        <button class="tool-icon" type="button" title="Info" data-panel-target="boardPanel">i</button>
        <button class="tool-icon" type="button" title="Log" data-panel-target="logPanel">≡</button>
      </nav>

      <div class="board-frame">
        <canvas id="boardCanvas" aria-label="Plateau Moonfall Settlers"></canvas>
        <div id="notice" class="notice" aria-live="polite"></div>
      </div>

      <aside class="intel-panel">
        <section class="message-card">
          <h2>Moonfall</h2>
          <div id="boardPanel" class="board-panel"></div>
        </section>
        <section>
          <h2>Log</h2>
          <div id="logPanel" class="log-panel"></div>
        </section>
        <section>
          <h2>Players</h2>
          <div id="playersPanel" class="players-panel"></div>
        </section>
      </aside>

      <footer class="bottom-dock">
        <div id="resourcePanel" class="resource-panel"></div>

        <div class="build-console">
          <div class="command-grid build-grid">
            <button id="roadBtn" type="button">Road</button>
            <button id="settlementBtn" type="button">Settlement</button>
            <button id="cityBtn" type="button">City</button>
            <button id="devBtn" type="button">Card</button>
          </div>
          <div id="costPanel" class="cost-panel"></div>
        </div>

        <details class="dock-drawer">
          <summary>Cards</summary>
          <div id="devPanel" class="dev-panel"></div>
        </details>

        <details class="dock-drawer trade-drawer">
          <summary>Trade</summary>
          <div class="trade-panel">
            <label>Give
              <select id="tradeGive"></select>
            </label>
            <label>Give qty
              <input id="tradeGiveAmount" type="number" min="1" max="19" value="1">
            </label>
            <label>Get
              <select id="tradeGet"></select>
            </label>
            <label>Get qty
              <input id="tradeGetAmount" type="number" min="1" max="19" value="1">
            </label>
            <label>Clan
              <select id="tradePartner"></select>
            </label>
            <div class="trade-actions">
              <button id="tradeBtn" type="button">Bank</button>
              <button id="playerTradeBtn" type="button">Clans</button>
            </div>
          </div>
        </details>
      </footer>
    </div>
  </section>
</main>
</body>
</html>
