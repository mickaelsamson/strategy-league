<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:900px;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:20px;
  margin-bottom:20px;
}

.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  background:#1f2937;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

.username{
  font-size:24px;
  font-weight:bold;
}

/* CARD */
.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
}

/* XP BAR */
.xp-bar{
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.xp-fill{
  height:12px;
  background:#22c55e;
  width:40%;
}

/* STATS */
.stats{
  display:flex;
  justify-content:space-around;
  text-align:center;
}

.stat h3{
  margin:5px 0;
}

/* MATCHES */
.match{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #1f2937;
}

.win{color:#22c55e;}
.loss{color:#ef4444;}
.draw{color:#facc15;}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="avatar">♟️</div>
  <div>
    <div class="username" id="username">Player</div>
    <div>ELO: <span id="elo">1000</span></div>
  </div>
</div>

<!-- LEVEL -->
<div class="card">
  <h3>⭐ Level</h3>
  <div>Level <span id="level">1</span></div>
  <div class="xp-bar">
    <div id="xpFill" class="xp-fill"></div>
  </div>
  <div><span id="xp">0</span> / <span id="xpNext">100</span> XP</div>
</div>

<!-- STATS -->
<div class="card stats">
  <div class="stat">
    <h3 id="wins">0</h3>
    <p>Wins</p>
  </div>
  <div class="stat">
    <h3 id="losses">0</h3>
    <p>Losses</p>
  </div>
  <div class="stat">
    <h3 id="winrate">0%</h3>
    <p>Winrate</p>
  </div>
</div>

<!-- MATCH HISTORY -->
<div class="card">
  <h3>📜 Recent Matches</h3>
  <div id="matches"></div>
</div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "/login.html";
}
const params = new URLSearchParams(window.location.search);
const requestedUsername = params.get("username");
const profileUsername = requestedUsername || user.username;
  
function renderProfile(profile){
  document.getElementById("username").innerText = profile.username || profileUsername;
  document.getElementById("elo").innerText = profile.elo ?? 1000;

  const wins = profile?.stats?.wins || 0;
  const losses = profile?.stats?.losses || 0;
  const winrate = profile?.stats?.winrate || 0;
  const xp = profile?.xp || 0;

  document.getElementById("wins").innerText = wins;
  document.getElementById("losses").innerText = losses;
  document.getElementById("winrate").innerText = `${winrate}%`;

  const level = Math.floor(xp / 100) + 1;
  const nextXp = level * 100;
  const prevXp = (level - 1) * 100;
  const progress = Math.max(0, Math.min(100, ((xp - prevXp) / (nextXp - prevXp)) * 100));

  document.getElementById("level").innerText = level;
  document.getElementById("xp").innerText = xp;
  document.getElementById("xpNext").innerText = nextXp;
  document.getElementById("xpFill").style.width = `${progress}%`;

  const matches = Array.isArray(profile.matchHistory) ? profile.matchHistory : [];
  document.getElementById("matches").innerHTML = matches.length
    ? matches.map(m=>{
        const result = m.result || "draw";
        const xpChange = Number.isFinite(m.xpChange) ? m.xpChange : 0;
        const sign = xpChange >= 0 ? "+" : "";
        return `
          <div class="match ${result}">
            <span>${result.toUpperCase()} vs ${m.opponent || "Unknown"}</span>
            <span>${sign}${xpChange} XP</span>
          </div>
        `;
      }).join("")
    : "<div class=\"match\"><span>No match history yet.</span><span>—</span></div>";
}

async function loadProfile(){
  try{
    const response = await fetch(`/api/profile/${encodeURIComponent(profileUsername)}`);
    if(!response.ok){
      throw new Error("Profile unavailable");
    }

    const profile = await response.json();
    if(profile.username === user.username){
      localStorage.setItem("user", JSON.stringify({
        ...user,
        elo: profile.elo,
        xp: profile.xp
      }));
    }

    renderProfile(profile);
  }catch(err){
    console.error(err);
    renderProfile({
      username: profileUsername,
      elo: user.elo || 1000,
      xp: user.xp || 0,
      stats: { wins: 0, losses: 0, winrate: 0 },
      matchHistory: []
    });
  }
}

loadProfile();

</script>

</body>
</html>
