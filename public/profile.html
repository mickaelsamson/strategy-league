<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:900px;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:20px;
  margin-bottom:20px;
}

.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  background:#1f2937;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

.username{
  font-size:24px;
  font-weight:bold;
}

/* CARD */
.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
}

/* XP BAR */
.xp-bar{
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.xp-fill{
  height:12px;
  background:#22c55e;
  width:40%;
}

/* STATS */
.stats{
  display:flex;
  justify-content:space-around;
  text-align:center;
}

.stat h3{
  margin:5px 0;
}

/* MATCHES */
.match{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #1f2937;
}

.win{color:#22c55e;}
.loss{color:#ef4444;}
.draw{color:#facc15;}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="avatar">♟️</div>
  <div>
    <div class="username" id="username">Player</div>
    <div>ELO: <span id="elo">1000</span></div>
  </div>
</div>

<!-- LEVEL -->
<div class="card">
  <h3>⭐ Level</h3>
  <div>Level <span id="level">1</span></div>
  <div class="xp-bar">
    <div id="xpFill" class="xp-fill"></div>
  </div>
  <div><span id="xp">0</span> / <span id="xpNext">100</span> XP</div>
</div>

<!-- STATS -->
<div class="card stats">
  <div class="stat">
    <h3 id="wins">0</h3>
    <p>Wins</p>
  </div>
  <div class="stat">
    <h3 id="losses">0</h3>
    <p>Losses</p>
  </div>
  <div class="stat">
    <h3 id="winrate">0%</h3>
    <p>Winrate</p>
  </div>
</div>

<!-- MATCH HISTORY -->
<div class="card">
  <h3>📜 Recent Matches</h3>
  <div id="matches"></div>
</div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "/login.html";
}

/* BASIC DATA */
document.getElementById("username").innerText = user.username;
document.getElementById("elo").innerText = user.elo || 1000;

/* MOCK STATS (à connecter backend plus tard) */
const stats = {
  wins: 12,
  losses: 8,
  xp: user.xp || 0
};

document.getElementById("wins").innerText = stats.wins;
document.getElementById("losses").innerText = stats.losses;

const total = stats.wins + stats.losses;
const winrate = total ? Math.round((stats.wins / total) * 100) : 0;
document.getElementById("winrate").innerText = winrate + "%";

/* LEVEL SYSTEM */
const xp = stats.xp;
const level = Math.floor(xp / 100) + 1;
const nextXp = level * 100;
const prevXp = (level - 1) * 100;
const progress = ((xp - prevXp) / (nextXp - prevXp)) * 100;

document.getElementById("level").innerText = level;
document.getElementById("xp").innerText = xp;
document.getElementById("xpNext").innerText = nextXp;
document.getElementById("xpFill").style.width = progress + "%";

/* MOCK MATCHES */
const matches = [
  {result:"win", opponent:"Alex", xp:"+5"},
  {result:"loss", opponent:"Sam", xp:"-1"},
  {result:"win", opponent:"Emperor", xp:"+10 🔥"},
];

document.getElementById("matches").innerHTML =
  matches.map(m=>`
    <div class="match ${m.result}">
      <span>${m.result.toUpperCase()} vs ${m.opponent}</span>
      <span>${m.xp} XP</span>
    </div>
  `).join("");

</script>

</body>
</html>
