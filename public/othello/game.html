<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/assets/styles/theme.css">
<script defer src="/assets/scripts/site-shell.js"></script>
<title>Othello Game</title>
<script src="/socket.io/socket.io.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="game-page">
  
<div id="main">
  <h1>⚫ Othello</h1>
    <div class="player-card you">
    <div id="youName">You</div>
    <div id="youColor"></div>
  </div>

  <div id="turn"></div>
  <div id="score"></div>
  <div id="board"></div>
  <div id="status"></div>

  <div class="player-card opponent">
    <div id="opponentName">Opponent</div>
    <div id="opponentColor"></div>
  </div>

  <div>
    <button id="resignBtn" onclick="resign()">Resign</button>
  </div>
</div>

<div id="sidebar">
  <h3>Players Online</h3>
  <div id="players"></div>
</div>
  
<!-- END SCREEN -->
<div id="endScreen" class="end-screen">
  <h1 id="winnerText"></h1>
  <p id="endMessage"></p>
  <div id="xpReward" class="xp-reward">+0 XP</div>
  <button onclick="goBack()">Back</button>
</div>

<audio id="flipSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-click-1114.mp3"></audio>

<script src="game.js"></script>
</body>
</html>
