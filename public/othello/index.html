<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/assets/styles/theme.css">
<script defer src="/assets/scripts/site-shell.js"></script>
<title>Othello Lobby</title>
<script src="/socket.io/socket.io.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="lobby-page">

<div id="blockedScreen" class="blocked-screen">
  <h1>Games Disabled</h1>
  <p>Come back later.</p>
  <button onclick="window.location.href='/games.html'">Back</button>
</div>
  
<div class="container">

<h1>Othello Lobby</h1>
<p class="lobby-subtitle">Create a room, ready up, and flip the board.</p>

<section class="lobby-layout">
  <div class="card lobby-create">
    <span class="game-kicker">New Match</span>
    <h2>Create Room</h2>
    <input id="name" placeholder="Lobby name">
    <button onclick="createLobby()">Create Lobby</button>
    <div class="invite-row">
      <button type="button" onclick="openInvitePicker()">+ Invite online player</button>
    </div>
    <button class="back-btn" onclick="window.location.href='/games.html'">Back to Games</button>
  </div>

  <div class="card">
    <h3>Open Lobbies</h3>
    <div id="lobbies"></div>
  </div>
</section>

</div>

<script src="lobby.js"></script>
</body>
</html>
