<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/assets/styles/theme.css">
<script defer src="/assets/scripts/site-shell.js"></script>
<title>Strategy Hub - Auth</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#111827;
  padding:30px;
  border-radius:20px;
  width:320px;
  text-align:center;
}

.tabs{
  display:flex;
  margin-bottom:20px;
}

.tab{
  flex:1;
  padding:10px;
  cursor:pointer;
  border-radius:10px;
}

.active{
  background:#3b82f6;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

.error{
  color:#f87171;
  font-size:12px;
}

.success{
  color:#4ade80;
  font-size:12px;
}
</style>
</head>

<body>

<div class="card">

<h2>🎮 Strategy Hub</h2>

<div class="tabs">
  <div id="loginTab" class="tab active">Login</div>
  <div id="registerTab" class="tab">Sign Up</div>
</div>

<div id="loginForm">
  <input id="loginEmail" placeholder="Email">
  <input id="loginPassword" type="password" placeholder="Password">
  <div id="loginError" class="error"></div>
  <button id="loginBtn">Login</button>
</div>

<div id="registerForm" style="display:none;">
  <input id="regEmail" placeholder="Email">
  <input id="regPassword" type="password" placeholder="Password">
  <input id="regUsername" placeholder="Username">
  <div id="regError" class="error"></div>
  <div id="regSuccess" class="success"></div>
  <button id="registerBtn">Create Account</button>
</div>

</div>

<script>

const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");

document.getElementById("loginTab").onclick = ()=>{
  loginForm.style.display="block";
  registerForm.style.display="none";
};

document.getElementById("registerTab").onclick = ()=>{
  loginForm.style.display="none";
  registerForm.style.display="block";
};

/* LOGIN */
document.getElementById("loginBtn").onclick = async ()=>{

  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value.trim();

  const res = await fetch("/api/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({email,password})
  });

  const data = await res.json();

  if(!res.ok){
    document.getElementById("loginError").innerText = data.error;
    return;
  }

  /* 🔥 ADMIN FIX */
  localStorage.setItem("user", JSON.stringify({
    username: data.username,
    email: data.email,
    avatar: data.avatar,
    elo: data.elo,
    chessElo: data.chessElo,
    othelloElo: data.othelloElo,
    azulElo: data.azulElo,
    strategyElo: data.strategyElo,
    moonfallP4Elo: data.moonfallP4Elo,
    hexblitzElo: data.hexblitzElo,
    moonfallSettlersElo: data.moonfallSettlersElo,
    moonfallWorldConquestElo: data.moonfallWorldConquestElo,
    moonfallRtsElo: data.moonfallRtsElo,
    ratings: data.ratings,
    xp: data.xp,
    level: data.level,
    levelInfo: data.levelInfo,
    isAdmin: data.isAdmin
  }));

  window.location.href = "/index.html";
};

/* REGISTER */
document.getElementById("registerBtn").onclick = async ()=>{

  const email = document.getElementById("regEmail").value.trim();
  const password = document.getElementById("regPassword").value.trim();
  const username = document.getElementById("regUsername").value.trim();

  const res = await fetch("/api/register",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({email,password,username})
  });

  const data = await res.json();

  if(data.error){
    document.getElementById("regError").innerText = data.error;
  }else{
    document.getElementById("regSuccess").innerText = "Account created!";
  }
};

</script>

</body>
</html>
