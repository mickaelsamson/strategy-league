<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>

<style>
body{
  margin:0;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
  font-family:Arial;
  text-align:center;
}

.tabs{
  margin:20px;
}

button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
}

.table{
  width:400px;
  margin:auto;
  text-align:left;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid #333;
}

.top{
  color:gold;
  font-weight:bold;
}

.loading{
  margin-top:20px;
  color:#94a3b8;
}
</style>
</head>

<body>

<h2>🏆 Leaderboard</h2>

<div class="tabs">
  <button onclick="load('global')">Global</button>
  <button onclick="load('chess')">Chess</button>
  <button onclick="load('strategy')">Strategy</button>
</div>

<div id="table" class="table"></div>

<script>

async function load(type){

  const table = document.getElementById("table");

  table.innerHTML = "<div class='loading'>Loading...</div>";

  try{

    const res = await fetch("/api/leaderboard/"+type);
    const data = await res.json();

    if(!data || data.length === 0){
      table.innerHTML = "<div class='loading'>No players yet</div>";
      return;
    }

    table.innerHTML = data.map((u,i)=>`
      <div class="row ${i<3?'top':''}">
        <span>#${i+1} ${u.username}</span>
        <span>${
          type==='chess'?u.chessElo:
          type==='strategy'?u.strategyPoints:
          u.xp
        }</span>
      </div>
    `).join("");

  }catch(e){
    table.innerHTML = "<div class='loading'>Error loading leaderboard</div>";
  }
}

/* LOAD DEFAULT */
load("global");

</script>

</body>
</html>
