<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>

<style>
body{
  margin:0;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
  font-family:Arial;
  text-align:center;
}

.tabs{margin:20px;}

button{
  padding:10px 14px;
  margin:5px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  background:#1f2937;
  color:white;
  transition:0.2s;
}

button:hover{background:#3b82f6;}

.table{
  width:420px;
  margin:auto;
  text-align:left;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #333;
}

.top{
  font-weight:bold;
}

.me{
  background:#1e293b;
  border:1px solid #3b82f6;
  border-radius:6px;
}

.rank{
  margin-top:20px;
  font-size:18px;
  color:#38bdf8;
}

.loading{
  margin-top:20px;
  color:#94a3b8;
}

/* BADGES */
.badge{
  font-size:20px;
  margin-right:6px;
}
</style>
</head>

<body>

<h2>🏆 Leaderboard</h2>

<div class="tabs">
  <button onclick="load('global')">Global</button>
  <button onclick="load('chess')">Chess</button>
  <button onclick="load('strategy')">Strategy</button>
</div>

<div id="table" class="table"></div>
<div id="me"></div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

function getBadge(i){
  if(i===0) return "🥇";
  if(i===1) return "🥈";
  if(i===2) return "🥉";
  return "#" + (i+1);
}

async function load(type){

  const table = document.getElementById("table");
  const meDiv = document.getElementById("me");

  table.innerHTML = "<div class='loading'>Loading...</div>";
  meDiv.innerHTML = "";

  try{

    const res = await fetch(`/api/leaderboard/${type}/${user.username}`);
    const data = await res.json();

    if(!data.top || data.top.length === 0){
      table.innerHTML = "<div class='loading'>No players yet</div>";
      return;
    }

    table.innerHTML = data.top.map((u,i)=>`
      <div class="row ${i<3?'top':''} ${u.username===user.username?'me':''}">
        <span>
          <span class="badge">${getBadge(i)}</span>
          ${u.username}
        </span>
        <span>${u.value}</span>
      </div>
    `).join("");

    if(data.me && data.me.rank > 10){
      meDiv.innerHTML = `
        <div class="rank">
          You are ranked #${data.me.rank} (${data.me.value})
        </div>
      `;
    }

  }catch(e){
    table.innerHTML = "<div class='loading'>Error loading leaderboard</div>";
  }
}

load("global");

</script>
</body>
</html>
