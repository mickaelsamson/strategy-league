<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
}

.logo{
  font-size:24px;
  font-weight:bold;
  color:#facc15;
}

.back{
  background:#111827;
  padding:8px 16px;
  border-radius:10px;
  cursor:pointer;
}

/* TITLE */
.title{
  text-align:center;
  font-size:28px;
  margin:10px;
}

/* LIST */
.list{
  max-width:400px;
  margin:20px auto;
}

/* PLAYER CARD */
.player{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: linear-gradient(145deg,#1f2937,#020617);
  padding:12px 16px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.6);
  transition:0.2s;
}

.player:hover{
  transform:scale(1.03);
}

/* RANK */
.rank{
  font-weight:bold;
  width:30px;
}

/* NAME */
.name{
  flex:1;
  text-align:left;
  padding-left:10px;
}

/* XP */
.xp{
  font-weight:bold;
  color:#facc15;
}

/* TOP 3 */
.top1{background:linear-gradient(145deg,#facc15,#ca8a04); color:black;}
.top2{background:linear-gradient(145deg,#cbd5f5,#64748b);}
.top3{background:linear-gradient(145deg,#fca5a5,#7f1d1d);}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🏆 Leaderboard</div>
  <div class="back" onclick="goBack()">← Back</div>
</div>

<div class="title">Top Players</div>

<div id="list" class="list"></div>

<script>

function goBack(){
  window.location.href = "/";
}

function loadLeaderboard(){
  fetch('/api/stats')
  .then(r=>r.json())
  .then(data=>{

    const list = document.getElementById("list");

    list.innerHTML = data.map((u,i)=>{

      let extraClass = "";
      if(i===0) extraClass="top1";
      if(i===1) extraClass="top2";
      if(i===2) extraClass="top3";

      return `
        <div class="player ${extraClass}">
          <div class="rank">${i+1}</div>
          <div class="name">${u.username || "Unknown"}</div>
          <div class="xp">${u.xp || 0} XP</div>
        </div>
      `;

    }).join("");

  });
}

loadLeaderboard();

</script>

</body>
</html>
