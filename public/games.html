<!DOCTYPE html>
<html>
<head>
<title>Choose Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
}

.container{
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:100px;
}

.card{
  width:220px;
  height:150px;
  background:#111827;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.1);
}
</style>
</head>

<body>

<h2 style="text-align:center;">Choose Game</h2>

<div class="container">

  <div class="card" onclick="goStrategy()">
    ⚔️ Strategy
  </div>

  <div class="card" onclick="goChess()">
    ♟️ Chess
  </div>

</div>

<script>
function goStrategy(){
  window.location.href="/strategy/";
}

function goChess(){
  window.location.href="/chess/";
}
</script>

</body>
</html>
