<!DOCTYPE html>
<html>
<head>
<title>Games</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
  margin-top:100px;
}

button{
  padding:15px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}
</style>
</head>

<body>

<h1>🎮 Games Hub</h1>

<button id="chessBtn" onclick="goChess()">♟️ Chess</button>

<button id="adminBtn" style="display:none;" onclick="goAdmin()">👑 Admin</button>
<p id="statusMsg"></p>

<script>

const user = JSON.parse(localStorage.getItem("user"));
const chessBtn = document.getElementById("chessBtn");
const statusMsg = document.getElementById("statusMsg");

if(!user){
  window.location.href = "/login.html";
}

/* ADMIN BUTTON */
if(user && user.isAdmin){
  document.getElementById("adminBtn").style.display = "inline-block";
}

function goChess(){
  window.location.href = "/chess/index.html";
}

function goAdmin(){
  window.location.href = "/admin.html";
}

async function refreshGameStatus(){
  try{
    const res = await fetch("/api/games/status");
    const data = await res.json();

    chessBtn.disabled = !data.enabled;
    chessBtn.style.opacity = data.enabled ? "1" : "0.5";
    chessBtn.style.cursor = data.enabled ? "pointer" : "not-allowed";
    statusMsg.textContent = data.enabled
      ? "Les jeux sont disponibles."
      : "Les jeux sont temporairement bloqués par un admin.";
  }catch(err){
    statusMsg.textContent = "Impossible de récupérer le statut des jeux.";
  }
}

refreshGameStatus();

</script>

</body>
</html>
