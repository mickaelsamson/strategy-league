<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/assets/styles/theme.css">
<script defer src="/assets/scripts/site-shell.js"></script>
<title>Games</title>
<style>
body{margin:0}
.games-page{max-width:1220px;margin:0 auto}
.games-shell{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:22px;align-items:start}
.games-header{display:grid;grid-template-columns:1fr minmax(240px,360px);gap:18px;align-items:end;margin-bottom:26px}
.games-header h1{margin:0 0 8px;font-size:44px;line-height:1;text-transform:uppercase}
.games-header p{margin:0;color:var(--shell-soft);font-size:16px}
.games-search{height:46px;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:rgba(3,10,14,.7);display:flex;align-items:center;gap:10px;padding:0 14px}
.games-search svg{width:20px;height:20px;fill:none;stroke:var(--shell-soft);stroke-width:2}
.games-search input{width:100%;border:0;outline:0;background:transparent;color:var(--shell-text);font-size:14px}
.games-grid{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:18px}
.game-tile{min-height:310px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:22px;color:white;text-decoration:none;border-radius:8px;border:1px solid rgba(244,194,111,.22);background:#081018 center/cover;transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease}
.game-tile:hover{transform:translateY(-5px);border-color:var(--shell-line-strong);box-shadow:0 22px 70px rgba(0,0,0,.35)}
.game-tile::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05) 10%,rgba(0,0,0,.28) 44%,rgba(3,7,10,.94))}
.game-tile::after{content:"";position:absolute;inset:0;border:1px solid transparent;pointer-events:none}
.game-tile.chess::after{border-color:rgba(240,170,61,.8)}
.game-tile.moonveil_dominion::after{border-color:rgba(148,163,184,.45)}
.game-tile.moonveil_glyph::after{border-color:rgba(59,130,246,.65)}
.game-tile.moonveil_hexfall::after{border-color:rgba(168,85,247,.75)}
.game-tile.moonveil-nexus::after{border-color:rgba(196,93,255,.82);box-shadow:inset 0 0 0 1px rgba(245,195,95,.22)}
.game-tile.moonveil-realms::after{border-color:rgba(245,158,11,.72)}
.game-tile.moonveil-conquest::after{border-color:rgba(240,199,110,.82)}
.game-tile.comingsoon::after{border-color:rgba(34,211,238,.62)}
.game-tile.locked{cursor:pointer}
.game-tile>*{position:relative;z-index:1}
.game-kicker{position:absolute;top:14px;left:14px;z-index:1;padding:7px 9px;border-radius:6px;background:rgba(2,7,11,.72);border:1px solid rgba(255,255,255,.12);color:#f6d79b;font-size:11px;font-weight:900;text-transform:uppercase}
.game-tile h2{margin:0 0 8px;font-size:26px;line-height:1;text-transform:uppercase}
.game-tile p{margin:0 0 16px;color:#d8d0c7;line-height:1.35;font-size:14px}
.play-button{width:100%;min-height:42px;border-radius:7px;border:1px solid rgba(240,170,61,.42);display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(142,78,19,.92),rgba(70,39,14,.92));font-weight:900;color:#fff3d5}
.play-button.locked{background:rgba(8,16,24,.72);color:#bfc7d1;border-color:rgba(255,255,255,.14)}
.games-side{display:grid;gap:18px}
.side-card{padding:18px;background:var(--shell-card);border:1px solid var(--shell-line);border-radius:8px;box-shadow:0 18px 70px rgba(0,0,0,.22)}
.profile-card{text-align:center}
.profile-avatar{width:74px;height:74px;margin:0 auto 12px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--shell-amber),#46270e);border:2px solid rgba(244,194,111,.4);font-weight:900;font-size:26px;overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-card h2{margin:0 0 4px;font-size:20px}
.profile-card p{margin:0;color:var(--shell-soft)}
.xp-line{display:flex;justify-content:space-between;margin:16px 0 7px;color:#d8d0c7;font-size:13px}
.xp-bar{height:9px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden}
.xp-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--shell-amber),#ffe0a3)}
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
.mini-stats span{display:block;color:var(--shell-soft);font-size:11px;text-transform:uppercase}.mini-stats b{display:block;margin-top:4px;font-size:20px}
.challenge-list{display:grid;gap:12px;margin-top:14px}.challenge-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}.challenge-row span{color:#eee5d8;font-size:14px}.challenge-row small{color:var(--shell-amber);font-weight:900}.progress{grid-column:1/-1;height:7px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden}.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--shell-cyan),var(--shell-amber))}
.side-card h3{margin:0;font-size:16px;text-transform:uppercase}.side-action{width:100%;min-height:40px;margin-top:14px}
.leader-row{display:grid;grid-template-columns:24px 1fr auto;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px}.leader-row:last-child{border-bottom:0}.leader-row b{color:var(--shell-amber)}
.notice{min-height:22px;margin:18px 0 0;color:var(--shell-soft)}
@media (max-width:1180px){.games-grid{grid-template-columns:repeat(3,minmax(160px,1fr))}.games-shell{grid-template-columns:1fr}.games-side{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:760px){.games-header{grid-template-columns:1fr}.games-grid,.games-side{grid-template-columns:1fr}.game-tile{min-height:280px}}
</style>
</head>
<body class="with-navbar">
<div id="navbar-container"></div>
<main class="games-page">
  <section class="games-shell">
    <div>
      <header class="games-header">
        <div>
          <h1>Games</h1>
          <p>Compete. Strategize. Conquer.</p>
        </div>
        <label class="games-search">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
          <input id="gamesSearch" type="search" placeholder="Search games...">
        </label>
      </header>
      <section id="gamesGrid" class="games-grid"></section>
      <p id="gamesNotice" class="notice"></p>
    </div>

    <aside class="games-side">
      <article class="side-card profile-card">
        <div id="sideAvatar" class="profile-avatar">S</div>
        <h2 id="sideUsername">Strategist</h2>
        <p>Grand Strategist</p>
        <div class="xp-line"><span>Level <b id="sideLevel">1</b></span><span><b id="sideXp">0</b> XP</span></div>
        <div class="xp-bar"><i id="sideXpFill"></i></div>
        <div class="mini-stats">
          <div><span>Wins</span><b id="sideWins">0</b></div>
          <div><span>Matches</span><b id="sideMatches">0</b></div>
          <div><span>Win Rate</span><b id="sideWinrate">0%</b></div>
        </div>
      </article>

      <article class="side-card">
        <h3>Weekly Challenge</h3>
        <div id="weeklyChallengeList" class="challenge-list"></div>
        <button class="side-action" type="button" onclick="window.location.href='/weekly-challenge'">View Challenge</button>
      </article>

      <article class="side-card">
        <h3>Leaderboard</h3>
        <div id="sideLeaderboard"></div>
        <button class="side-action" type="button" onclick="window.location.href='/leaderboard.html'">View Full Leaderboard</button>
      </article>
    </aside>
  </section>
</main>

<script>
const user = JSON.parse(localStorage.getItem("user") || "null");
if(!user){
  window.location.href = "/login.html";
}

const catalog = [
  { key: "chess", className: "chess game-art-chess", title: "Moonveil Chess", copy: "Classic strategy duel", href: "/moonveil-chess/index.html", tag: "Ranked" },
  { key: "moonveil_dominion", className: "moonveil_dominion game-art-moonveil_dominion", title: "Moonveil Dominion", copy: "Master the flip", href: "/moonveil-dominion/index.html", tag: "Classic" },
  { key: "moonveil_glyph", className: "moonveil_glyph game-art-moonveil_glyph", title: "Moonveil Glyph", copy: "Tile strategy and beauty", href: "/moonveil-glyph/index.html", tag: "Drafting" },
  { key: "moonveil_hexfall", className: "moonveil_hexfall game-art-moonveil_hexfall", title: "Moonveil Hexfall", copy: "Hex. Plan. Dominate.", href: "/moonveil-hexfall/index.html", tag: "Hex Path" },
  { key: "moonveil_nexus", className: "moonveil-nexus game-art-moonveil-nexus", title: "Moonveil Nexus", copy: "Four lunar orbs. One nexus.", href: "/moonveil-nexus/index.html", tag: "Nexus duel" },
  { key: "moonveil_realms", className: "realms game-art-moonveil-realms", title: "Moonveil Realms", copy: "Build. Trade. Expand.", href: "/moonveil-realms/index.html", tag: "Realmcraft" },
  { key: "moonveil_conquest", className: "moonveil-conquest game-art-moonveil-conquest", title: "Moonveil Conquest", copy: "Territories. Dice. Domination.", href: "/moonveil-conquest/index.html", tag: "Conquest" },
  { key: "moonveil_ascend", className: "comingsoon game-art-comingsoon", title: "Moonveil Ascend", copy: "Fast. Tactical. Victory.", href: "/coming-soon.html?feature=moonveil-ascend", tag: "Coming Soon" }
];

function escapeHtml(text){
  return String(text || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

function tileMarkup(game, config){
  const comingSoon = game.href.includes("coming-soon") || config?.comingSoon || config?.enabled === false || config?.adminOnly;
  const enabled = !comingSoon && Boolean(config?.allowed);
  const href = enabled ? game.href : `/coming-soon.html?feature=${encodeURIComponent(game.key)}`;
  const kicker = config?.noXp && enabled ? "No XP" : comingSoon ? "Coming Soon" : game.tag;
  return `
    <a class="game-tile ${game.className} ${enabled ? "" : "locked"}" href="${href}" data-title="${escapeHtml(game.title.toLowerCase())}">
      <span class="game-kicker">${escapeHtml(kicker)}</span>
      <h2>${escapeHtml(game.title)}</h2>
      <p>${escapeHtml(game.copy)}</p>
      <span class="play-button ${enabled ? "" : "locked"}">${enabled ? "PLAY" : "COMING SOON"}</span>
    </a>
  `;
}

function renderSideProfile(profile){
  const username = profile.username || user.username || "Strategist";
  document.getElementById("sideUsername").textContent = username;
  if(profile.avatar || user.avatar){
    document.getElementById("sideAvatar").innerHTML = `<img src="${escapeHtml(profile.avatar || user.avatar)}" alt="">`;
  }else{
    document.getElementById("sideAvatar").textContent = username.slice(0,1).toUpperCase();
  }
  const stats = profile.stats || {};
  const wins = stats.wins || 0;
  const losses = stats.losses || 0;
  const draws = stats.draws || 0;
  const matches = stats.total || wins + losses + draws;
  document.getElementById("sideWins").textContent = wins;
  document.getElementById("sideMatches").textContent = matches;
  document.getElementById("sideWinrate").textContent = `${stats.winrate || 0}%`;
  document.getElementById("sideLevel").textContent = profile.level || profile.levelInfo?.level || 1;
  document.getElementById("sideXp").textContent = profile.xp || 0;
  document.getElementById("sideXpFill").style.width = `${profile.levelInfo?.progress || 0}%`;
}

async function loadProfile(){
  try{
    const response = await fetch(`/api/profile/${encodeURIComponent(user.username)}`, { cache: "no-store" });
    if(!response.ok) throw new Error("Profile unavailable");
    renderSideProfile(await response.json());
  }catch(err){
    renderSideProfile(user);
  }
}

async function loadGames(){
  const response = await fetch("/api/games/catalog", { cache: "no-store" });
  const data = await response.json();
  if(!response.ok) throw new Error(data?.error || "Games unavailable");
  const access = data.access || {};
  document.getElementById("gamesGrid").innerHTML = catalog.map(game => tileMarkup(game, access[game.key])).join("");
}

function renderWeeklyChallenge(challenge){
  const list = document.getElementById("weeklyChallengeList");
  if(!challenge?.enabled){
    list.innerHTML = `<div class="challenge-row"><span>No weekly challenge active</span><small>XP 0</small><div class="progress"><i style="width:0%"></i></div></div>`;
    return;
  }
  if(challenge.mode === "multi_game_bonus"){
    const names = (challenge.games || []).map(game => game.name).join(", ");
    list.innerHTML = `
      <div class="challenge-row"><span>Play all selected games without surrender</span><small>XP ${challenge.extraXp || 0}</small><div class="progress"><i style="width:0%"></i></div></div>
      <div class="challenge-row"><span>${escapeHtml(names || "Selected games")}</span><small>All games</small><div class="progress"><i style="width:0%"></i></div></div>
    `;
    return;
  }
  list.innerHTML = `
    <div class="challenge-row"><span>Double XP on ${escapeHtml(challenge.name || "the featured game")}</span><small>2x XP</small><div class="progress"><i style="width:100%"></i></div></div>
  `;
}

async function loadWeeklyChallenge(){
  try{
    const response = await fetch("/api/games/game-of-week", { cache: "no-store" });
    const data = await response.json();
    if(!response.ok) throw new Error("Challenge unavailable");
    renderWeeklyChallenge(data);
  }catch(err){
    document.getElementById("weeklyChallengeList").innerHTML = `<div class="challenge-row"><span>Challenge unavailable</span><small>XP 0</small></div>`;
  }
}

async function loadSideLeaderboard(){
  const wrap = document.getElementById("sideLeaderboard");
  try{
    const response = await fetch(`/api/leaderboard/global/${encodeURIComponent(user.username)}`, { cache: "no-store" });
    const data = await response.json();
    if(!response.ok) throw new Error("Leaderboard unavailable");
    const top = (data.top || []).slice(0, 3);
    wrap.innerHTML = top.length ? top.map((entry, index) => `
      <div class="leader-row">
        <span>${index + 1}</span>
        <b>${escapeHtml(entry.username)}</b>
        <span>${entry.value}</span>
      </div>
    `).join("") : "<div class='leader-row'><span>-</span><span>No players yet</span><span>0</span></div>";
  }catch(err){
    wrap.innerHTML = "<div class='leader-row'><span>-</span><span>Leaderboard unavailable</span><span>0</span></div>";
  }
}

document.getElementById("gamesSearch").addEventListener("input", event => {
  const query = event.currentTarget.value.trim().toLowerCase();
  document.querySelectorAll(".game-tile").forEach(tile => {
    tile.hidden = query && !tile.dataset.title.includes(query);
  });
});

loadProfile();
loadGames().catch(err => {
  document.getElementById("gamesNotice").textContent = err.message || "Unable to load games.";
});
loadWeeklyChallenge();
loadSideLeaderboard();
setInterval(loadWeeklyChallenge, 30000);
</script>
</body>
</html>
