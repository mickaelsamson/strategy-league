<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/assets/styles/theme.css">
<script defer src="/assets/scripts/site-shell.js"></script>
<title>Games</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
  padding-top:80px; /* 🔥 navbar fix */
  margin:0;
}

button{
  padding:15px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}
</style>
</head>

<body class="with-navbar">
  
<!-- 🔥 NAVBAR -->
<div id="navbar-container"></div>

<h1>🎮 Games Hub</h1>

<button onclick="goChess()">♟️ Chess</button>
<button onclick="goOthello()">⚫ Othello</button>
<button id="adminBtn" style="display:none;" onclick="goAdmin()">👑 Admin</button>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "/login.html";
}

/* ADMIN BUTTON */
if(user && user.isAdmin){
  document.getElementById("adminBtn").style.display = "inline-block";
}

function goChess(){
  window.location.href = "/chess/index.html";
}
function goWarStrategy(){
  window.location.href = "/strategy/index.html";
}  
  
function goOthello(){
  window.location.href = "/othello/index.html";
}

function goAdmin(){
  window.location.href = "/admin.html";
}

</script>

</body>
</html>
