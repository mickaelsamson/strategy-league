<!DOCTYPE html>
<html>
<head>
<title>Choose Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:20px 30px;
  align-items:center;
}

.logo{
  font-size:24px;
  font-weight:bold;
  color:#facc15;
}

/* GRID */
.container{
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:80px;
  flex-wrap:wrap;
}

/* CARD */
.card{
  width:260px;
  height:180px;
  background:linear-gradient(145deg,#1f2937,#020617);
  border-radius:20px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.card:hover{
  transform:scale(1.08);
  box-shadow:0 0 25px rgba(250,204,21,0.6);
}

.icon{
  font-size:40px;
  margin-bottom:10px;
}

.title{
  font-size:18px;
  font-weight:bold;
}

/* BACK */
.back{
  margin-top:40px;
  text-align:center;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="header">
  <div class="logo">🎮 Choose Your Game</div>
  <div id="player"></div>
</div>

<div class="container">

  <!-- STRATEGY -->
  <div class="card" onclick="goStrategy()">
    <div class="icon">⚔️</div>
    <div class="title">Strategy War</div>
  </div>

  <!-- CHESS -->
  <div class="card" onclick="goChess()">
    <div class="icon">♟️</div>
    <div class="title">Chess (Soon)</div>
  </div>

</div>

<div class="back">
  <button onclick="goBack()">⬅ Back</button>
</div>

<script>

/* SESSION */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="/login.html";
}else{
  document.getElementById("player").innerText = "👑 " + user.username;
}

/* NAV */
function goStrategy(){
  window.location.href="/game.html";
}

function goChess(){
  alert("Coming soon 👀");
}

function goBack(){
  window.location.href="/";
}

</script>

</body>
</html>
