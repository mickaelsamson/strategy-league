<!DOCTYPE html>
<html>
<head>
<title>Strategy Hub</title>

<style>
body{
  margin:0;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
  font-family:Arial;
  text-align:center;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
}

.title{
  font-size:24px;
  font-weight:bold;
}

/* ADMIN BUTTON */
.admin-btn{
  display:none;
  background:linear-gradient(135deg,#facc15,#eab308);
  color:black;
  font-weight:bold;
}

/* MAIN */
.container{
  margin-top:100px;
}

.main-btn{
  padding:18px 30px;
  margin:15px;
  border:none;
  border-radius:14px;
  font-size:18px;
  cursor:pointer;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;
  transition:0.2s;
}

.main-btn:hover{
  transform:scale(1.05);
}

/* SMALL BUTTON */
button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">🎮 Strategy Hub</div>
  <button id="adminBtn" class="admin-btn">👑 Admin</button>
</div>

<div class="container">
  <h1>Welcome</h1>

  <button class="main-btn" onclick="goGames()">Play</button>
</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

/* REDIRECT SI PAS LOG */
if(!user){
  window.location.href = "/login.html";
}

/* ADMIN ONLY */
if(user && user.isAdmin){
  const btn = document.getElementById("adminBtn");
  btn.style.display = "inline-block";
  btn.onclick = ()=> window.location.href = "/admin.html";
}

/* NAV */
function goGames(){
  window.location.href = "/games.html";
}

</script>

</body>
</html>
