<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;font-family:sans-serif;text-align:center">

<h1 style="color:#22c55e">🏆 Strategy League</h1>

<div id="menu">
<input id="name" placeholder="Your name"><br><br>
<button onclick="create()">Create Game</button><br><br>
<input id="code" placeholder="Game Code">
<button onclick="join()">Join</button>
</div>

<div id="game" style="display:none">

<h3 id="turn"></h3>

<div style="display:flex;justify-content:center;gap:30px">

<div id="map" style="display:grid;grid-template-columns:repeat(5,60px);gap:6px"></div>

<div style="width:250px">

<div style="background:#111827;padding:10px;border-radius:10px;margin-bottom:10px">
<h3>Game Leaderboard</h3>
<div id="leaderboard"></div>
</div>

<div style="background:#111827;padding:10px;border-radius:10px">
<h3>Global Ranking</h3>
<div id="global"></div>
</div>

</div>

</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

let socket = io();
let selected=null;

function create(){
  socket.emit("createGame",{name:name.value});
  start();
}

function join(){
  socket.emit("joinGame",{id:code.value.toUpperCase(),name:name.value});
  start();
}

function start(){
  menu.style.display="none";
  game.style.display="block";
}

socket.on('state', state=>{
  turn.innerText = "Player "+state.currentPlayer+" — Game "+state.id;
  draw(state);
  leaderboardUI(state);
});

socket.on('global', data=>{
  let sorted = Object.entries(data)
    .sort((a,b)=>b[1]-a[1]);

  global.innerHTML = sorted.map((p,i)=>`
    <div style="color:${i==0?'gold':'white'}">
      ${i+1}. ${p[0]} — ${p[1]} ${i==0?'👑':''}
    </div>`).join("");
});

function draw(state){
  map.innerHTML="";
  state.cells.forEach((c,i)=>{
    let d=document.createElement("div");

    d.style.background=c.owner===1?"#3b82f6":"#ef4444";
    d.style.height="60px";
    d.style.display="flex";
    d.style.alignItems="center";
    d.style.justifyContent="center";
    d.style.borderRadius="8px";

    d.innerText=c.troops;

    d.onclick=()=>{
      if(selected==null) selected=i;
      else{
        socket.emit("move",{from:selected,to:i});
        selected=null;
      }
    };

    map.appendChild(d);
  });
}

function leaderboardUI(state){
  let sorted = Object.entries(state.scores)
    .sort((a,b)=>b[1]-a[1]);

  leaderboard.innerHTML = sorted.map((p,i)=>`
    <div style="color:${i==0?'gold':'white'}">
      ${i+1}. ${p[0]} — ${p[1]} ${i==0?'👑':''}
    </div>`).join("");
}

</script>
</body>
</html>
