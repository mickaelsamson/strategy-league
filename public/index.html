<!DOCTYPE html>
<html>
<head>
<title>Strategy Hub</title>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  padding-top:80px; /* 🔥 navbar fix */
}

.container{
  width:100%;
  max-width:800px;
  padding:20px;
  text-align:center;
}

/* TITLE */
h1{
  margin-bottom:20px;
}

/* CARDS */
.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
}

/* BUTTONS */
button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  background:#3b82f6;
  color:white;
  transition:0.2s;
}

button:hover{
  background:#2563eb;
}

.secondary{
  background:#1f2937;
}

.secondary:hover{
  background:#374151;
}

/* PROFILE */
.profile{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.profile-left{
  text-align:left;
}

.badge{
  padding:6px 12px;
  border-radius:20px;
  background:#374151;
}

/* LEADERBOARD */
.leaderboard{
  text-align:left;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #1f2937;
}

.top1{color:gold;}
.top2{color:silver;}
.top3{color:#cd7f32;}

/* ADMIN */
#adminBtn{
  display:none;
  background:#f59e0b;
}
</style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<div id="navbar-container"></div>

<script>
fetch("/components/navbar.html")
  .then(res => res.text())
  .then(html => {

    const container = document.getElementById("navbar-container");
    container.innerHTML = html;

    const user = JSON.parse(localStorage.getItem("user"));

    // ADMIN BUTTON NAVBAR
    if(user && user.isAdmin){
      const adminBtn = document.getElementById("adminNav");
      if(adminBtn){
        adminBtn.style.display = "inline-block";
      }
    }

    // NAVIGATION
    document.querySelectorAll("[data-link]").forEach(btn=>{
      btn.addEventListener("click", ()=>{

        const link = btn.dataset.link;

        if(link === "home") window.location.href = "/";
        if(link === "games") window.location.href = "/games.html";
        if(link === "leaderboard") window.location.href = "/leaderboard.html";
        if(link === "profile") window.location.href = "/profile.html";
        if(link === "admin") window.location.href = "/admin.html";

        if(link === "logout"){
          localStorage.removeItem("user");
          window.location.href = "/login.html";
        }

      });
    });

  });
</script>

<div class="container">

<h1>🎮 Strategy Hub</h1>

<!-- ACTIONS -->
<div class="card">
  <button onclick="goGames()">▶ Play</button>
  <button class="secondary" onclick="goLeaderboard()">🏆 Leaderboard</button>
  <br>
  <button id="adminBtn" onclick="goAdmin()">👑 Admin</button>
</div>

<!-- PROFILE -->
<div class="card profile">
  <div class="profile-left">
    <div><strong id="username"></strong></div>
    <div>ELO: <span id="elo">1000</span></div>
    <div>XP: <span id="xp">0</span></div>
  </div>
  <div id="badge" class="badge">Bronze</div>
</div>

<!-- TOP 3 -->
<div class="card leaderboard">
  <h3>👑 Top Players</h3>
  <div id="top3"></div>
</div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href = "/login.html";
}

/* ADMIN */
if(user.isAdmin){
  document.getElementById("adminBtn").style.display = "inline-block";
}

/* PROFILE */
document.getElementById("username").innerText = user.username;
document.getElementById("elo").innerText = user.elo || 1000;
document.getElementById("xp").innerText = user.xp || 0;

/* BADGE SYSTEM */
function getBadge(elo){
  if(elo >= 1400) return "🥇 Gold";
  if(elo >= 1200) return "🥈 Silver";
  return "🥉 Bronze";
}

document.getElementById("badge").innerText = getBadge(user.elo || 1000);

/* LEADERBOARD */
async function loadLeaderboard(){

  const res = await fetch("/api/leaderboard/global/"+user.username);
  const data = await res.json();

  const top3 = data.top.slice(0,3);

  document.getElementById("top3").innerHTML = top3.map((u,i)=>`
    <div class="row top${i+1}">
      <span>${i===0?'🥇':i===1?'🥈':'🥉'} ${u.username}</span>
      <span>${u.value}</span>
    </div>
  `).join("");
}

loadLeaderboard();

/* NAV (garde ton système existant intact) */
function goGames(){
  window.location.href = "/games.html";
}

function goLeaderboard(){
  window.location.href = "/leaderboard.html";
}

function goAdmin(){
  window.location.href = "/admin.html";
}

</script>

</body>
</html>
