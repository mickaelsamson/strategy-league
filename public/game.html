<!DOCTYPE html>
<html>
<head>
<title>Strategy Hub</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}

.header{
  font-size:24px;
  padding:15px;
}

.auth{
  margin:10px;
}

input{
  padding:10px;
  margin:5px;
}

button{
  padding:10px 15px;
  margin:5px;
  cursor:pointer;
}

/* GAME */
#gameContainer{
  position:relative;
  width:100%;
  max-width:1000px;
  margin:auto;
}

#map{
  width:100%;
  border-radius:10px;
}

.territory{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.territory:hover{
  transform:scale(1.2);
}

/* COLORS */
.blue{background:#3b82f6;}
.red{background:#ef4444;}
.green{background:#22c55e;}
.purple{background:#a855f7;}

#timer{margin:10px;}
#leaderboard{margin:10px;}
</style>

</head>

<body>

<div class="header">🎮 Strategy Hub</div>

<div class="auth">
  <input id="usernameInput" placeholder="Username">
  <input id="passwordInput" type="password" placeholder="Password">
  <br>
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<div id="timer"></div>
<div id="leaderboard"></div>

<div id="gameContainer">
  <img id="map" src="map.png">
  <div id="territoriesLayer"></div>
</div>

<script>
let socket = io();
let selected = null;

/* LOGIN */
function login(){

  const username = document.getElementById("usernameInput").value.trim();
  const password = document.getElementById("passwordInput").value.trim();

  if(!username || !password){
    alert("Fill all fields");
    return;
  }

  fetch('/api/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username,password})
  })
  .then(r=>r.json())
  .then(u=>{
    if(u.error){
      alert(u.error);
      return;
    }

    localStorage.setItem("user", u.username);
    socket.emit("create", u.username);
  })
  .catch(err=>{
    console.log("LOGIN ERROR:", err);
  });
}

/* REGISTER */
function register(){

  const username = document.getElementById("usernameInput").value.trim();
  const password = document.getElementById("passwordInput").value.trim();

  if(!username || !password){
    alert("Fill all fields");
    return;
  }

  fetch('/api/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username,password})
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.error){
      alert(res.error);
    } else {
      alert("Account created!");
    }
  });
}

/* POSITIONS */
const positions = [
  [10,60],[25,40],[40,55],[55,45],[70,60],
  [15,75],[30,70],[50,70],[70,75],
  [25,85],[50,85],[70,90]
];

/* DRAW */
socket.on("state", g=>{
  const layer = document.getElementById("territoriesLayer");
  layer.innerHTML="";

  const colors = ["blue","red","green","purple"];

  g.territories.forEach((t,i)=>{
    let d = document.createElement("div");

    d.className = "territory " + colors[t.owner % colors.length];
    d.innerText = t.troops;

    d.style.left = positions[i][0] + "%";
    d.style.top = positions[i][1] + "%";

    d.onclick = ()=>{
      if(selected===null){
        selected=i;
      } else {
        socket.emit("move",{from:selected,to:i});
        selected=null;
      }
    };

    layer.appendChild(d);
  });
});

/* TIMER */
socket.on("timer",t=>{
  document.getElementById("timer").innerText="⏳ "+t;
});

/* LEADERBOARD */
function loadLB(){
  fetch('/api/stats')
  .then(r=>r.json())
  .then(data=>{
    document.getElementById("leaderboard").innerHTML =
      data.map((u,i)=>`${i+1}. ${u.username} — ${u.xp}`).join("<br>");
  });
}
setInterval(loadLB,3000);

/* FX */
socket.on("attack",()=>{
  document.body.style.background="#220000";
  setTimeout(()=>document.body.style.background="#020617",200);
});
</script>

</body>
</html>
