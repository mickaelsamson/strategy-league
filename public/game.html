<!DOCTYPE html>
<html>
<head>
  <title>Strategy Hub</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body{
      background:#020617;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    #game{
      margin-top:20px;
    }

    .cell{
      width:60px;
      height:60px;
      display:inline-flex;
      justify-content:center;
      align-items:center;
      margin:3px;
      cursor:pointer;
      font-weight:bold;
      border-radius:6px;
    }

    input, button{
      padding:10px;
      margin:5px;
    }
  </style>
</head>

<body>

<h2>🎮 Strategy Hub</h2>

<input id="usernameInput" placeholder="Enter your name">
<button onclick="login()">Login</button>

<div id="timer"></div>
<div id="leaderboard"></div>

<div id="game"></div>

<script>
let socket = io();
let selected = null;

/* LOGIN */
function login(){

  const input = document.getElementById("usernameInput");

  if(!input){
    alert("Input not found");
    return;
  }

  const username = input.value.trim();

  if(!username){
    alert("Enter a name");
    return;
  }

  fetch('/api/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username})
  })
  .then(r=>r.json())
  .then(u=>{
    console.log("Logged:", u);

    localStorage.setItem("user", u.username);

    socket.emit("create", u.username);
  })
  .catch(err=>{
    console.log("LOGIN ERROR:", err);
  });
}

/* GAME STATE */
socket.on("state", g=>{
  draw(g);
});

/* DRAW GAME */
function draw(g){

  const game = document.getElementById("game");
  game.innerHTML = "";

  const colors = ["#3b82f6","#ef4444","#22c55e","#a855f7"];

  g.territories.forEach((t,i)=>{
    let d = document.createElement("div");

    d.className = "cell";
    d.style.background = colors[t.owner % colors.length];
    d.innerText = t.troops;

    d.onclick = ()=>{
      if(selected === null){
        selected = i;
      } else {
        socket.emit("move",{from:selected,to:i});
        selected = null;
      }
    };

    game.appendChild(d);
  });
}

/* TIMER */
socket.on("timer",t=>{
  document.getElementById("timer").innerText = "⏳ " + t;
});

/* LEADERBOARD */
function loadLB(){
  fetch('/api/stats')
  .then(r=>r.json())
  .then(data=>{
    document.getElementById("leaderboard").innerHTML =
      data.map((u,i)=>`${i+1}. ${u.username || "Unknown"} — ${u.xp || 0}`)
      .join("<br>");
  });
}

setInterval(loadLB,3000);

/* ATTACK FX */
socket.on("attack",()=>{
  alert("💥 Attack!");
});
</script>

</body>
</html>
