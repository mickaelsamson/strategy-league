<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
</head>

<body>

<div>
  <input id="name" placeholder="Name">
  <button onclick="login()">Login</button>
</div>

<div id="timer"></div>
<div id="leaderboard"></div>

<script>
let socket = io();

/* LOGIN */
function login(){

  if(!name.value.trim()){
    alert("Enter a name");
    return;
  }

  fetch('/api/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:name.value})
  })
  .then(r=>r.json())
  .then(u=>{
    console.log("Logged:", u);

    localStorage.setItem("user", u.username);

    socket.emit("create", u.username);
  });
}

/* TIMER */
socket.on("timer",t=>{
  timer.innerText="⏳ "+t;
});

/* LEADERBOARD */
function loadLB(){
  fetch('/api/stats')
  .then(r=>r.json())
  .then(data=>{
    leaderboard.innerHTML = data.map((u,i)=>`
      ${i+1}. ${u.username} — ${u.xp}
    `).join("<br>");
  });
}
setInterval(loadLB,3000);

/* ATTACK */
socket.on("attack",()=>{
  alert("💥 Attack!");
});
</script>

</body>
</html>
