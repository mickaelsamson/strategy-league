<!DOCTYPE html>
<html>
<head>
<title>Strategy Hub</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}

/* TOP BAR */
.header{
  padding:15px;
  font-size:24px;
}

/* LOGIN */
.login{
  margin:10px;
}

/* GAME AREA */
#gameContainer{
  position:relative;
  width:100%;
  max-width:1000px;
  margin:auto;
}

/* MAP IMAGE */
#map{
  width:100%;
  border-radius:10px;
}

/* TERRITORIES */
.territory{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.territory:hover{
  transform:scale(1.2);
  box-shadow:0 0 15px gold;
}

/* COLORS */
.blue{background:#3b82f6;}
.red{background:#ef4444;}
.green{background:#22c55e;}
.purple{background:#a855f7;}

/* UI */
#timer{margin:10px;}
#leaderboard{margin:10px;}
</style>
</head>

<body>

<div class="header">🎮 Strategy Hub</div>

<div class="login">
  <input id="usernameInput" placeholder="Name">
  <button onclick="login()">Login</button>
</div>

<div id="timer"></div>
<div id="leaderboard"></div>

<div id="gameContainer">

  <!-- TA MAP -->
  <img id="map" src="map.png">

  <!-- TERRITORIES -->
  <div id="territoriesLayer"></div>

</div>

<script>
let socket = io();
let selected = null;

/* LOGIN */
function login(){
  const username = document.getElementById("usernameInput").value.trim();
  if(!username) return alert("Enter name");

  fetch('/api/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username})
  })
  .then(r=>r.json())
  .then(u=>{
    localStorage.setItem("user", u.username);
    socket.emit("create", u.username);
  });
}

/* POSITIONS (map simple, upgradeable) */
const positions = [
  [10,60],[25,40],[40,55],[55,45],[70,60],
  [15,75],[30,70],[50,70],[70,75],
  [25,85],[50,85],[70,90]
];

/* GAME STATE */
socket.on("state", g=>{
  draw(g);
});

/* DRAW MAP TERRITORIES */
function draw(g){

  const layer = document.getElementById("territoriesLayer");
  layer.innerHTML="";

  const colors = ["blue","red","green","purple"];

  g.territories.forEach((t,i)=>{
    let d = document.createElement("div");

    d.className = "territory " + colors[t.owner % colors.length];
    d.innerText = t.troops;

    d.style.left = positions[i][0] + "%";
    d.style.top = positions[i][1] + "%";

    d.onclick = ()=>{
      if(selected===null){
        selected=i;
      } else {
        socket.emit("move",{from:selected,to:i});
        selected=null;
      }
    };

    layer.appendChild(d);
  });
}

/* TIMER */
socket.on("timer",t=>{
  document.getElementById("timer").innerText="⏳ "+t;
});

/* LEADERBOARD */
function loadLB(){
  fetch('/api/stats')
  .then(r=>r.json())
  .then(data=>{
    document.getElementById("leaderboard").innerHTML =
      data.map((u,i)=>`${i+1}. ${u.username} — ${u.xp}`).join("<br>");
  });
}
setInterval(loadLB,3000);

/* FX */
socket.on("attack",()=>{
  flash();
});

function flash(){
  document.body.style.background="#220000";
  setTimeout(()=>document.body.style.background="#020617",200);
}
</script>

</body>
</html>
