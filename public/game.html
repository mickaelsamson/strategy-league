<!DOCTYPE html>
<html>
<head>
<script src="/socket.io/socket.io.js"></script>
<style>
body{background:#020617;color:white;font-family:Arial}
.cell{
  width:60px;height:60px;
  display:inline-flex;
  justify-content:center;
  align-items:center;
  margin:2px;
  cursor:pointer;
}
</style>
</head>

<body>

<input id="name" placeholder="Name">
<button onclick="login()">Login</button>

<div id="timer"></div>
<div id="leaderboard"></div>

<div id="game"></div>

<script>
let socket = io();
let selected=null;

/* LOGIN */
function login(){
  if(!name.value.trim()){
    alert("Enter name");
    return;
  }

  fetch('/api/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:name.value})
  })
  .then(r=>r.json())
  .then(u=>{
    localStorage.setItem("user", u.username);
    socket.emit("create", u.username);
  });
}

/* GAME STATE */
socket.on("state", g=>{
  draw(g);
});

/* DRAW GAME */
function draw(g){
  game.innerHTML="";

  g.territories.forEach((t,i)=>{
    let d=document.createElement("div");
    d.className="cell";
    d.style.background = ["blue","red","green","purple"][t.owner];
    d.innerText=t.troops;

    d.onclick=()=>{
      if(selected===null) selected=i;
      else{
        socket.emit("move",{from:selected,to:i});
        selected=null;
      }
    };

    game.appendChild(d);
  });
}

/* TIMER */
socket.on("timer",t=>{
  timer.innerText="⏳ "+t;
});

/* LEADERBOARD */
function loadLB(){
  fetch('/api/stats')
  .then(r=>r.json())
  .then(data=>{
    leaderboard.innerHTML = data.map((u,i)=>`
      ${i+1}. ${u.username || "Unknown"} — ${u.xp || 0}
    `).join("<br>");
  });
}
setInterval(loadLB,3000);

/* FX */
socket.on("attack",()=>{
  alert("💥 Attack!");
});
</script>

</body>
</html>
