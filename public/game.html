<!DOCTYPE html>
<html>
<head>
<title>Strategy Game</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
}

/* GAME CONTAINER */
#gameContainer{
  position:relative;
  width:90%;
  max-width:1000px;
  margin:auto;
}

/* MAP IMAGE */
#map{
  width:100%;
  display:block;
  border-radius:10px;
}

/* SVG OVERLAY */
#overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* TERRITORIES */
.territory{
  fill:rgba(255,255,255,0.1);
  stroke:#000;
  stroke-width:2;
  cursor:pointer;
  transition:0.2s;
}

.territory:hover{
  fill:rgba(255,255,255,0.3);
}

.selected{
  stroke:yellow;
  stroke-width:4;
}

/* COLORS */
.blue{ fill:#3b82f6; }
.red{ fill:#ef4444; }
.green{ fill:#22c55e; }
.purple{ fill:#a855f7; }

/* TIMER */
#timer{
  margin:10px;
}
</style>

</head>

<body>

<div class="header">
  <div id="player"></div>
  <button onclick="logout()">Logout</button>
</div>

<div id="timer"></div>

<div id="gameContainer">

  <!-- TA MAP -->
  <img src="map.png" id="map">

  <!-- OVERLAY SVG -->
  <svg id="overlay" viewBox="0 0 1000 700">

    <!-- TOP -->
    <polygon id="t0" class="territory" points="300,120 450,120 375,260"/>
    <polygon id="t1" class="territory" points="450,120 600,120 525,260"/>
    <polygon id="t2" class="territory" points="600,120 750,120 675,260"/>

    <!-- MIDDLE -->
    <polygon id="t3" class="territory" points="375,260 525,260 450,400"/>
    <polygon id="t4" class="territory" points="525,260 675,260 600,400"/>

    <!-- BOTTOM -->
    <polygon id="t5" class="territory" points="450,400 600,400 525,560"/>

  </svg>

</div>

<script>
const socket = io();
let selected = null;

/* SESSION */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="/login.html";
}else{
  player.innerText = user.username;
  socket.emit("create", user.username);
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  window.location.href="/login.html";
}

/* STATE */
socket.on("state", g=>{

  const colors = ["blue","red","green","purple"];

  g.territories.forEach((t,i)=>{

    const el = document.getElementById("t"+i);
    if(!el) return;

    el.setAttribute("class","territory " + colors[t.owner % colors.length]);

    el.onclick = ()=>{

      if(selected === null){
        selected = i;
        el.classList.add("selected");
      } else {
        socket.emit("move",{from:selected,to:i});
        selected = null;

        document.querySelectorAll(".territory")
          .forEach(e=>e.classList.remove("selected"));
      }

    };

  });

});

/* TIMER */
socket.on("timer",t=>{
  timer.innerText = "⏳ " + t;
});

/* ATTACK FX */
socket.on("attack",()=>{
  document.body.style.background="#220000";
  setTimeout(()=>document.body.style.background="#020617",200);
});
</script>

</body>
</html>
