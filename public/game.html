<!DOCTYPE html>
<html>
<head>
<title>Strategy Hub</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body{
  margin:0;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
  font-family:Arial;
  text-align:center;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
}

/* TIMER */
#timer{
  margin:10px;
  font-size:18px;
}

/* CONTAINER */
#gameContainer{
  position:relative;
  width:90%;
  max-width:1100px;
  margin:auto;
}

/* MAP */
#map{
  width:100%;
  border-radius:12px;
}

/* OVERLAY */
#overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* ZONES */
.zone{
  fill:rgba(255,255,255,0.05);
  stroke-width:3;
  cursor:pointer;
  transition:0.2s;
}

/* CONTINENTS */
.divin{ stroke:rgba(59,130,246,0.6); }
.foret{ stroke:rgba(34,197,94,0.6); }
.fer{ stroke:rgba(239,68,68,0.6); }
.sable{ stroke:rgba(234,179,8,0.6); }
.demons{ stroke:rgba(168,85,247,0.6); }

/* HOVER */
.zone:hover{
  fill:rgba(255,255,255,0.15);
}

/* SELECTED */
.selected{
  stroke:white !important;
  stroke-width:5;
}

/* TROOPS LABEL */
.label{
  fill:white;
  font-size:14px;
  text-anchor:middle;
  pointer-events:none;
}

</style>
</head>

<body>

<div class="header">
  <div id="player"></div>
  <button onclick="logout()">Logout</button>
</div>

<div id="timer"></div>

<div id="gameContainer">

  <img src="map.png" id="map">

  <svg id="overlay" viewBox="0 0 1000 700">

    <!-- DIVIN -->
    <path id="t0" class="zone divin" d="M150,200 L300,150 L350,300 L200,350 Z"/>
    <path id="t1" class="zone divin" d="M300,150 L450,200 L400,350 L350,300 Z"/>

    <!-- FORET -->
    <path id="t2" class="zone foret" d="M500,150 L650,180 L600,300 L480,250 Z"/>
    <path id="t3" class="zone foret" d="M650,180 L800,220 L750,350 L600,300 Z"/>

    <!-- FER -->
    <path id="t4" class="zone fer" d="M750,350 L900,380 L850,550 L700,500 Z"/>
    <path id="t5" class="zone fer" d="M700,500 L850,550 L780,650 L650,600 Z"/>

    <!-- SABLE -->
    <path id="t6" class="zone sable" d="M350,500 L550,500 L500,650 L300,650 Z"/>

    <!-- DEMONS -->
    <path id="t7" class="zone demons" d="M450,300 L550,300 L520,400 L430,400 Z"/>

  </svg>

</div>

<script>
const socket = io();
let selected = null;

/* SESSION */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="/login.html";
}else{
  document.getElementById("player").innerText = "👑 " + user.username;
  socket.emit("create", user.username);
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  window.location.href="/login.html";
}

/* STATE */
socket.on("state", g=>{

  const colors = ["divin","foret","fer","sable","demons"];

  g.territories.forEach((t,i)=>{

    const el = document.getElementById("t"+i);
    if(!el) return;

    // reset classes
    el.classList.remove("selected");

    // interaction
    el.onclick = ()=>{
      if(selected === null){
        selected = i;
        el.classList.add("selected");
      } else {
        socket.emit("move",{from:selected,to:i});
        selected = null;

        document.querySelectorAll(".zone")
          .forEach(e=>e.classList.remove("selected"));
      }
    };

    // update label
    let label = document.getElementById("label"+i);

    if(!label){
      label = document.createElementNS("http://www.w3.org/2000/svg","text");
      label.setAttribute("id","label"+i);
      label.setAttribute("class","label");

      const bbox = el.getBBox();
      label.setAttribute("x", bbox.x + bbox.width/2);
      label.setAttribute("y", bbox.y + bbox.height/2);

      document.getElementById("overlay").appendChild(label);
    }

    label.textContent = t.troops;

  });

});

/* TIMER */
socket.on("timer",t=>{
  document.getElementById("timer").innerText = "⏳ " + t;
});

/* FX */
socket.on("attack",()=>{
  document.body.style.background="#220000";
  setTimeout(()=>document.body.style.background="#020617",200);
});
</script>

</body>
</html>
