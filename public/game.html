<!DOCTYPE html>
<html>
<head>
<title>Strategy Game</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
}

svg{
  width:90%;
  max-width:900px;
  margin:auto;
}

/* TERRITORIES */
.territory{
  fill:#1f2937;
  stroke:#000;
  stroke-width:2;
  cursor:pointer;
  transition:0.2s;
}

.territory:hover{
  filter:brightness(1.5);
}

.selected{
  stroke:yellow;
  stroke-width:4;
}

.blue{ fill:#3b82f6; }
.red{ fill:#ef4444; }
.green{ fill:#22c55e; }
.purple{ fill:#a855f7; }

text{
  pointer-events:none;
  fill:white;
  font-size:12px;
  text-anchor:middle;
}
</style>

</head>

<body>

<div class="header">
  <div id="player"></div>
  <button onclick="logout()">Logout</button>
</div>

<div id="timer"></div>

<!-- SVG MAP -->
<svg viewBox="0 0 400 300">

  <!-- TERRITORIES -->
  <g id="map">

    <polygon id="t0" class="territory" points="20,50 80,50 60,100"/>
    <polygon id="t1" class="territory" points="80,50 140,50 120,100"/>
    <polygon id="t2" class="territory" points="140,50 200,50 180,100"/>
    <polygon id="t3" class="territory" points="60,100 120,100 100,150"/>
    <polygon id="t4" class="territory" points="120,100 180,100 160,150"/>
    <polygon id="t5" class="territory" points="100,150 160,150 130,200"/>

  </g>

</svg>

<script>
const socket = io();
let selected = null;

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="/login.html";
}else{
  player.innerText = user.username;
  socket.emit("create", user.username);
}

function logout(){
  localStorage.removeItem("user");
  window.location.href="/login.html";
}

/* DRAW STATE */
socket.on("state", g=>{

  const colors = ["blue","red","green","purple"];

  g.territories.forEach((t,i)=>{

    const el = document.getElementById("t"+i);
    if(!el) return;

    el.setAttribute("class","territory " + colors[t.owner % colors.length]);

    el.onclick = ()=>{
      if(selected === null){
        selected = i;
        el.classList.add("selected");
      } else {
        socket.emit("move",{from:selected,to:i});
        selected = null;
        document.querySelectorAll(".territory").forEach(e=>e.classList.remove("selected"));
      }
    };

  });

});

/* TIMER */
socket.on("timer",t=>{
  timer.innerText = "⏳ " + t;
});

/* FX */
socket.on("attack",()=>{
  document.body.style.background="#220000";
  setTimeout(()=>document.body.style.background="#020617",200);
});
</script>

</body>
</html>
