<!DOCTYPE html>
<html>
<head>
<title>Strategy Hub</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body{
  margin:0;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
  font-family:Arial;
  text-align:center;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  align-items:center;
}

#player{
  font-weight:bold;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* TIMER */
#timer{
  font-size:18px;
  margin:10px;
}

/* GAME CONTAINER */
#gameContainer{
  position:relative;
  width:90%;
  max-width:1000px;
  margin:auto;
}

/* MAP */
#map{
  width:100%;
  border-radius:12px;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

/* OVERLAY */
#overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* TERRITORIES */
.territory{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  transform:translate(-50%, -50%);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:white;
  cursor:pointer;
  transition:0.2s;
  border:2px solid rgba(0,0,0,0.6);
}

/* HOVER */
.territory:hover{
  transform:translate(-50%, -50%) scale(1.2);
  filter:brightness(1.3);
}

/* SELECTED */
.selected{
  box-shadow:0 0 20px yellow;
  transform:translate(-50%, -50%) scale(1.25);
}

/* COLORS */
.blue{
  background:linear-gradient(145deg,#3b82f6,#1d4ed8);
  box-shadow:0 0 12px rgba(59,130,246,0.6);
}

.red{
  background:linear-gradient(145deg,#ef4444,#991b1b);
  box-shadow:0 0 12px rgba(239,68,68,0.6);
}

.green{
  background:linear-gradient(145deg,#22c55e,#166534);
  box-shadow:0 0 12px rgba(34,197,94,0.6);
}

.purple{
  background:linear-gradient(145deg,#a855f7,#6b21a8);
  box-shadow:0 0 12px rgba(168,85,247,0.6);
}

/* PULSE ANIMATION */
@keyframes pulse{
  0%{box-shadow:0 0 10px rgba(255,255,255,0.2);}
  50%{box-shadow:0 0 20px rgba(255,255,255,0.5);}
  100%{box-shadow:0 0 10px rgba(255,255,255,0.2);}
}

.active-turn{
  animation:pulse 2s infinite;
}

/* ATTACK FX */
.flash{
  animation:flash 0.2s;
}

@keyframes flash{
  from{background:#220000;}
  to{background:#020617;}
}

</style>

</head>

<body>

<div class="header">
  <div id="player"></div>
  <button onclick="logout()">Logout</button>
</div>

<div id="timer"></div>

<div id="gameContainer">

  <img src="map.png" id="map">

  <div id="overlay">

    <!-- TOP -->
    <div id="t0" class="territory" style="top:18%; left:30%"></div>
    <div id="t1" class="territory" style="top:18%; left:50%"></div>
    <div id="t2" class="territory" style="top:18%; left:70%"></div>

    <!-- MIDDLE -->
    <div id="t3" class="territory" style="top:40%; left:40%"></div>
    <div id="t4" class="territory" style="top:40%; left:60%"></div>

    <!-- BOTTOM -->
    <div id="t5" class="territory" style="top:65%; left:50%"></div>

  </div>

</div>

<script>
const socket = io();
let selected = null;

/* SESSION */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="/login.html";
}else{
  player.innerText = "👑 " + user.username;
  socket.emit("create", user.username);
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  window.location.href="/login.html";
}

/* STATE */
socket.on("state", g=>{

  const colors = ["blue","red","green","purple"];

  g.territories.forEach((t,i)=>{

    const el = document.getElementById("t"+i);
    if(!el) return;

    el.className = "territory " + colors[t.owner % colors.length];
    el.innerText = t.troops;

    el.onclick = ()=>{

      if(selected === null){
        selected = i;
        el.classList.add("selected");
      } else {
        socket.emit("move",{from:selected,to:i});
        selected = null;

        document.querySelectorAll(".territory")
          .forEach(e=>e.classList.remove("selected"));
      }

    };

  });

});

/* TIMER */
socket.on("timer",t=>{
  timer.innerText = "⏳ Turn: " + t;
});

/* ATTACK FX */
socket.on("attack",()=>{
  document.body.classList.add("flash");
  setTimeout(()=>document.body.classList.remove("flash"),200);
});
</script>

</body>
</html>
