<!DOCTYPE html>
<html>
<head>
<title>Strategy Game</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
}

#gameContainer{
  position:relative;
  max-width:1000px;
  margin:auto;
}

#map{
  width:100%;
}

.territory{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.territory:hover{
  transform:scale(1.2);
}

.blue{background:#3b82f6;}
.red{background:#ef4444;}
.green{background:#22c55e;}
.purple{background:#a855f7;}
</style>

</head>

<body>

<div class="header">
  <div id="player"></div>
  <button onclick="logout()">Logout</button>
</div>

<div id="timer"></div>

<div id="gameContainer">
  <img id="map" src="map.png">
  <div id="territoriesLayer"></div>
</div>

<script>
const socket = io();
let selected = null;

/* SESSION CHECK */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="/login.html";
} else {
  document.getElementById("player").innerText = user.username;
  socket.emit("create", user.username);
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  window.location.href="/login.html";
}

/* POSITIONS */
const positions = [
  [10,60],[25,40],[40,55],[55,45],[70,60],
  [15,75],[30,70],[50,70],[70,75],
  [25,85],[50,85],[70,90]
];

/* DRAW */
socket.on("state", g=>{
  const layer = document.getElementById("territoriesLayer");
  layer.innerHTML="";

  const colors = ["blue","red","green","purple"];

  g.territories.forEach((t,i)=>{
    let d = document.createElement("div");

    d.className = "territory " + colors[t.owner % colors.length];
    d.innerText = t.troops;

    d.style.left = positions[i][0] + "%";
    d.style.top = positions[i][1] + "%";

    d.onclick = ()=>{
      if(selected===null){
        selected=i;
      } else {
        socket.emit("move",{from:selected,to:i});
        selected=null;
      }
    };

    layer.appendChild(d);
  });
});

/* TIMER */
socket.on("timer",t=>{
  document.getElementById("timer").innerText="⏳ "+t;
});

/* FX */
socket.on("attack",()=>{
  document.body.style.background="#220000";
  setTimeout(()=>document.body.style.background="#020617",200);
});
</script>

</body>
</html>
