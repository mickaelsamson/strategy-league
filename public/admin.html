<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
  body {
    background: #020617;
    color: white;
    text-align: center;
    margin-top: 100px;
    font-family: Arial, sans-serif;
  }

  .switch-wrap {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-top: 24px;
  }

  .switch {
    position: relative;
    width: 64px;
    height: 36px;
    display: inline-block;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background-color: #64748b;
    transition: .2s;
    border-radius: 999px;
  }

  .slider:before {
    content: "";
    position: absolute;
    height: 28px;
    width: 28px;
    left: 4px;
    top: 4px;
    background-color: white;
    transition: .2s;
    border-radius: 50%;
  }

  input:checked + .slider {
    background-color: #10b981;
  }

  input:checked + .slider:before {
    transform: translateX(28px);
  }

  #status {
    margin-top: 18px;
    opacity: 0.9;
  }
</style>
</head>

<body style="background:#020617;color:white;text-align:center;margin-top:100px;">
<body>

<h1>👑 Admin Panel</h1>
<p>Bloquer / autoriser l'accès aux jeux avec un switch.</p>

<button onclick="setGames(true)">Enable Games</button>
<button onclick="setGames(false)">Disable Games</button>
<div class="switch-wrap">
  <span>Jeux</span>
  <label class="switch" for="gamesSwitch">
    <input id="gamesSwitch" type="checkbox" />
    <span class="slider"></span>
  </label>
  <strong id="switchLabel">OFF</strong>
</div>

<script>
<p id="status">Chargement du statut...</p>

<script>
const user = JSON.parse(localStorage.getItem("user"));
const gamesSwitch = document.getElementById("gamesSwitch");
const switchLabel = document.getElementById("switchLabel");
const statusEl = document.getElementById("status");

function render(enabled){
  gamesSwitch.checked = enabled;
  switchLabel.textContent = enabled ? "ON" : "OFF";
  statusEl.textContent = enabled
    ? "✅ Les jeux sont autorisés"
    : "⛔ Les jeux sont bloqués";
}

async function fetchGamesStatus(){
  try {
    const res = await fetch("/api/games/status");
    const data = await res.json();
    render(Boolean(data.enabled));
  } catch (err) {
    statusEl.textContent = "Impossible de récupérer le statut des jeux.";
    console.error(err);
  }
}

async function setGames(enabled){
  const res = await fetch("/api/admin/override",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      adminEmail:user.email,
      enabled
    })
  });

  console.log(await res.json());
  if (!user?.email) {
    statusEl.textContent = "Utilisateur admin introuvable (localStorage).";
    gamesSwitch.checked = !enabled;
    return;
  }

  try {
    const res = await fetch("/api/admin/override", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        adminEmail: user.email,
        enabled
      })
    });

    const data = await res.json();

    if (!res.ok) {
      statusEl.textContent = data?.error || "Mise à jour refusée.";
      gamesSwitch.checked = !enabled;
      return;
    }

    render(enabled);
  } catch (err) {
    statusEl.textContent = "Erreur serveur pendant la mise à jour.";
    gamesSwitch.checked = !enabled;
    console.error(err);
  }
}

gamesSwitch.addEventListener("change", (e) => {
  setGames(e.target.checked);
});

fetchGamesStatus();
</script>

</body>
</html>
