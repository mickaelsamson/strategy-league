<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body{
  background:#020617;
  color:white;
  text-align:center;
  margin-top:100px;
  font-family:Arial, sans-serif;
}

.switch-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-top:28px;
}

.switch{
  position:relative;
  width:58px;
  height:32px;
  display:inline-block;
}

.switch input{
  opacity:0;
  width:0;
  height:0;
}

.slider{
  position:absolute;
  inset:0;
  background:#475569;
  border-radius:999px;
  transition:.25s;
  cursor:pointer;
}

.slider:before{
  content:"";
  position:absolute;
  height:24px;
  width:24px;
  left:4px;
  top:4px;
  background:white;
  border-radius:50%;
  transition:.25s;
}

input:checked + .slider{
  background:#22c55e;
}

input:checked + .slider:before{
  transform:translateX(26px);
}

#status{
  margin-top:12px;
  color:#94a3b8;
}
</style>
</head>

<body>

<h1>👑 Admin Panel</h1>

<p>Activer / désactiver l'accès aux jeux pour tout le monde.</p>

<div class="switch-wrap">
  <span>Accès jeux</span>
  <label class="switch">
    <input id="gamesSwitch" type="checkbox">
    <span class="slider"></span>
  </label>
  <strong id="gamesLabel">ON</strong>
</div>

<p id="status"></p>

<script>

const user = JSON.parse(localStorage.getItem("user"));
const gamesSwitch = document.getElementById("gamesSwitch");
const gamesLabel = document.getElementById("gamesLabel");
const statusText = document.getElementById("status");

if(!user || !user.isAdmin){
  window.location.href = "/games.html";
}

async function setGames(enabled){
  try{
    const res = await fetch("/api/admin/override",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        adminEmail:user.email,
        enabled
      })
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.error || "Erreur serveur");
    }

    gamesSwitch.checked = enabled;
    gamesLabel.textContent = enabled ? "ON" : "OFF";
    statusText.textContent = enabled
      ? "Les jeux sont maintenant accessibles."
      : "Les jeux sont maintenant bloqués.";

  }catch(err){
    gamesSwitch.checked = !enabled;
    gamesLabel.textContent = gamesSwitch.checked ? "ON" : "OFF";
    statusText.textContent = "Impossible de mettre à jour le statut.";
    console.error(err);
  }
}

async function loadCurrentStatus(){
  try{
    const res = await fetch("/api/games/status");
    const data = await res.json();

    gamesSwitch.checked = !!data.enabled;
    gamesLabel.textContent = data.enabled ? "ON" : "OFF";
    statusText.textContent = data.enabled
      ? "Les jeux sont actuellement accessibles."
      : "Les jeux sont actuellement bloqués.";
  }catch(err){
    statusText.textContent = "Impossible de charger le statut actuel.";
    console.error(err);
  }
}

gamesSwitch.addEventListener("change", e=>{
  setGames(e.target.checked);
});

loadCurrentStatus();

</script>

</body>
</html>
