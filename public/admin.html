<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}

.container{
  margin-top:100px;
}

button{
  padding:15px 25px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

.on{ background:#22c55e; }
.off{ background:#ef4444; }

.status{
  font-size:22px;
  margin:20px;
}
</style>
</head>

<body>

<h1>👑 Admin Panel</h1>

<div class="container">

  <div id="status" class="status">Loading...</div>

  <button class="on" onclick="setGames(true)">Enable Games</button>
  <button class="off" onclick="setGames(false)">Disable Games</button>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user || !user.email){
  document.body.innerHTML = "<h2>Access denied</h2>";
}

/* 🔥 CHECK STATUS */
async function setGames(enabled){

  const res = await fetch("/api/admin/override",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      adminEmail:user.email,
      enabled
    })
  });

  const data = await res.json();

  if(data.success){
    updateStatus(enabled);
  }else{
    alert("Not admin");
  }
}

function updateStatus(enabled){
  document.getElementById("status").innerText =
    enabled ? "🟢 Games Enabled" : "🔴 Games Disabled";
}

/* default */
updateStatus(true);

</script>

</body>
</html>
