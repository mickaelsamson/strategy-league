<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  background: #020617;
  color: white;
  text-align: center;
  padding-top: 80px;
  margin: 0;
  font-family: Arial, sans-serif;
}

.switch-wrap {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-top: 24px;
}

.switch {
  position: relative;
  width: 64px;
  height: 36px;
  display: inline-block;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background-color: #64748b;
  transition: .2s;
  border-radius: 999px;
}

.slider:before {
  content: "";
  position: absolute;
  height: 28px;
  width: 28px;
  left: 4px;
  top: 4px;
  background-color: white;
  transition: .2s;
  border-radius: 50%;
}

input:checked + .slider {
  background-color: #10b981;
}

input:checked + .slider:before {
  transform: translateX(28px);
}

#status {
  margin-top: 18px;
  opacity: 0.9;
}

.back-btn{
  margin-top:30px;
  background:#1f2937;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
}

.back-btn:hover{
  background:#374151;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div id="navbar-container"></div>

<script>
fetch("/components/navbar.html")
  .then(res => res.text())
  .then(html => {

    const container = document.getElementById("navbar-container");
    container.innerHTML = html;

    const user = JSON.parse(localStorage.getItem("user"));

    // ADMIN BUTTON
    if(user && user.isAdmin){
      const adminBtn = document.getElementById("adminNav");
      if(adminBtn){
        adminBtn.style.display = "inline-block";
      }
    }

    // NAVIGATION
    document.querySelectorAll("[data-link]").forEach(btn=>{
      btn.addEventListener("click", ()=>{

        const link = btn.dataset.link;

        if(link === "home") window.location.href = "/";
        if(link === "games") window.location.href = "/games.html";
        if(link === "leaderboard") window.location.href = "/leaderboard.html";
        if(link === "profile") window.location.href = "/profile.html";
        if(link === "admin") window.location.href = "/admin.html";

        if(link === "logout"){
          localStorage.removeItem("user");
          window.location.href = "/login.html";
        }

      });
    });

  });
</script>

<h1>👑 Admin Panel</h1>
<p>Bloquer / autoriser l'accès aux jeux avec un switch.</p>

<div class="switch-wrap">
  <span>Jeux</span>
  <label class="switch">
    <input id="gamesSwitch" type="checkbox" />
    <span class="slider"></span>
  </label>
  <strong id="switchLabel">OFF</strong>
</div>

<p id="status">Chargement du statut...</p>

<button class="back-btn" onclick="goMain()">⬅ Back to Main Menu</button>

<script>

const user = JSON.parse(localStorage.getItem("user"));
const gamesSwitch = document.getElementById("gamesSwitch");
const switchLabel = document.getElementById("switchLabel");
const statusEl = document.getElementById("status");

function render(enabled){
  gamesSwitch.checked = enabled;
  switchLabel.textContent = enabled ? "ON" : "OFF";
  statusEl.textContent = enabled
    ? "✅ Les jeux sont autorisés"
    : "⛔ Les jeux sont bloqués";
}

async function fetchGamesStatus(){
  try {
    const res = await fetch("/api/games/status");
    const data = await res.json();
    render(Boolean(data.enabled));
  } catch (err) {
    statusEl.textContent = "Impossible de récupérer le statut des jeux.";
    console.error(err);
  }
}

async function setGames(enabled){

  if (!user?.email) {
    statusEl.textContent = "Utilisateur admin introuvable.";
    gamesSwitch.checked = !enabled;
    return;
  }

  try {
    const res = await fetch("/api/admin/override", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        adminEmail: user.email,
        enabled
      })
    });

    const data = await res.json();

    if (!res.ok) {
      statusEl.textContent = data?.error || "Mise à jour refusée.";
      gamesSwitch.checked = !enabled;
      return;
    }

    render(enabled);

  } catch (err) {
    statusEl.textContent = "Erreur serveur.";
    gamesSwitch.checked = !enabled;
    console.error(err);
  }
}

gamesSwitch.addEventListener("change", (e) => {
  setGames(e.target.checked);
});

function goMain(){
  window.location.href = "/";
}

fetchGamesStatus();

</script>

</body>
</html>
