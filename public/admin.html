<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/assets/styles/theme.css">
<script defer src="/assets/scripts/site-shell.js"></script>
<title>Admin Panel</title>

<style>
body {
  background: #020617;
  color: white;
  text-align: center;
  padding-top: 80px;
  margin: 0;
  font-family: Arial, sans-serif;
}

.switch-wrap {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-top: 24px;
}

.switch {
  position: relative;
  width: 64px;
  height: 36px;
  display: inline-block;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background-color: #64748b;
  transition: .2s;
  border-radius: 999px;
}

.slider:before {
  content: "";
  position: absolute;
  height: 28px;
  width: 28px;
  left: 4px;
  top: 4px;
  background-color: white;
  transition: .2s;
  border-radius: 50%;
}

input:checked + .slider {
  background-color: #10b981;
}

input:checked + .slider:before {
  transform: translateX(28px);
}

#status {
  margin-top: 18px;
  opacity: 0.9;
}

.back-btn{
  margin-top:30px;
  background:#1f2937;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
}

.back-btn:hover{
  background:#374151;
}
</style>
</head>

<body class="with-navbar">
  
<!-- NAVBAR -->
<div id="navbar-container"></div>

<h1>Admin Panel</h1>
<p>Enable or disable game access.</p>

<div class="switch-wrap">
  <span>Games</span>
  <label class="switch">
    <input id="gamesSwitch" type="checkbox" />
    <span class="slider"></span>
  </label>
  <strong id="switchLabel">OFF</strong>
</div>

<p id="status">Loading status...</p>

<button class="back-btn" onclick="goMain()">Back to Main Menu</button>

<script>

const user = JSON.parse(localStorage.getItem("user"));
const gamesSwitch = document.getElementById("gamesSwitch");
const switchLabel = document.getElementById("switchLabel");
const statusEl = document.getElementById("status");

function render(enabled){
  gamesSwitch.checked = enabled;
  switchLabel.textContent = enabled ? "ON" : "OFF";
  statusEl.textContent = enabled
    ? "Games are enabled"
    : "Games are disabled";
}

async function fetchGamesStatus(){
  try {
    const res = await fetch("/api/games/status");
    const data = await res.json();
    render(Boolean(data.enabled));
  } catch (err) {
    statusEl.textContent = "Unable to load game status.";
    console.error(err);
  }
}

async function setGames(enabled){

  if (!user?.email) {
    statusEl.textContent = "Admin user not found.";
    gamesSwitch.checked = !enabled;
    return;
  }

  try {
    const res = await fetch("/api/admin/override", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        adminEmail: user.email,
        enabled
      })
    });

    const data = await res.json();

    if (!res.ok) {
      statusEl.textContent = data?.error || "Update rejected.";
      gamesSwitch.checked = !enabled;
      return;
    }

    render(enabled);

  } catch (err) {
    statusEl.textContent = "Server error.";
    gamesSwitch.checked = !enabled;
    console.error(err);
  }
}

gamesSwitch.addEventListener("change", (e) => {
  setGames(e.target.checked);
});

function goMain(){
  window.location.href = "/";
}

fetchGamesStatus();

</script>

</body>
</html>
